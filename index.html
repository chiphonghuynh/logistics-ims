    // =====================================================================
    // CHANG YANG IMS - GOOGLE SHEETS STORAGE LAYER
    // Dữ liệu lưu trên Google Sheets qua Apps Script Web App
    // IndexedDB được dùng làm cache offline tạm thời
    // =====================================================================

    const CY_DB_NAME = 'ChangYangIMS_v2';
    const CY_DB_VERSION = 1;
    const CY_STORE = 'keyvalue';
    let _cyDb = null;

    // --- IndexedDB (cache offline) ---
    function cyOpenDB() {
      if (_cyDb) return Promise.resolve(_cyDb);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(CY_DB_NAME, CY_DB_VERSION);
        req.onupgradeneeded = e => e.target.result.createObjectStore(CY_STORE);
        req.onsuccess = e => { _cyDb = e.target.result; resolve(_cyDb); };
        req.onerror = e => reject(e.target.error);
      });
    }
    window.cyLocalGet = async (key) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const req = db.transaction(CY_STORE,'readonly').objectStore(CY_STORE).get(key);
        req.onsuccess = () => res(req.result ?? null);
        req.onerror = () => rej(req.error);
      });
    };
    window.cyLocalSet = async (key, value) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(CY_STORE,'readwrite');
        tx.objectStore(CY_STORE).put(value, key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    };

    // --- Google Sheets API (qua Apps Script Web App) ---
    window.CY_API_URL = localStorage.getItem('cy_api_url') || '';

    window.cyApiCall = async (action, payload = {}) => {
      const url = window.CY_API_URL;
      if (!url) throw new Error('NO_API_URL');
      const body = JSON.stringify({ action, ...payload });
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // Apps Script yêu cầu text/plain để tránh CORS preflight
        body
      });
      if (!res.ok) throw new Error('HTTP_' + res.status);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message || 'API_ERROR');
      return json.data;
    };

    // Đọc toàn bộ 1 sheet
    window.cySheetGet = async (sheet) => {
      const data = await window.cyApiCall('getSheet', { sheet });
      await window.cyLocalSet('cy_' + sheet, data); // cache offline
      return data;
    };

    // Ghi đè toàn bộ 1 sheet
    window.cySheetSet = async (sheet, data) => {
      await window.cyLocalSet('cy_' + sheet, data); // lưu cache ngay
      await window.cyApiCall('setSheet', { sheet, data }); // ghi lên Sheets
    };

    // Đọc tất cả sheets cùng lúc
    window.cyLoadAll = async () => {
      const data = await window.cyApiCall('getAll');
      for (const [k, v] of Object.entries(data)) {
        await window.cyLocalSet('cy_' + k, v);
      }
      return data;
    };
  </script>

      // Parse NỘI DUNG → lấy danh sách bill_no liên quan
      const parsePaymentContent = (noiDung) => {
        if (!noiDung) return { bills: [], isPTU: false, isTrietTieu: false, rawBills: [] };
        const s = String(noiDung).trim();
        const isPTU = /^PTU\s+/i.test(s);
        const isTrietTieu = /\(TRIỆT TIÊU\)/i.test(s);

        // Bỏ prefix PTU / suffix (TRIỆT TIÊU)
        let core = s
          .replace(/^PTU\s+/i, '')
          .replace(/\s*\(TRIỆT TIÊU\)\s*/i, '')
          .trim();

        // Dạng: XX [bill1, bill2, bill3] — nhiều bill trong ngoặc
        const bracketMatch = core.match(/^(.+?)\s*\[(.+)\]$/);
        let bills = [];
        if (bracketMatch) {
          bills = bracketMatch[2].split(',').map(b => b.trim()).filter(Boolean);
        } else {
          // Dạng: XX bill_no hoặc chỉ là bill_no
          // Tách lấy phần cuối (sau khoảng trắng cuối cùng của prefix hãng)
          // VD: "CH6KD-26" → ["CH6KD-26"], "CTL SZHCM25171484" → ["SZHCM25171484"]
          // Nhưng lot_no dạng CH1KD-26 cũng là bill ref → giữ nguyên toàn bộ
          // Heuristic: nếu có khoảng trắng → phần sau khoảng trắng cuối là bill
          const parts = core.split(/\s+/);
          bills = parts.length > 1 ? [parts[parts.length - 1]] : [core];
        }
        return { bills, isPTU, isTrietTieu, rawBills: bills };
      };

      // Lấy tất cả phiếu liên quan đến 1 bill_no hoặc lot_no
      const getPaymentsForLot = (lotNo, billNo) => {
        if (!paymentData) return [];
        const refs = [lotNo, billNo].filter(Boolean).map(s => String(s).trim().toUpperCase());
        return (paymentData || []).filter(p => {
          const { bills } = parsePaymentContent(p['NỘI DUNG']);
          return bills.some(b => refs.includes(String(b).trim().toUpperCase()));
        });
      };

      // Kiểm tra phiếu PTU đã có phiếu triệt tiêu chưa
      const checkTrietTieu = (payments) => {
        const results = [];
        payments.forEach((p, idx) => {
          const parsed = parsePaymentContent(p['NỘI DUNG']);
          if (!parsed.isPTU) return;
          // Tìm phiếu triệt tiêu tương ứng
          const soTien = Number(String(p['SỐ TIỀN']||'').replace(/[^0-9.-]/g,'')||0);
          const trietTieuPhieu = payments.find((p2, i2) => {
            if (i2 === idx) return false;
            const p2parsed = parsePaymentContent(p2['NỘI DUNG']);
            if (!p2parsed.isTrietTieu) return false;
            const soTien2 = Number(String(p2['SỐ TIỀN']||'').replace(/[^0-9.-]/g,'')||0);
            // Cùng bill refs + số tiền khớp
            return p2parsed.bills.some(b => parsed.bills.includes(b)) && Math.abs(soTien2 - soTien) < 1;
          });
          results.push({ phieu: p, trietTieu: trietTieuPhieu || null });
        });
        return results;
      };

        const now = new Date();

        // Parse dd/mm/yyyy hoặc yyyy-mm-dd → Date
        const parseD = (s) => {
          if (!s) return null;
          const s1 = String(s).trim();
          const m1 = s1.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
          if (m1) return new Date(+m1[3], +m1[2]-1, +m1[1]);
          const m2 = s1.match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (m2) return new Date(+m2[1], +m2[2]-1, +m2[3]);
          return null;
        };
        return (paymentData || []).filter(p => {
          // Tìm kiếm text
          if (paymentSearch.trim()) {
            const q = paymentSearch.toLowerCase();
            const match = (p['SỐ PTT']||'').toLowerCase().includes(q)
                       || (p['NỘI DUNG']||'').toLowerCase().includes(q)

      const [homeSearchQuery, setHomeSearchQuery] = useState('');

      // Quản lý các Modal
      const [showAddModal, setShowAddModal] = useState(false);
      const [modalMode, setModalMode] = useState('add'); // 'add' | 'edit'
      const [modalTab, setModalTab] = useState('lot'); // 'lot' | 'invoice' | 'goods'
      const [showMasterInvoiceModal, setShowMasterInvoiceModal] = useState(false);

      // Quản lý Modal thêm mới/chỉnh sửa sản phẩm gốc (Từ điển)
      const [showDictModal, setShowDictModal] = useState(false);
      const [dictModalMode, setDictModalMode] = useState('add'); // 'add' | 'edit'
      const [dictForm, setDictForm] = useState({
        goods_no: '',
        hs_code: '',
        goods_name_en: '',
        goods_name_local: '',
        goods_unit_en: 'PCS',
        goods_unit_local: 'Cái',
        original_goods_no: '' // Theo dõi mã hàng khi edit để sửa đúng dòng
      });

      // ATC Date update nhanh
      const [inlineAtcLotNo, setInlineAtcLotNo] = useState(null);
      const [inlineAtcDate, setInlineAtcDate] = useState('');

      // Custom dialog confirmation modal
      const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

      // Lưu lịch sử hãng tàu/FWD và nhà cung ứng để gợi ý lần sau
      const [carrierHistory, setCarrierHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('cy_carrier_history') || '[]'); } catch { return []; }
      });
      const [supplierHistory, setSupplierHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('cy_supplier_history') || '["CHANG YANG MATERIAL CORP."]'); } catch { return ['CHANG YANG MATERIAL CORP.']; }
      });
      const addCarrierHistory = (val) => {
        if (!val || carrierHistory.includes(val)) return;
        const next = [val, ...carrierHistory].slice(0, 30);
        setCarrierHistory(next);
        localStorage.setItem('cy_carrier_history', JSON.stringify(next));
      };
      const addSupplierHistory = (val) => {
        if (!val || supplierHistory.includes(val)) return;
        const next = [val, ...supplierHistory].slice(0, 30);
        setSupplierHistory(next);
        localStorage.setItem('cy_supplier_history', JSON.stringify(next));
      };

      // Các Form nhập liệu của nghiệp vụ chính
      const [lotForm, setLotForm] = useState({
        lot_no: '', stt: 1, lot_date: new Date().toISOString().substring(0, 10), get_docs_date: new Date().toISOString().substring(0, 10),
        factory_no: '', bill_no: '', bill_date: '', pol: '', pod: '', bill_term: 'Freight Prepaid',
        carrier: '', // Hãng tàu / FWD
        transport_type: 'SEA_CONT', // AIR | EXPRESS | SEA_CONT | SEA_CFS
        is_cont: true, cont_no: '', seal_no: '', cont_type: '40HC', contList: [{cont_no:'',seal_no:'',cont_type:'40HC'}],
        pkg_qty: 0, gw: 0, cbm: 0, eta: '', atc_date: '',
        origin_country: 'TAIWAN', loai_hinh: 'NEUTRAL', loai_hinh_con: 'DEFAULT', sale_qty: 0,
        is_hang_chung_bill: false,
        contract_start: '', contract_end: ''
      });

      const [invoiceForm, setInvoiceForm] = useState({
        invoice_no: '', lot_no: '', bill_no: '', bill_stt: 0, invoice_date: new Date().toISOString().substring(0, 10),
        inv_pkg_qty: 0, inv_gw: 0,
        incoterm: 'CIF', total_amount: 0, foc_amount: 0, plus_sea_freight: 0, handling_charges: 0, other_charges: 0,
        other_charges_note: '',
        is_hang_chung_bill: false, loai_hinh: 'A12', loai_hinh_con: 'DEFAULT',
        currency: 'USD', factory_no: '',
        supplier: 'CHANG YANG MATERIAL CORP.',
        contract_start: '', contract_end: ''
      });

      const [goodsForm, setGoodsForm] = useState({
        invoice_no: '', goods_no: '', goods_item: 1, goods_name_en: '', goods_unit_en: 'PCS', goods_unit_en2: '',
        goods_name_local: '', goods_unit_local: 'Cái', goods_unit_local2: '', hs_code: '', invoice_description: '', sale_amount: 0,
        origin_country: 'TAIWAN', qty1: 0, unit1: 'PCS', qty2: 0, unit2: '', unit_price: 0, unit_price_str: ''
      });

      const [selectedFactories, setSelectedFactories] = useState([]);
      // Danh sách invoice tạm thời cho lô đang tạo (Tab 2 preview)
      const [draftInvoiceNos, setDraftInvoiceNos] = useState([]);
      // Tab 4: Tạo Mã Lô — state gắn invoice vào lô
      const [lotAssignForm, setLotAssignForm] = useState({
        loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', selectedInvoiceNos: [], stt: 1
      });
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4500);
      };

      // Sinh Số Thứ Tự (STT) trống nhỏ nhất tự động
      const getFirstVacantSeq = () => {
        const activeSeqs = lots.map(l => Number(l.stt)).filter(n => !isNaN(n) && n > 0);
        const uniqueSeqs = Array.from(new Set(activeSeqs)).sort((a, b) => a - b);
        let nextSeq = 1;
        for (let i = 0; i < uniqueSeqs.length; i++) {
          if (uniqueSeqs[i] === nextSeq) nextSeq++; else if (uniqueSeqs[i] > nextSeq) break;
        }
        return nextSeq;
      };

      // Hàm tự động phát sinh mã lô
      const generateLotNoString = (type, subType, sttNum) => {
        const yy = new Date().getFullYear().toString().slice(-2);
        if (!type || type === 'NEUTRAL') return `CH${sttNum}-${yy}`;
        if (type === 'A12') {
          return subType === 'H11' ? `CH${sttNum}-${yy}PMD` : subType === 'DT' ? `CH${sttNum}DT-${yy}` : `CH${sttNum}KD-${yy}`;
        } else if (type === 'E21') {
          return subType === 'CHUYEN_TIEP' ? `CH${sttNum}-${yy}CT` : `CH${sttNum}-${yy}`;
        }
        return `CH${sttNum}-${yy}`;
      };

      // ── DISPLAY HELPERS ─────────────────────────────────────────────
      // ── DATE NORMALIZE: chuyển bất kỳ dạng ngày nào về YYYY-MM-DD cho input type="date"
      const normalizeDate = (d) => {
        if (!d) return '';
        const s = String(d).trim();
        // Already YYYY-MM-DD
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // ISO timestamp: 2026-06-08T17:00:00.000Z → 2026-06-08
        const isoMatch = s.match(/^(\d{4}-\d{2}-\d{2})T/);
        if (isoMatch) return isoMatch[1];
        // DD/MM/YYYY → YYYY-MM-DD
        const dmyMatch = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (dmyMatch) return `${dmyMatch[3]}-${dmyMatch[2]}-${dmyMatch[1]}`;
        // Try Date parse as fallback
        try {
          const parsed = new Date(d);
          if (!isNaN(parsed)) return parsed.toISOString().substring(0,10);
        } catch(e) {}
        return '';
      };

      const fmtDisplayDate = (d) => {
        if (!d) return '—';
        // Handle ISO timestamps like "2026-06-03T17:00:00.000Z"
        const str = String(d);
        const match = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (match) return `${match[3]}/${match[2]}/${match[1]}`;
        return str;
      };

      const getUniqueSuppliers = () => Array.from(new Set(lots.map(l => l.supplier).filter(Boolean)));
      const getUniquePols = () => Array.from(new Set(lots.map(l => l.pol).filter(Boolean).map(p => p.trim().toUpperCase())));
      const getUniquePods = () => Array.from(new Set(lots.map(l => l.pod).filter(Boolean).map(p => p.trim().toUpperCase())));
      const getUniqueOrigins = () => Array.from(new Set([...lots.map(l => l.origin_country), ...goods.map(g => g.origin_country)].filter(Boolean).map(s => s.trim().toUpperCase())));

      // Tự động nhảy STT & Mã lô khi mở tab thêm Lô Mới
      useEffect(() => {
        if (showAddModal && modalMode === 'add' && modalTab === 'lot') {
          const vacantStt = getFirstVacantSeq();
          const calculatedLotNo = generateLotNoString(lotForm.loai_hinh || 'NEUTRAL', lotForm.loai_hinh_con, vacantStt);
          setLotForm(prev => ({ ...prev, lot_no: calculatedLotNo, stt: vacantStt }));
        }
      }, [showAddModal, lotForm.loai_hinh, lotForm.loai_hinh_con, lots, modalMode, modalTab]);

      useEffect(() => {
        setLotForm(prev => ({ ...prev, factory_no: selectedFactories.join(', ') }));
      }, [selectedFactories]);

      // Phân tích Hàng Chung Bill
      // ── SHARED BILL HELPER ───────────────────────────────────────────
      // Logic mới: hàng chung bill chỉ cần link qua bill_no + is_hang_chung_bill=true
      // Không cần cùng STT. Hệ thống tạo lô mới độc lập, chỉ hiển thị cảnh báo/gợi ý.
      const checkBillNoGroupingHelper = (typedBillNo, currentLoaiHinh, currentLoaiHinhCon, isHangChungBill) => {
        if (!typedBillNo || !isHangChungBill) return { matches: false, status: 'NORMAL' };
        const normBill = String(typedBillNo).trim().toLowerCase();
        const matchingInvoices = invoices.filter(i => i.bill_no && String(i.bill_no).trim().toLowerCase() === normBill);
        if (matchingInvoices.length === 0) return { matches: false, status: 'NEW_BILL' };

        const relatedLots = lots.filter(l => matchingInvoices.some(i => String(i.lot_no||'') === String(l.lot_no||'')));
        if (relatedLots.length === 0) return { matches: false, status: 'NEW_BILL' };

        // Kiểm tra đã có lô cùng loại hình chưa → gộp vào đó
        const sameTypeLot = relatedLots.find(l => l.loai_hinh === currentLoaiHinh && l.loai_hinh_con === currentLoaiHinhCon);
        if (sameTypeLot) {
          return {
            matches: true, status: 'SAME_BILL_SAME_TYPE',
            proposedLotNo: sameTypeLot.lot_no, baseLot: sameTypeLot,
            message: `✅ Same Bill & Same dec. type → Invoice will be merged into Lot [${sameTypeLot.lot_no}]`
          };
        }

        // Khác loại hình → gợi ý tạo lô mới (STT tự do, user tự nhập lot_no)
        const baseLot = relatedLots[0];
        return {
          matches: true, status: 'SAME_BILL_DIFF_TYPE', baseLot,
          message: `⚡ Bill [${typedBillNo}] already used for Lot [${baseLot.lot_no}] (${baseLot.loai_hinh}). Invoice này KHÁC loại hình → sẽ tạo lô mới riêng, nhập Mã Lô bên dưới.`
        };
      };

      const activeBillStatus = checkBillNoGroupingHelper(String(invoiceForm.bill_no||''), invoiceForm.loai_hinh, invoiceForm.loai_hinh_con, invoiceForm.is_hang_chung_bill);

      // --- CÁC HÀM LƯU DỮ LIỆU CHÍNH (MASTER - DETAIL) ---
      const handleSaveLot = (e) => {
        e.preventDefault();
        if (!Number(lotForm.stt)) return showNotification("Please enter Sequence No. (STT)!", "error");

        if (modalMode === 'edit') {
          // Edit mode: validate lot_no exists
          if (!lotForm.lot_no.trim()) return showNotification("Lot code cannot be empty", "error");
          // Serialize contList → containers (JSON) + backward compat fields
          const validConts = (lotForm.contList || []).filter(c => c.cont_no && c.cont_no.trim());
          const primaryCont = validConts[0] || {};
          const finalLot = {
            ...lotForm, lot_no: lotForm.lot_no.trim(), stt: Number(lotForm.stt),
            pkg_qty: Number(lotForm.pkg_qty)||0, gw: Number(lotForm.gw)||0, cbm: Number(lotForm.cbm)||0,
            lot_date: normalizeDate(lotForm.lot_date),
            bill_date: normalizeDate(lotForm.bill_date),
            eta: normalizeDate(lotForm.eta),
            atc_date: normalizeDate(lotForm.atc_date),
            get_docs_date: normalizeDate(lotForm.get_docs_date),
            contract_start: normalizeDate(lotForm.contract_start),
            contract_end: normalizeDate(lotForm.contract_end),
            // Multi-container: lưu JSON array + giữ cont_no/seal_no/cont_type cho backward compat
            containers: serializeContainers(validConts.length > 0 ? validConts : [{cont_no:'',seal_no:'',cont_type:lotForm.cont_type||'40HC'}]),
            cont_no:   primaryCont.cont_no   || '',
            seal_no:   primaryCont.seal_no   || '',
            cont_type: primaryCont.cont_type || lotForm.cont_type || '40HC',
          };
          if (finalLot.carrier) addCarrierHistory(finalLot.carrier.trim());
          const newLots = lots.map(l => l.lot_no === finalLot.lot_no ? finalLot : l);
          saveLotsToStorage(newLots);
          showNotification(`✅ Lot ${finalLot.lot_no} updated`);
          // Highlight row vừa cập nhật, tự clear sau 5 giây
          setRecentlyUpdatedLots(prev => new Set([...prev, finalLot.lot_no]));
          setTimeout(() => setRecentlyUpdatedLots(prev => { const n = new Set(prev); n.delete(finalLot.lot_no); return n; }), 5000);
          setShowAddModal(false);
          return;
        }

        // ADD mode: check bill_no uniqueness (warn but don't block - hàng chung bill is valid)
        if (lotForm.bill_no && !lotForm.is_hang_chung_bill) {
          const existingBill = lots.find(l => l.bill_no && String(l.bill_no).trim().toUpperCase() === String(lotForm.bill_no).trim().toUpperCase());
          if (existingBill) {
            const msg = 'Bill [' + lotForm.bill_no + '] da ton tai trong Lo [' + existingBill.lot_no + ']. Neu day la hang chung Bill, bat toggle Hang Chung Bill. Nhan OK de tiep tuc.';
            const proceed = window.confirm(msg);
            if (!proceed) return;
          }
        }
        // ADD mode: Save bill/transport info (no lot_no yet), move to invoice tab
        // Store in a temporary "draft" state keyed by stt
        const draftLot = { ...lotForm, lot_no: '', stt: Number(lotForm.stt), pkg_qty: Number(lotForm.pkg_qty)||0, gw: Number(lotForm.gw)||0, cbm: Number(lotForm.cbm)||0 };
        if (draftLot.carrier) addCarrierHistory(draftLot.carrier.trim());
        setLotForm(draftLot);
        // Pre-fill lotAssignForm STT from lotForm
        setLotAssignForm(prev => ({...prev, stt: draftLot.stt || getFirstVacantSeq()}));
        setInvoiceForm(prev => ({ ...prev, lot_no: '', bill_stt: draftLot.stt, bill_no: draftLot.bill_no, is_hang_chung_bill: draftLot.is_hang_chung_bill || false }));
        setDraftInvoiceNos([]); // Reset draft list for new lot
        setModalTab('invoice');
        showNotification('Bill info saved — continue entering Invoice');
      };

      // Tab 4: Finalize lot — create lot_no from loai_hinh + assign invoices to it
      const handleFinalizeLot = () => {
        const { loai_hinh, loai_hinh_con, selectedInvoiceNos } = lotAssignForm;
        if (!loai_hinh) return showNotification("Please select customs dec. type!", "error");
        if (selectedInvoiceNos.length === 0) return showNotification("Please select at least 1 invoice!", "error");
        const stt = Number(lotAssignForm.stt || lotForm.stt || 1);
        if (!stt) return showNotification("Enter a valid STT number!", "error");
        const lot_no = generateLotNoString(loai_hinh, loai_hinh_con, stt);
        if (lots.some(l => String(l.lot_no||'').toLowerCase() === lot_no.toLowerCase())) {
          return showNotification(`Lot code [${lot_no}] already exists! Change STT or dec. type.`, "error");
        }
        // Aggregate pkg_qty and gw from selected invoices (for hang chung bill)
        const selInvs = invoices.filter(i => selectedInvoiceNos.includes(i.invoice_no));
        const totalInvPkg = selInvs.reduce((s, i) => s + Number(i.inv_pkg_qty||0), 0);
        const totalInvGw  = selInvs.reduce((s, i) => s + Number(i.inv_gw||0), 0);
        // Use bill pkg/gw if no per-invoice breakdown given; otherwise use sum of invoices
        const finalPkgQty = totalInvPkg > 0 ? totalInvPkg : Number(lotForm.pkg_qty)||0;
        const finalGw     = totalInvGw  > 0 ? totalInvGw  : Number(lotForm.gw)||0;

        const finalLot = {
          ...lotForm, lot_no, stt, loai_hinh, loai_hinh_con,
          factory_no: selectedFactories.join(', '),
          pkg_qty: finalPkgQty, gw: finalGw,
        };
        if (finalLot.carrier) addCarrierHistory(finalLot.carrier.trim());
        saveLotsToStorage([finalLot, ...lots]);
        // Update selected invoices → assign lot_no + loai_hinh
        const updatedInvoices = invoices.map(inv =>
          selectedInvoiceNos.includes(inv.invoice_no)
            ? { ...inv, lot_no, loai_hinh, loai_hinh_con }
            : inv
        );
        saveInvoicesToStorage(updatedInvoices);
        setSelectedLotNo(lot_no);
        setLotAssignForm({ loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', selectedInvoiceNos: [], stt: getFirstVacantSeq() });
        showNotification(`✅ Created Lot [${lot_no}] with ${selectedInvoiceNos.length} invoices!`);
        // Stay on Tab 4 so user can create more lots (e.g. 2nd lot for hang chung bill diff type)
        // Close modal only if no more unassigned invoices
      };

      const handleSaveInvoice = (e) => {
        e.preventDefault();
        if (!String(invoiceForm.invoice_no || '').trim()) return showNotification("Please enter Invoice No.!", "error");
        let targetLotNo = invoiceForm.lot_no;

        if (invoiceForm.is_hang_chung_bill && activeBillStatus.matches) {
          if (activeBillStatus.status === 'SAME_BILL_SAME_TYPE') {
            // Gộp vào lô cùng loại hình hiện có
            targetLotNo = activeBillStatus.proposedLotNo;
          }
          // DIFF_TYPE: targetLotNo giữ nguyên invoiceForm.lot_no (user đã nhập)
          // Invoice được đánh dấu is_hang_chung_bill=true để phân biệt
        }

        // Bill term vs Incoterm validation
        const prepaidTerms = ['CIF','CFR','CIP','CPT'];
        const collectTerms = ['FOB','FCA','EXW','FAS'];
        const lotForInv = lots.find(l => l.bill_no === (invoiceForm.bill_no || lotForm.bill_no));
        const billTerm = lotForInv?.bill_term || lotForm.bill_term || '';
        const incoterm = invoiceForm.incoterm || '';
        if (billTerm === 'Freight Prepaid' && collectTerms.includes(incoterm)) {
          return showNotification(`⚠️ Invalid: Bill [Freight Prepaid] is incompatible with Incoterm [${incoterm}]. Nên dùng: CIF, C&F, CIP, CPT`, 'error');
        }
        if (billTerm === 'Freight Collect' && prepaidTerms.includes(incoterm)) {
          return showNotification(`⚠️ Invalid: Bill [Freight Collect] is incompatible with Incoterm [${incoterm}]. Nên dùng: FOB, FCA, EXW, FAS`, 'error');
        }
        const finalInvoice = {
          ...invoiceForm, invoice_no: String(invoiceForm.invoice_no || '').trim(), lot_no: targetLotNo,
          bill_stt: Number(invoiceForm.bill_stt || lotForm.stt || 0),
          bill_no: invoiceForm.bill_no || lotForm.bill_no,
          is_hang_chung_bill: lotForm.is_hang_chung_bill || false,
          total_amount: Number(invoiceForm.total_amount) || 0, foc_amount: Number(invoiceForm.foc_amount) || 0,
          plus_sea_freight: Number(invoiceForm.plus_sea_freight) || 0, handling_charges: Number(invoiceForm.handling_charges) || 0, other_charges: Number(invoiceForm.other_charges) || 0,
          // Normalize ngày về YYYY-MM-DD trước khi lưu
          invoice_date: normalizeDate(invoiceForm.invoice_date),
          contract_start: normalizeDate(invoiceForm.contract_start),
          contract_end: normalizeDate(invoiceForm.contract_end),
        };

        // ── Kiểm tra tiền hoá đơn khớp tổng hàng + phí ──────────────────────
        // Chỉ kiểm tra khi đã có goods (tránh block khi mới tạo invoice chưa có hàng)
        const invGoods = goods.filter(g => String(g.invoice_no) === String(finalInvoice.invoice_no));
        if (invGoods.length > 0 && finalInvoice.total_amount > 0) {
          const goodsTotal   = invGoods.reduce((s, g) => s + (Number(g.sale_amount) || 0), 0);
          const expectedTotal = goodsTotal
            + (Number(finalInvoice.plus_sea_freight)  || 0)
            + (Number(finalInvoice.handling_charges)  || 0)
            + (Number(finalInvoice.other_charges)     || 0)
            - (Number(finalInvoice.foc_amount)        || 0);
          const diff = Math.abs(finalInvoice.total_amount - expectedTotal);
          if (diff > 0.01) { // cho phép sai số tối đa $0.01 do làm tròn
            const proceed = window.confirm(
              `⚠️ Invoice amount MISMATCH!\n\n` +
              `Total goods:     ${goodsTotal.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `+ Sea freight:    ${(Number(finalInvoice.plus_sea_freight)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `+ Handling:       ${(Number(finalInvoice.handling_charges)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `+ Other charges:  ${(Number(finalInvoice.other_charges)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `- FOC:            ${(Number(finalInvoice.foc_amount)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `──────────────────────────────\n` +
              `= Expected:       ${expectedTotal.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `≠ Entered:        ${finalInvoice.total_amount.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `Difference:       ${diff.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n\n` +
              `Click OK to save anyway, Cancel to revise.`
            );
            if (!proceed) return;
          }
        }

        if (finalInvoice.supplier) addSupplierHistory(finalInvoice.supplier.trim());
        let newInvoices = [];
        if (modalMode === 'add') {
          if (invoices.some(i => String(i.invoice_no||'').toLowerCase() === String(invoiceForm.invoice_no||'').trim().toLowerCase())) {
            return showNotification("Invoice No. already exists!", "error");
          }
          newInvoices = [finalInvoice, ...invoices];
          setDraftInvoiceNos(prev => prev.includes(finalInvoice.invoice_no) ? prev : [...prev, finalInvoice.invoice_no]);
          setGoodsForm(prev => ({ ...prev, invoice_no: finalInvoice.invoice_no, goods_no: '', goods_name_en: '', goods_name_local: '', hs_code: '', sale_amount: 0, qty1: 0, unit1: 'PCS', qty2: 0, unit2: '', unit_price: 0, unit_price_str: '' }));
          setModalTab('goods');
        } else {
          newInvoices = invoices.map(i => String(i.invoice_no) === String(finalInvoice.invoice_no) ? finalInvoice : i);
          showNotification(`✅ Invoice ${finalInvoice.invoice_no} updated`);
          setRecentlyUpdatedInvoices(prev => new Set([...prev, finalInvoice.invoice_no]));
          setTimeout(() => setRecentlyUpdatedInvoices(prev => { const n = new Set(prev); n.delete(finalInvoice.invoice_no); return n; }), 5000);
          setShowAddModal(false);
        }
        saveInvoicesToStorage(newInvoices);
        setSelectedLotNo(targetLotNo);
        setSelectedInvoiceNo(finalInvoice.invoice_no);
        showNotification(`✅ Invoice ${finalInvoice.invoice_no} saved`);
      };

      const handleSaveGoods = (e) => {
        e.preventDefault();

      // --- CHỨC NĂNG IMPORT FILE EXCEL THÔNG MINH (COLUMNS AUTO-MAPPING) ---
      const handleExcelImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // Đọc bảng tính thành mảng 2 chiều
            const rawJson = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (rawJson.length < 2) {
              return showNotification("Excel file is empty or has no data!", "error");
            }

            // Tiền xử lý dòng tiêu đề (loại bỏ dấu tiếng Việt, viết thường, loại bỏ khoảng trắng VÀ ký tự đặc biệt)
            const headers = rawJson[0].map(h => h
              ? h.toString().toLowerCase().trim()
                  .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // bỏ dấu tiếng Việt
                  .replace(/[^a-z0-9]/g, '')                        // bỏ tất cả ký tự không phải chữ/số (kể cả ngoặc, gạch ngang...)
              : '');

            // Debug: log headers ra console để kiểm tra nếu cần
            console.log('[Import] Headers sau normalize:', headers);

            // Tìm kiếm chỉ số cột - ưu tiên keyword cụ thể hơn để tránh nhầm
            // idxGoodsNo: Item Code / Goods No / Item Code / Mã Sản Phẩm
            const idxGoodsNo = headers.findIndex(h =>
              h === 'mahang' || h === 'goodsno' || h === 'itemcode' || h === 'masanpham' ||
              h.startsWith('mahang') || h.includes('goodsno') || h.includes('itemcode') || h.includes('masanpham')
            );
            // idxHsCode: HS Code / Mã HS — dùng keyword dài hơn để không nhầm
            const idxHsCode = headers.findIndex(h =>
              h === 'hscode' || h === 'mahs' || h === 'hs' ||
              h.includes('hscode') || h.includes('mahs') || h.startsWith('hscode')
            );
            // idxNameEn: English Name / English Name / Description
            const idxNameEn = headers.findIndex(h =>
              h.includes('tientienganh') || h.includes('tentienganh') || h.includes('tienganh') ||
              h.includes('english') || h.includes('nameen') || h.includes('tenhangen') ||
              h.includes('descen') || (h.includes('ten') && h.includes('anh'))
            );
            // idxNameLocal: Vietnamese Name / Vietnamese Name
            const idxNameLocal = headers.findIndex(h =>
              h.includes('tientingviet') || h.includes('tentingviet') || h.includes('tiengviet') ||
              h.includes('vietnamese') || h.includes('namevn') || h.includes('tenhangviet') ||
              h.includes('mota') || (h.includes('ten') && h.includes('viet'))
            );

            // Nếu không tìm được, thử fallback theo vị trí cột (A=0, B=1, C=2, D=3)
            const finalGoodsNo  = idxGoodsNo  !== -1 ? idxGoodsNo  : 0;
            const finalHsCode   = idxHsCode   !== -1 ? idxHsCode   : 1;
            const finalNameEn   = idxNameEn   !== -1 ? idxNameEn   : 2;
            const finalNameLocal= idxNameLocal !== -1 ? idxNameLocal: 3;

            // Chỉ báo lỗi nếu cả tự động lẫn fallback đều không có dữ liệu
            const missingCols = [];
            if (idxGoodsNo === -1)  missingCols.push('Item Code (cột A)');
            if (idxHsCode === -1)   missingCols.push('HS Code (cột B)');
            if (idxNameEn === -1)   missingCols.push('English Name (cột C)');
            if (missingCols.length === 3) {
              // Hoàn toàn không nhận diện được → báo lỗi kèm hướng dẫn
              return showNotification(`Không nhận diện được cột! Hệ thống đang dùng vị trí cột mặc định A/B/C/D. Vui lòng đảm bảo header dòng 1 không bị trống.`, "error");
            }

            const importedItems = [];
            for (let i = 1; i < rawJson.length; i++) {
              const row = rawJson[i];
              if (!row || !row[finalGoodsNo]) continue;

              importedItems.push({
                goods_no: row[finalGoodsNo].toString().trim(),
                hs_code: row[finalHsCode] ? row[finalHsCode].toString().trim() : '00000000',
                goods_name_en: row[finalNameEn] ? row[finalNameEn].toString().trim() : 'No Description',
                goods_name_local: row[finalNameLocal] ? row[finalNameLocal].toString().trim() : 'Chưa có mô tả tiếng Việt',
                goods_unit_en: 'PCS',
                goods_unit_local: 'Cái'
              });
            }

            if (importedItems.length === 0) {
              return showNotification("No valid items could be read!", "warning");
            }

            const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
            
            // Trộn dữ liệu: Ghi đè thông tin nếu trùng mã hàng, hoặc thêm mới
            let updatedDict = [...targetDict];
            importedItems.forEach(newItem => {
              const idx = updatedDict.findIndex(i => i.goods_no.toLowerCase() === newItem.goods_no.toLowerCase());
              if (idx !== -1) {
                updatedDict[idx] = newItem; // Đè dữ liệu mới
              } else {
                updatedDict.push(newItem); // Thêm dòng mới
              }
            });

            if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
            const detected = `Cột phát hiện: A=${finalGoodsNo}, B=${finalHsCode}, C=${finalNameEn}, D=${finalNameLocal}`;
            showNotification(`Import successful! Updated ${importedItems.length} items in Dictionary ${dbSelectedTab}.`);
          } catch (err) {
            console.error(err);
            if (err.name === 'QuotaExceededError' || (err.message && err.message.toLowerCase().includes('quota'))) {
              showNotification("Local storage is full! Please delete old data or use another browser.", "error");
            } else {
              showNotification("Failed to read Excel! Please check the file structure.", "error");
            }
          }
        };
        reader.readAsArrayBuffer(file);
      };

      // --- CÁC HÀM XÓA CASCADING (XÓA PHÂN CẤP TRÁNH RÁC DATABASE) ---
      const executeDeleteLot = (targetLotNo) => {

      // ── Helper: parse containers từ nhiều format ─────────────────
      // Hỗ trợ: JSON array mới, string cũ "CONT1|SEAL1|40HC,CONT2|SEAL2|40HC", hoặc 3 field riêng
      const parseContainers = (lot) => {
        // Format mới: JSON array string
        if (lot.containers) {
          try {
            const arr = JSON.parse(lot.containers);
            if (Array.isArray(arr) && arr.length > 0) return arr;
          } catch(e) {}
          // Fallback: pipe-comma format "CONT1|SEAL1|40HC,CONT2|SEAL2|40HC"
          if (typeof lot.containers === 'string' && lot.containers.trim()) {
            return lot.containers.split(',').map(s => {
              const [cont_no='', seal_no='', cont_type='40HC'] = s.split('|');
              return { cont_no: cont_no.trim(), seal_no: seal_no.trim(), cont_type: cont_type.trim() || '40HC' };
            }).filter(c => c.cont_no);
          }
        }
        // Format cũ: 3 field riêng → convert sang array 1 phần tử
        if (lot.cont_no && lot.cont_no.trim()) {
          return [{ cont_no: lot.cont_no.trim(), seal_no: lot.seal_no || '', cont_type: lot.cont_type || '40HC' }];
        }
        return [{ cont_no: '', seal_no: '', cont_type: '40HC' }];
      };

      const serializeContainers = (arr) => JSON.stringify(arr);

      // ── Suy ra transport_type từ dữ liệu cũ (trước khi có field transport_type) ──
      const inferTransportType = (lot) => {

        if (lot.is_cont === true || lot.is_cont === 'true') return 'SEA_CONT';
        if (lot.is_cont === false || lot.is_cont === 'false') return 'SEA_CFS';
        return 'SEA_CONT';

        if (na === nb) return 1;

                    )}
                  </div>
                </div>

                {!isConnected && (
                  <button onClick={() => setShowApiSetup(false)} className="w-full text-center text-slate-600 hover:text-slate-400 text-xs underline">
                    Skip, use offline (data saved in this browser)
                  </button>
                )}
              </div>
            </div>
          )}
          
          {/* --- NOTIFICATION TOAST --- */}
          {notification && (
            <div className={`fixed top-4 right-4 z-[9999] px-5 py-3 rounded-xl shadow-2xl flex items-center gap-3 transition-all duration-300 transform translate-y-0 ${
              notification.type === 'error' ? 'bg-rose-600 border border-rose-500' : 'bg-emerald-600 border border-emerald-500'
            }`}>
              <span className="text-sm font-bold">{notification.message}</span>
            </div>
          )}

          {/* --- CONFIRM DIALOG --- */}
          {confirmState.isOpen && (
            <div className="fixed inset-0 z-[999] bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-slate-900 border border-slate-800 rounded-xl max-w-md w-full p-6 space-y-4 shadow-2xl">
                <h3 className="text-sm font-bold text-white uppercase flex items-center gap-2">⚠️ {confirmState.title}</h3>
                <p className="text-slate-300 text-xs leading-relaxed">{confirmState.message}</p>
                <div className="flex justify-end gap-3 pt-2">
                  <button onClick={() => setConfirmState(prev => ({ ...prev, isOpen: false }))} className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-semibold">Hủy bỏ</button>
                  <button onClick={confirmState.onConfirm} className="px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-xs font-semibold">Đồng ý</button>
                </div>
              </div>
            </div>
          )}

                            <option value="JAPAN" /><option value="KOREA" /><option value="VIETNAM" />
                            <option value="GERMANY" /><option value="USA" /><option value="ITALY" />
                          </datalist>

                            { val: 'EXPRESS', label: '📦 EXPRESS (DHL/FedEx)', color: 'purple' },
                            { val: 'SEA_CONT', label: '🚢 SEA – CONT', color: 'blue' },
                            { val: 'SEA_CFS', label: '⚓ SEA – CFS (LCL)', color: 'indigo' },
                            { val: 'NGOAI_QUAN', label: '🏭 Bonded Warehouse', color: 'amber' },
                            { val: 'BY_TRUCK', label: '🚛 By Truck', color: 'green' },

                                      list[idx] = {...list[idx], cont_no: e.target.value.toUpperCase()};
                                      setLotForm(prev => ({...prev, contList: list}));

                                {/* Seal No */}
                                <div className="col-span-3">
                                  <input

                                      list[idx] = {...list[idx], seal_no: e.target.value.toUpperCase()};
                                      setLotForm(prev => ({...prev, contList: list}));

                                {/* Cont Type */}

                                  <select
                                    value={c.cont_type || '40HC'}
                                    onChange={e => {
                                      const list = [...(lotForm.contList||[])];
                                      list[idx] = {...list[idx], cont_type: e.target.value};
                                      setLotForm(prev => ({...prev, contList: list, cont_type: idx === 0 ? e.target.value : prev.cont_type}));
                                    }}
                                    className="w-full bg-slate-950 border border-slate-700 rounded px-2 py-1.5 text-xs text-white focus:border-blue-500 outline-none">
                                    <option>20DC</option><option>40DC</option><option>40HC</option><option>45HC</option>
                                  </select>
                                </div>
                                {/* Remove button */}
                                <div className="col-span-1 flex justify-center">
                                  {(lotForm.contList||[]).length > 1 ? (
                                    <button type="button"
                                      onClick={() => {
                                        const list = (lotForm.contList||[]).filter((_,i) => i !== idx);
                                        setLotForm(prev => ({...prev, contList: list}));
                                      }}

                                    <span className="text-slate-800 text-base">×</span>
                                  )}

                              </div>

                            {/* Summary if more than 1 container */}

                              <div className="text-[10px] text-slate-500 italic pl-1 pt-1">
                                💡 {(lotForm.contList||[]).filter(c=>c.cont_no).length} containers — primary cont: <span className="text-cyan-400 font-mono">{(lotForm.contList||[]).find(c=>c.cont_no)?.cont_no}</span>
                              </div>
                            )}
                          </div>

                            <label className="block text-[11px] text-slate-400 mb-1">Pkg Qty (Pkg Qty)</label>
                            <input type="number" step="0.001" min="0" value={lotForm.pkg_qty || ''}
                              onChange={(e) => setLotForm({...lotForm, pkg_qty: parseFloat(e.target.value)||0})}
                              className="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-400 mb-1">Gross Weight (KG)</label>
                            <input type="number" step="0.001" min="0" value={lotForm.gw || ''}
                              onChange={(e) => setLotForm({...lotForm, gw: parseFloat(e.target.value)||0})}
                              className="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white" />

                                const raw = e.target.value;
                                if (!/^[0-9]*\.?[0-9]*$/.test(raw) && raw !== '') return;
                                setLotForm(prev => ({...prev, cbm_str: raw, cbm: raw === '' || raw === '.' ? 0 : parseFloat(raw)||0}));
                              }}
                              placeholder="0.000"
                              className={`w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white font-mono ${(lotForm.transport_type === 'AIR' || lotForm.transport_type === 'EXPRESS') ? 'opacity-30 cursor-not-allowed' : ''}`} />
                          </div>
                        </div>
                      </div>

                      <div className="pt-4 border-t border-slate-800 flex justify-between items-center">

                        )}

                          className={`ml-auto px-6 py-2.5 rounded-lg text-xs font-bold text-white ${modalMode === 'edit' ? 'bg-amber-600 hover:bg-amber-500' : 'bg-blue-600 hover:bg-blue-700'}`}>
                          {modalMode === 'edit' ? '✔ Update Bill Info' : 'Save Bill Info → Enter Invoice ➔'}
                        </button>
                      </div>
                    </form>

                        if (lotInvoices.length === 0) return (
                          <div className="bg-slate-950/50 border border-slate-800 rounded-xl p-6 text-center">
                            <p className="text-slate-400 text-xs">Lot <strong className="text-white">{selectedLotNo}</strong> has no invoices nào.</p>

                          <div className="bg-indigo-950/20 border border-indigo-800/40 rounded-xl overflow-hidden">

                            </div>
                            <div className="p-3 flex flex-wrap gap-2">
                              {lotInvoices.map(inv => (
                                <button key={inv.invoice_no} type="button"

                                  className="flex flex-col items-start bg-slate-900 hover:bg-indigo-900/30 border border-slate-700 hover:border-indigo-600 rounded-lg px-4 py-2.5 transition-all text-left">
                                  <span className="font-mono font-bold text-indigo-300 text-xs">{inv.invoice_no}</span>
                                  <span className="text-[10px] text-slate-500 mt-0.5">{fmtDisplayDate(inv.invoice_date)} · {inv.currency||'USD'} {Number(inv.total_amount||0).toLocaleString()}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        );
                      })()}

                              <label className="block text-[11px] text-amber-300 mb-1">Pkg Qty (this Invoice)</label>
                              <input type="number" step="1" min="0"
                                value={invoiceForm.inv_pkg_qty || ''}
                                onChange={e => setInvoiceForm(prev => ({...prev, inv_pkg_qty: Number(e.target.value)||0}))}
                                className="w-full bg-slate-950 border border-amber-900/40 rounded px-3 py-2 text-xs text-sky-300 font-bold" />

                              <label className="block text-[11px] text-amber-300 mb-1">Gross Weight kg (this Invoice)</label>

                                onChange={e => setInvoiceForm(prev => ({...prev, inv_gw: Number(e.target.value)||0}))}
                                className="w-full bg-slate-950 border border-amber-900/40 rounded px-3 py-2 text-xs text-sky-300 font-bold" />
                            </div>
                          </div>
                        </div>

                            <option value="E21">E21 (Processing)</option>
                          </select>
                        </div>

                          <label className="block text-[11px] text-slate-400 mb-1">Sub-type</label>

                            {invoiceForm.loai_hinh === 'A12' ? <>
                              <option value="DEFAULT">KD – Kinh doanh</option>
                              <option value="H11">H11 – Non-commercial goods</option>
                              <option value="DT">DT – Investment</option>
                            </> : <>
                              <option value="DEFAULT">E21 – Default</option>
                              <option value="CHUYEN_TIEP">Transit</option>
                            </>}
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Supplier</label>
                          <input type="text" list="supplier-history-list" value={invoiceForm.supplier}

                            placeholder="Type or select supplier..."
                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" style={{colorScheme:"dark"}} />

                            {supplierHistory.map((s, i) => <option key={i} value={s} />)}
                          </datalist>
                        </div>
                      </div>

                      {/* ROW 2: Linked STT + Invoice No. + Inv. Date */}
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

                            onChange={(e) => {
                              const stt = Number(e.target.value);
                              setInvoiceForm(prev => ({...prev, bill_stt: stt}));
                              setLotAssignForm(prev => ({...prev, stt}));
                            }}
                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-amber-400 font-bold font-mono">
                            <option value="">— Select STT from entered Bill —</option>

                              <option value={lotForm.stt}>
                                STT {lotForm.stt} — Bill: {lotForm.bill_no || 'N/A'} ({fmtDisplayDate(lotForm.lot_date)})
                              </option>

                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Invoice Date</label>

                            const d = e.target.value;
                            if (!d) { setInvoiceForm({...invoiceForm, invoice_date: d}); return; }
                            const startD = new Date(d);
                            startD.setDate(startD.getDate() - 10);
                            const endD = new Date(startD);
                            endD.setDate(endD.getDate() + 180);
                            const fmt = dt => dt.toISOString().substring(0,10);
                            setInvoiceForm(prev => ({
                              ...prev,
                              invoice_date: d,
                              contract_start: prev.contract_start || fmt(startD),
                              contract_end: prev.contract_end || fmt(endD),
                            }));
                          }} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" style={{colorScheme:"dark"}} />
                        </div>
                      </div>

                      {/* ROW 3: Currency + Incoterm + Bill No. */}

                            <option value="JPY">JPY – Japanese Yen</option>
                            <option value="CNY">CNY – Chinese Yuan</option>
                            <option value="TWD">TWD – Taiwan Dollar</option>
                            <option value="KRW">KRW – Korean Won</option>
                            <option value="GBP">GBP – British Pound</option>

                            <option value="VND">VND – Vietnamese Dong</option>
                            <option value="THB">THB – Thai Baht</option>
                            <option value="MYR">MYR – Malaysian Ringgit</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Incoterm</label>

                              <option value="EXW">EXW – Ex Works</option>

                              <option value="FCA">FCA – Free Carrier</option>
                              <option value="FOB">FOB – Free on Board</option>

                                  const wb = XLSX.read(data, { type: 'array' });
                                  const ws = wb.Sheets[wb.SheetNames[0]];
                                  const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                                  if (rows.length < 2) return showNotification("Excel file is empty!", "error");
                                  const norm = h => h ? h.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,'') : '';
                                  const headers = rows[0].map(norm);
                                  const idxInv   = headers.findIndex(h => h.includes('invoice') || h.includes('hoadon') || h === 'invoiceno');
                                  const idxName  = headers.findIndex(h => h.includes('tienganh') || h.includes('english') || h.includes('name') || h.includes('ten'));
                                  const idxOrig  = headers.findIndex(h => h.includes('origin') || h.includes('xuatxu') || h.includes('xuat'));
                                  const idxQty1  = headers.findIndex(h => (h.includes('soluong') || h.includes('qty')) && !h.includes('2'));
                                  const idxUnit1 = headers.findIndex(h => (h.includes('donvi') || h.includes('unit')) && !h.includes('2'));
                                  const idxQty2  = headers.findIndex(h => (h.includes('soluong') || h.includes('qty')) && h.includes('2'));
                                  const idxUnit2 = headers.findIndex(h => (h.includes('donvi') || h.includes('unit')) && h.includes('2'));
                                  const idxPrice = headers.findIndex(h => h.includes('dongia') || h.includes('unitprice') || h.includes('price'));
                                  const currentInv = invoices.find(i => String(i.invoice_no) === String(goodsForm.invoice_no));
                                  const targetDict = currentInv?.loai_hinh === 'E21' ? dictE21 : dictA12;
                                  let batch = [...goods];
                                  let count = 0, skipped = 0;
                                  let itemNo = goods.filter(g => String(g.invoice_no) === String(goodsForm.invoice_no)).length + 1;
                                  for (let ri = 1; ri < rows.length; ri++) {
                                    const row = rows[ri];
                                    if (idxInv !== -1) {
                                      const rowInv = String(row[idxInv]||'').trim();
                                      if (rowInv && rowInv !== String(goodsForm.invoice_no).trim()) { skipped++; continue; }
                                    }
                                    const nameVal = (idxName !== -1 && row[idxName]) ? row[idxName].toString().trim() : '';
                                    if (!nameVal) continue;
                                    const fuzzyRes = findBestDictMatch(nameVal, targetDict);
                                    const dm = fuzzyRes ? fuzzyRes.item : null;
                                    const qty1v = idxQty1 !== -1 ? Number(row[idxQty1])||0 : 0;
                                    const pv = idxPrice !== -1 ? Number(row[idxPrice])||0 : 0;
                                    batch.push({
                                      id: "goods_" + Date.now() + "_" + ri,
                                      invoice_no: goodsForm.invoice_no, goods_item: itemNo++,
                                      goods_no: dm?.goods_no || nameVal.substring(0,20).toUpperCase(),
                                      goods_name_en: dm?.goods_name_en || nameVal,
                                      goods_name_local: dm?.goods_name_local || '',
                                      hs_code: dm?.hs_code || '', goods_unit_en: dm?.goods_unit_en || 'PCS',
                                      goods_unit_local: dm?.goods_unit_local || '', invoice_description: nameVal,
                                      origin_country: idxOrig !== -1 ? String(row[idxOrig]||'TAIWAN').trim().toUpperCase() : 'TAIWAN',
                                      qty1: qty1v, unit1: idxUnit1 !== -1 ? String(row[idxUnit1]||'PCS').trim() : 'PCS',
                                      qty2: idxQty2 !== -1 ? Number(row[idxQty2])||0 : 0,
                                      unit2: idxUnit2 !== -1 ? String(row[idxUnit2]||'').trim() : '',
                                      unit_price: pv, sale_amount: qty1v * pv,
                                    });
                                    count++;
                                  }
                                  saveGoodsToStorage(batch);
                                  showNotification(`Imported ${count} item(s) to ${goodsForm.invoice_no}${skipped ? ' ('+skipped+' skipped)' : ''}`);
                                  e.target.value = '';
                                } catch(err) { console.error(err); showNotification("Failed to read Excel!", "error"); }
                              };
                              reader.readAsArrayBuffer(file);
                            }} />

                                        <span className="font-mono text-cyan-300 font-bold">{c.cont_no}</span>
                                        {c.seal_no && <span className="text-slate-500 font-mono">seal: {c.seal_no}</span>}
                                        <span className="text-[9px] text-slate-600 bg-slate-800 px-1.5 py-0.5 rounded">{c.cont_type}</span>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              );
                            })()}
                            <Field label="Pkg Qty"         value={lot.pkg_qty   ? Number(lot.pkg_qty).toLocaleString()   : null} />
                            <Field label="Gross Weight"    value={lot.gw        ? `${Number(lot.gw).toLocaleString()} KG` : null} />
                            <Field label="CBM"             value={lot.cbm       ? `${lot.cbm} m³`                          : null} />
                            <Field label="Origin Country"  value={lot.origin_country} />
                          </div>
                        </div>

                        {/* Dates */}
                        <div>
                          <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-3">📅 Key Dates</p>
                          <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                            <Field label="Lot Open Date"    value={fmtDisplayDate(lot.lot_date)}      mono />
                            <Field label="Docs Received"    value={fmtDisplayDate(lot.get_docs_date)} mono />
                            <Field label="ETA"              value={fmtDisplayDate(lot.eta)}           mono highlight={lot.eta      ? 'text-amber-300'  : ''} />
                            <Field label="ATC"              value={fmtDisplayDate(lot.atc_date)}      mono highlight={lot.atc_date ? 'text-emerald-400' : 'text-rose-400'} />
                          </div>
                        </div>

                        {/* Factory & Supplier */}
                        <div>
                          <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-3">🏭 Factory & Supplier</p>
                          <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                            <Field label="Factory Code" value={lot.factory_no} />
                            <Field label="Supplier"     value={displaySupplier} />
                            <Field label="Sale Qty"     value={lot.sale_qty ? Number(lot.sale_qty).toLocaleString() : null} />
                            <Field label="Shared Bill"  value={lot.is_hang_chung_bill ? 'Yes' : 'No'} />
                          </div>
                        </div>

                        {/* Contract Period — A12 only */}
                        {lot.loai_hinh === 'A12' && (lot.contract_start || lot.contract_end) && (
                          <div>
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-3">📋 Contract Period (A12)</p>
                            <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                              <Field label="Start Date" value={fmtDisplayDate(lot.contract_start)} mono highlight="text-blue-300" />
                              <Field label="End Date"   value={fmtDisplayDate(lot.contract_end)}   mono highlight="text-blue-300" />
                            </div>
                          </div>
                        )}

                        {/* Payment Vouchers — sourced from paymentData */}
                        {(() => {
                          const lotPayments = getPaymentsForLot(lot.lot_no, lot.bill_no);
                          const ptuChecks = checkTrietTieu(lotPayments);
                          const totalPaid = lotPayments.reduce((s,p) => s + Number(String(p['SỐ TIỀN']||'').replace(/[^0-9.-]/g,'')||0), 0);
                          const pendingPTU = ptuChecks.filter(r => !r.trietTieu).length;
                          return (
                            <div>
                              <div className="flex items-center justify-between border-b border-slate-800 pb-1.5 mb-3">
                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">💳 Payment Records ({lotPayments.length})</p>
                                {pendingPTU > 0 && (
                                  <span className="bg-orange-600 text-white text-[9px] px-1.5 py-0.5 rounded-full font-bold">{pendingPTU} PTU pending clearance</span>
                                )}
                              </div>
                              {paymentData === null ? (
                                <p className="text-slate-600 italic text-[11px]">Payment data not loaded. Go to <span className="text-amber-400 font-bold">💳 Payment Data</span> để Load.</p>
                              ) : lotPayments.length === 0 ? (
                                <p className="text-slate-600 italic text-[11px]">No payment records for this lot.</p>
                              ) : (
                                <div className="space-y-1.5">
                                  {lotPayments.map((p, i) => {
                                    const parsed = parsePaymentContent(p['NỘI DUNG']);
                                    const ptuCheck = ptuChecks.find(r => r.phieu === p);
                                    const soTien = Number(String(p['SỐ TIỀN']||'').replace(/[^0-9.-]/g,'')||0);
                                    return (
                                      <div key={i} className={`rounded-lg px-3 py-2 border text-[11px] ${
                                        parsed.isPTU && ptuCheck && !ptuCheck.trietTieu
                                          ? 'bg-orange-950/30 border-orange-800/40'
                                          : parsed.isPTU && ptuCheck && ptuCheck.trietTieu
                                          ? 'bg-slate-800/40 border-slate-700/40 opacity-60'
                                          : parsed.isTrietTieu
                                          ? 'bg-blue-950/20 border-blue-800/30'
                                          : 'bg-slate-800/30 border-slate-700/30'
                                      }`}>
                                        <div className="flex items-center justify-between gap-2">
                                          <div className="flex items-center gap-1.5 flex-wrap">
                                            {parsed.isPTU && <span className="bg-orange-800/60 text-orange-300 text-[9px] px-1.5 py-0.5 rounded font-bold">PTU</span>}
                                            {parsed.isTrietTieu && <span className="bg-blue-800/60 text-blue-300 text-[9px] px-1.5 py-0.5 rounded font-bold">OFFSET</span>}
                                            <span className="font-mono font-bold text-amber-300">{p['SỐ PTT']}</span>
                                            <span className="text-slate-500">{p['NGÀY']}</span>
                                          </div>
                                          <span className="font-mono font-bold text-emerald-400 whitespace-nowrap">{fmtVND(soTien)}</span>
                                        </div>
                                        {parsed.isPTU && ptuCheck && !ptuCheck.trietTieu && (
                                          <p className="text-orange-400 text-[10px] mt-0.5 font-bold">⚠ No clearance record!</p>
                                        )}
                                        {parsed.isPTU && ptuCheck && ptuCheck.trietTieu && (
                                          <p className="text-slate-500 text-[10px] mt-0.5">✓ Cleared by: {ptuCheck.trietTieu['SỐ PTT']}</p>
                                        )}
                                      </div>
                                    );
                                  })}
                                  <div className="flex justify-between items-center pt-1.5 border-t border-slate-800 mt-2">
                                    <span className="text-[10px] text-slate-500 uppercase font-bold">Total payment</span>
                                    <span className="font-mono font-black text-emerald-300 text-xs">{fmtVND(totalPaid)}</span>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })()}
                      </div>

                      {/* RIGHT COLUMN — Invoices & Goods */}
                      <div className="p-6 space-y-4 overflow-y-auto">
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5">
                          📄 Invoices & Goods ({lotInvoices.length} inv · {lotGoods.length} items)
                        </p>
                        {lotInvoices.length === 0
                          ? <p className="text-slate-600 italic text-xs">No invoices declared for this lot.</p>
                          : lotInvoices.map(inv => {
                              const invGoods = goods.filter(g => String(g.invoice_no) === String(inv.invoice_no));
                              const invTotal = getInvoiceValueSum(inv);
                              return (
                                <div key={inv.invoice_no} className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                                  {/* Invoice header */}
                                  <div className="flex justify-between items-center px-4 py-2.5 border-b border-slate-800 bg-slate-950/60">
                                    <div className="flex items-center gap-2">
                                      <span className="font-mono font-bold text-indigo-300 text-xs">{inv.invoice_no}</span>
                                      <span className="text-[10px] text-slate-500">{fmtDisplayDate(inv.invoice_date)}</span>
                                      <span className="text-[10px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">{inv.incoterm}</span>
                                      {inv.currency && <span className="text-[10px] text-slate-500">{inv.currency}</span>}
                                    </div>
                                    <span className="font-mono font-bold text-emerald-400 text-xs">
                                      ${invTotal.toLocaleString(undefined,{minimumFractionDigits:2})}
                                    </span>
                                  </div>
                                  {/* Goods rows */}
                                  {invGoods.length > 0 ? (
                                    <div className="divide-y divide-slate-900">
                                      {invGoods.map(g => (
                                        <div key={g.id || g.goods_no} className="flex items-start justify-between px-4 py-2 text-[11px]">
                                          <div className="flex items-start gap-2 min-w-0">
                                            <span className="text-[9px] text-slate-600 w-4 text-right flex-shrink-0 mt-0.5">{g.goods_item}</span>
                                            <span className="text-emerald-600 font-mono flex-shrink-0">{(g.goods_no||'').split('*')[0].trim()}</span>
                                            <span className="text-slate-300 truncate">{g.goods_name_en}</span>
                                          </div>
                                          <div className="flex items-center gap-3 flex-shrink-0 ml-2 text-right">
                                            {g.qty1 && <span className="text-slate-500 font-mono">{g.qty1} {g.unit1||''}</span>}
                                            {g.sale_amount && <span className="text-amber-400 font-mono font-bold">${Number(g.sale_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</span>}
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  ) : (
                                    <p className="px-4 py-2 text-[10px] text-slate-600 italic">No goods items.</p>
                                  )}
                                </div>
                              );
                            })
                        }
                      </div>
                    </div>
                  </div>

                  {/* ── FOOTER ACTIONS ── */}
                  <div className="flex-shrink-0 border-t border-slate-800 bg-slate-900 px-6 py-3 flex justify-between items-center">
                    <span className="text-[10px] text-slate-600 italic">Read-only — use Edit to make changes</span>
                    <div className="flex gap-2">
                      {lot.loai_hinh === 'A12' && (
                        <button onClick={() => { setViewDetailLot(null); handleCreateContract(); setSelectedLotNo(lot.lot_no); }}
                          className="text-[11px] px-3 py-1.5 rounded-lg bg-emerald-700 hover:bg-emerald-600 text-white font-bold transition-all">
                          📄 Sale Contract
                        </button>
                      )}
                      <button onClick={() => { setViewDetailLot(null); startEditLot(lot); }}
                        className="text-[11px] px-3 py-1.5 rounded-lg bg-blue-700 hover:bg-blue-600 text-white font-bold transition-all">
                        ✏️ Edit
                      </button>
                      <button onClick={(e) => { setViewDetailLot(null); triggerDeleteLotConfirm(lot.lot_no, e); }}
                        className="text-[11px] px-3 py-1.5 rounded-lg bg-rose-900 hover:bg-rose-800 text-rose-300 font-bold transition-all">
                        🗑 Delete
                      </button>
                      <button onClick={() => setViewDetailLot(null)}
                        className="text-[11px] px-4 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold transition-all">
                        Close
                      </button>
                    </div>
                  </div>
                </div>

                <style>{`
                  @keyframes fadeIn  { from { opacity: 0; }               to { opacity: 1; } }
                  @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                `}</style>
              </div>
            );
          })()}
            </div>
          </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
