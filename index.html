    // =====================================================================
    // CHANG YANG IMS - GOOGLE SHEETS STORAGE LAYER
    // Dữ liệu lưu trên Google Sheets qua Apps Script Web App
    // IndexedDB được dùng làm cache offline tạm thời
    // =====================================================================

    const CY_DB_NAME = 'ChangYangIMS_v2';
    const CY_DB_VERSION = 1;
    const CY_STORE = 'keyvalue';
    let _cyDb = null;

    // --- IndexedDB (cache offline) ---
    function cyOpenDB() {
      if (_cyDb) return Promise.resolve(_cyDb);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(CY_DB_NAME, CY_DB_VERSION);
        req.onupgradeneeded = e => e.target.result.createObjectStore(CY_STORE);
        req.onsuccess = e => { _cyDb = e.target.result; resolve(_cyDb); };
        req.onerror = e => reject(e.target.error);
      });
    }
    window.cyLocalGet = async (key) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const req = db.transaction(CY_STORE,'readonly').objectStore(CY_STORE).get(key);
        req.onsuccess = () => res(req.result ?? null);
        req.onerror = () => rej(req.error);
      });
    };
    window.cyLocalSet = async (key, value) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(CY_STORE,'readwrite');
        tx.objectStore(CY_STORE).put(value, key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    };

    // --- Google Sheets API (qua Apps Script Web App) ---
    window.CY_API_URL = localStorage.getItem('cy_api_url') || '';

    window.cyApiCall = async (action, payload = {}) => {
      const url = window.CY_API_URL;
      if (!url) throw new Error('NO_API_URL');
      const body = JSON.stringify({ action, ...payload });
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // Apps Script yêu cầu text/plain để tránh CORS preflight
        body
      });
      if (!res.ok) throw new Error('HTTP_' + res.status);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message || 'API_ERROR');
      return json.data;
    };

    // Đọc toàn bộ 1 sheet
    window.cySheetGet = async (sheet) => {
      const data = await window.cyApiCall('getSheet', { sheet });
      await window.cyLocalSet('cy_' + sheet, data); // cache offline
      return data;
    };

    // Ghi đè toàn bộ 1 sheet
    window.cySheetSet = async (sheet, data) => {
      await window.cyLocalSet('cy_' + sheet, data); // lưu cache ngay
      await window.cyApiCall('setSheet', { sheet, data }); // ghi lên Sheets
    };

    // Đọc tất cả sheets cùng lúc
    window.cyLoadAll = async () => {
      const data = await window.cyApiCall('getAll');
      for (const [k, v] of Object.entries(data)) {
        await window.cyLocalSet('cy_' + k, v);
      }
      return data;
    };
  </script>

        try { return JSON.parse(localStorage.getItem('cy_supplier_history') || '["CHANG YANG MATERIAL CORP."]'); } catch { return ['CHANG YANG MATERIAL CORP.']; }
      });
      const addCarrierHistory = (val) => {
        if (!val || carrierHistory.includes(val)) return;
        const next = [val, ...carrierHistory].slice(0, 30);
        setCarrierHistory(next);
        localStorage.setItem('cy_carrier_history', JSON.stringify(next));
      };
      const addSupplierHistory = (val) => {
        if (!val || supplierHistory.includes(val)) return;
        const next = [val, ...supplierHistory].slice(0, 30);
        setSupplierHistory(next);
        localStorage.setItem('cy_supplier_history', JSON.stringify(next));
      };

      // Các Form nhập liệu của nghiệp vụ chính
      const [lotForm, setLotForm] = useState({
        lot_no: '', stt: 1, lot_date: new Date().toISOString().substring(0, 10), get_docs_date: new Date().toISOString().substring(0, 10),
        factory_no: '', bill_no: '', bill_date: '', pol: '', pod: '', bill_term: 'Freight Prepaid',
        carrier: '', // Hãng tàu / FWD
        transport_type: 'SEA_CONT', // AIR | EXPRESS | SEA_CONT | SEA_CFS | BONDED | TRUCK
        is_cont: true, cont_no: '', seal_no: '', cont_type: '40HC',
        pkg_qty: 0, gw: 0, cbm: 0, eta: '', atc_date: '',
        origin_country: 'TAIWAN', loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', sale_qty: 0
      });

      const [invoiceForm, setInvoiceForm] = useState({
        invoice_no: '', lot_no: '', bill_no: '', invoice_date: new Date().toISOString().substring(0, 10),
        incoterm: 'CIF', total_amount: 0, foc_amount: 0, plus_sea_freight: 0, handling_charges: 0, other_charges: 0,
        other_charges_note: '',
        is_hang_chung_bill: false, loai_hinh: 'A12', loai_hinh_con: 'DEFAULT',
        supplier: 'CHANG YANG MATERIAL CORP.',
        contract_start: '', contract_end: ''
      });

      const [goodsForm, setGoodsForm] = useState({
        invoice_no: '', goods_no: '', goods_item: 1, goods_name_en: '', goods_unit_en: 'PCS', goods_unit_en2: '',
        goods_name_local: '', goods_unit_local: 'Cái', goods_unit_local2: '', hs_code: '', invoice_description: '',
        qty1: 1, unit1: 'Cái', qty2: 0, unit2: '', price: 0, customs_name: ''
      });

      const [selectedFactories, setSelectedFactories] = useState([]);
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4500);
      };

      // Sinh Số Thứ Tự (STT) trống nhỏ nhất tự động
      const getFirstVacantSeq = () => {
        const activeSeqs = lots.map(l => Number(l.stt)).filter(n => !isNaN(n) && n > 0);
        const uniqueSeqs = Array.from(new Set(activeSeqs)).sort((a, b) => a - b);
        let nextSeq = 1;
        for (let i = 0; i < uniqueSeqs.length; i++) {
          if (uniqueSeqs[i] === nextSeq) nextSeq++; else if (uniqueSeqs[i] > nextSeq) break;
        }
        return nextSeq;
      };

      // Hàm tự động phát sinh mã lô
      const generateLotNoString = (type, subType, sttNum) => {
        const yy = new Date().getFullYear().toString().slice(-2);
        if (type === 'A12') {
          return subType === 'H11' ? `CH${sttNum}-${yy}PMD` : subType === 'DT' ? `CH${sttNum}DT-${yy}` : `CH${sttNum}KD-${yy}`;
        } else if (type === 'E21') {
          return subType === 'CHUYEN_TIEP' ? `CH${sttNum}-${yy}CT` : `CH${sttNum}-${yy}`;
        }
        return `CH${sttNum}-${yy}`;
      };

      const getUniqueSuppliers = () => Array.from(new Set(lots.map(l => l.supplier).filter(Boolean)));
      const getUniquePols = () => Array.from(new Set(lots.map(l => l.pol).filter(Boolean).map(p => p.trim().toUpperCase())));
      const getUniquePods = () => Array.from(new Set(lots.map(l => l.pod).filter(Boolean).map(p => p.trim().toUpperCase())));

      // Tự động nhảy STT & Mã lô khi mở tab thêm Lô Mới
      useEffect(() => {
        if (showAddModal && modalMode === 'add' && modalTab === 'lot') {
          const vacantStt = getFirstVacantSeq();
          const calculatedLotNo = generateLotNoString(lotForm.loai_hinh, lotForm.loai_hinh_con, vacantStt);
          setLotForm(prev => ({ ...prev, lot_no: calculatedLotNo, stt: vacantStt }));
        }
      }, [showAddModal, lotForm.loai_hinh, lotForm.loai_hinh_con, lots, modalMode, modalTab]);

      useEffect(() => {
        setLotForm(prev => ({ ...prev, factory_no: selectedFactories.join(', ') }));
      }, [selectedFactories]);

      // Phân tích Hàng Chung Bill
      const checkBillNoGroupingHelper = (typedBillNo, currentLoaiHinh, currentLoaiHinhCon, isHangChungBill) => {
        if (!typedBillNo || !isHangChungBill) return { matches: false, status: 'NORMAL' };
        const matchingInvoices = invoices.filter(i => i.bill_no && i.bill_no.trim().toLowerCase() === typedBillNo.trim().toLowerCase());
        if (matchingInvoices.length === 0) return { matches: false, status: 'NEW_BILL' };
        
        const relatedLots = lots.filter(l => matchingInvoices.some(i => i.lot_no === l.lot_no));
        if (relatedLots.length === 0) return { matches: false, status: 'NEW_BILL' };

        const sameTypeLot = relatedLots.find(l => l.loai_hinh === currentLoaiHinh && l.loai_hinh_con === currentLoaiHinhCon);
        if (sameTypeLot) {
          return {
            matches: true, status: 'SAME_BILL_SAME_TYPE', proposedLotNo: sameTypeLot.lot_no, stt: sameTypeLot.stt,
            message: `Hàng chung Bill & Cùng loại hình với Lô [${sameTypeLot.lot_no}]. Hóa đơn này sẽ tự động ghép vào Lô hiện tại.`
          };
        } else {
          const baseLot = relatedLots[0];
          const sharedStt = baseLot.stt;
          const computedLotNo = generateLotNoString(currentLoaiHinh, currentLoaiHinhCon, sharedStt);
          const existingNewLot = lots.find(l => l.lot_no === computedLotNo);
          return {
            matches: true, status: 'SAME_BILL_DIFF_TYPE', proposedLotNo: computedLotNo, stt: sharedStt, existingNewLot: !!existingNewLot, baseLot,
            message: `Trùng số Bill với Lô [${baseLot.lot_no}] nhưng KHÁC loại hình. Hệ thống sẽ tự tách thành Lô mới [${computedLotNo}] dùng chung Số Thứ Tự [STT: ${sharedStt}]!`
          };
        }
      };

      const activeBillStatus = checkBillNoGroupingHelper(invoiceForm.bill_no, invoiceForm.loai_hinh, invoiceForm.loai_hinh_con, invoiceForm.is_hang_chung_bill);

      // --- CÁC HÀM LƯU DỮ LIỆU CHÍNH (MASTER - DETAIL) ---
      const handleSaveLot = (e) => {
        e.preventDefault();
        if (!lotForm.lot_no.trim()) return showNotification("Mã lô hàng không được trống", "error");
        if (modalMode === 'add' && lots.some(l => l.lot_no.toLowerCase() === lotForm.lot_no.trim().toLowerCase())) {
          return showNotification("Mã lô hàng này đã tồn tại trên thiết bị!", "error");
        }

        const finalLot = { ...lotForm, lot_no: lotForm.lot_no.trim(), stt: Number(lotForm.stt), pkg_qty: Number(lotForm.pkg_qty) || 0, gw: Number(lotForm.gw) || 0, cbm: Number(lotForm.cbm) || 0, sale_qty: Number(lotForm.sale_qty) || 0 };
        if (finalLot.carrier) addCarrierHistory(finalLot.carrier.trim());
        let newLots = [];
        if (modalMode === 'add') {
          newLots = [finalLot, ...lots];
          setInvoiceForm(prev => ({ ...prev, lot_no: finalLot.lot_no, bill_no: finalLot.bill_no, loai_hinh: finalLot.loai_hinh, loai_hinh_con: finalLot.loai_hinh_con }));
          setModalTab('invoice');
        } else {
          newLots = lots.map(l => l.lot_no === finalLot.lot_no ? finalLot : l);
          setShowAddModal(false);
        }
        saveLotsToStorage(newLots);
        setSelectedLotNo(finalLot.lot_no);
        showNotification(`Đã ${modalMode === 'add' ? 'tạo mới' : 'cập nhật'} Lô hàng ${finalLot.lot_no}`);
      };

      const handleSaveInvoice = (e) => {
        e.preventDefault();
        if (!invoiceForm.invoice_no.trim()) return showNotification("Vui lòng điền Số hóa đơn!", "error");
        let targetLotNo = invoiceForm.lot_no;

        if (invoiceForm.is_hang_chung_bill && activeBillStatus.matches) {
          targetLotNo = activeBillStatus.proposedLotNo;
          if (activeBillStatus.status === 'SAME_BILL_DIFF_TYPE' && !activeBillStatus.existingNewLot) {
            const baseLot = activeBillStatus.baseLot;
            const newAutoLot = {
              lot_no: activeBillStatus.proposedLotNo, stt: Number(activeBillStatus.stt), lot_date: invoiceForm.invoice_date || baseLot.lot_date,
              get_docs_date: baseLot.get_docs_date || new Date().toISOString().substring(0, 10), factory_no: baseLot.factory_no, bill_no: invoiceForm.bill_no,
              bill_date: baseLot.bill_date || '', pol: baseLot.pol || '', pod: baseLot.pod || '', bill_term: baseLot.bill_term || 'Freight Prepaid',
              transport_type: baseLot.transport_type || 'SEA_CONT',
              is_cont: baseLot.is_cont, cont_no: baseLot.cont_no || '', seal_no: baseLot.seal_no || '', cont_type: baseLot.cont_type || '40HC',
              pkg_qty: 0, gw: 0, cbm: 0, eta: baseLot.eta || '', atc_date: '', origin_country: baseLot.origin_country || 'TAIWAN',
              loai_hinh: invoiceForm.loai_hinh, loai_hinh_con: invoiceForm.loai_hinh_con, sale_qty: 0
            };
            saveLotsToStorage([newAutoLot, ...lots]);
            showNotification(`Tách Lô mới tự động: [${newAutoLot.lot_no}] chung STT: ${newAutoLot.stt}`);
          }
        }

        const finalInvoice = {
          ...invoiceForm, invoice_no: invoiceForm.invoice_no.trim(), lot_no: targetLotNo,
          total_amount: Number(invoiceForm.total_amount) || 0, foc_amount: Number(invoiceForm.foc_amount) || 0,
          plus_sea_freight: Number(invoiceForm.plus_sea_freight) || 0, handling_charges: Number(invoiceForm.handling_charges) || 0, other_charges: Number(invoiceForm.other_charges) || 0,
        };
        if (finalInvoice.supplier) addSupplierHistory(finalInvoice.supplier.trim());

        let newInvoices = [];
        if (modalMode === 'add') {
          if (invoices.some(i => i.invoice_no.toLowerCase() === invoiceForm.invoice_no.trim().toLowerCase())) {
            return showNotification("Số hóa đơn này đã tồn tại!", "error");
          }
          newInvoices = [finalInvoice, ...invoices];
          setGoodsForm(prev => ({ 
            ...prev, 
            invoice_no: finalInvoice.invoice_no, 
            goods_no: '', 
            goods_name_en: '', 
            goods_name_local: '', 
            hs_code: '', 
            qty1: 1, 
            unit1: 'Cái', 
            qty2: 0, 
            unit2: '', 
            price: 0, 
            customs_name: '' 
          }));
          setModalTab('goods');
        } else {
          newInvoices = invoices.map(i => i.invoice_no === finalInvoice.invoice_no ? finalInvoice : i);
          setShowAddModal(false);
        }
        saveInvoicesToStorage(newInvoices);
        setSelectedLotNo(targetLotNo);
        setSelectedInvoiceNo(finalInvoice.invoice_no);
        showNotification(`Đã lưu Hóa đơn ${finalInvoice.invoice_no}`);
      };

      // Hàm lưu mặt hàng chi tiết sau khi đã qua bước xác nhận
      const saveGoodsItemDirectly = (itemToSave) => {
        const isEditing = modalMode === 'edit' && itemToSave.id;
        const goodsId = isEditing ? itemToSave.id : "goods_" + Date.now();
        const finalGoods = { ...itemToSave, id: goodsId };

        let newGoods = [];
        if (isEditing) {
          newGoods = goods.map(g => g.id === goodsId ? finalGoods : g);
          setShowAddModal(false);
        } else {
          newGoods = [...goods, finalGoods];
          setGoodsForm({
            invoice_no: finalGoods.invoice_no, goods_no: '', goods_item: finalGoods.goods_item + 1, goods_name_en: '',
            goods_unit_en: 'PCS', goods_unit_en2: '', goods_name_local: 'Hàng hóa nhập khẩu mới', goods_unit_local: 'Cái', goods_unit_local2: '', hs_code: '', invoice_description: '',
            qty1: 1, unit1: 'Cái', qty2: 0, unit2: '', price: 0, customs_name: ''
          });
        }
        saveGoodsToStorage(newGoods);
        showNotification(`Đã lưu sản phẩm ${finalGoods.goods_no} thành công.`);
      };

      const handleSaveGoods = (e) => {
        e.preventDefault();
        if (!goodsForm.goods_no.trim() || !goodsForm.goods_name_en.trim()) return showNotification("Vui lòng điền đủ thông tin!", "error");

        // Thành tiền tự động = đơn giá x số lượng 1
        const computedAmount = (Number(goodsForm.qty1) || 0) * (Number(goodsForm.price) || 0);

        // Tạo tên khai báo hải quan mặc định chuẩn nếu trống
        const defaultCustomsName = `${goodsForm.goods_name_local} / ${goodsForm.goods_name_en}`;
        const finalCustomsName = goodsForm.customs_name.trim() || defaultCustomsName;

        const candidateGoods = { 
          ...goodsForm, 
          goods_no: goodsForm.goods_no.trim(), 
          goods_item: Number(goodsForm.goods_item) || 1, 
          qty1: Number(goodsForm.qty1) || 0,
          qty2: Number(goodsForm.qty2) || 0,
          price: Number(goodsForm.price) || 0,
          customs_name: finalCustomsName,
          sale_amount: computedAmount 
        };

        // Hỏi xác nhận nếu người dùng đổi tên khai báo hải quan khác với công thức mặc định (Yêu cầu 3)
        if (finalCustomsName !== defaultCustomsName) {
          setCustomsNameConfirmState({
            isOpen: true,
            proposedName: finalCustomsName,
            backupForm: candidateGoods
          });
        } else {
          saveGoodsItemDirectly(candidateGoods);
        }
      };

      const handleInlineAtcUpdate = (lotNo, dateString) => {
        const newLots = lots.map(l => l.lot_no === lotNo ? { ...l, atc_date: dateString } : l);
        saveLotsToStorage(newLots);
        showNotification(`Đã cập nhật Ngày nhập kho ATC cho lô ${lotNo}`);
        setInlineAtcLotNo(null);
      };

      // --- CÁC HÀM CRUD CHO TỪ ĐIỂN SẢN PHẨM GỐC ---
      const handleOpenAddDict = () => {
        setDictModalMode('add');
        setDictForm({
          goods_no: '', hs_code: '', goods_name_en: '', goods_name_local: '',
          goods_unit_en: 'PCS', goods_unit_local: 'Cái', original_goods_no: ''
        });
        setShowDictModal(true);
      };

      const handleOpenEditDict = (item, e) => {
        if (e) e.stopPropagation();
        setDictModalMode('edit');
        setDictForm({
          goods_no: item.goods_no, hs_code: item.hs_code, goods_name_en: item.goods_name_en, goods_name_local: item.goods_name_local,
          goods_unit_en: item.goods_unit_en || 'PCS', goods_unit_local: item.goods_unit_local || 'Cái', original_goods_no: item.goods_no
        });
        setShowDictModal(true);
      };

      const handleSaveDictItem = (e) => {
        e.preventDefault();
        if (!dictForm.goods_no.trim() || !dictForm.hs_code.trim() || !dictForm.goods_name_en.trim()) {
          return showNotification("Vui lòng nhập đầy đủ các trường bắt buộc!", "error");
        }

        const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
        const newItem = {
          goods_no: dictForm.goods_no.trim(),
          hs_code: dictForm.hs_code.trim(),
          goods_name_en: dictForm.goods_name_en.trim(),
          goods_name_local: dictForm.goods_name_local.trim() || 'Hàng nhập khẩu',
          goods_unit_en: dictForm.goods_unit_en.trim() || 'PCS',
          goods_unit_local: dictForm.goods_unit_local.trim() || 'Cái'
        };

        let updatedDict = [];
        if (dictModalMode === 'add') {
          if (targetDict.some(item => item.goods_no.toLowerCase() === newItem.goods_no.toLowerCase())) {
            return showNotification("Mã sản phẩm này đã tồn tại trong danh mục!", "error");
          }
          updatedDict = [newItem, ...targetDict];
        } else {
          updatedDict = targetDict.map(item => item.goods_no === dictForm.original_goods_no ? newItem : item);
        }

        if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
        setShowDictModal(false);
        showNotification(`Đã cập nhật danh mục ${dbSelectedTab} thành công!`);
      };

      const handleDeleteDictConfirm = (item, e) => {
        if (e) e.stopPropagation();
        setConfirmState({
          isOpen: true,
          title: `Xác nhận xóa khỏi Danh mục ${dbSelectedTab}`,
          message: `Bạn có chắc muốn xóa mã hàng [${item.goods_no}] ra khỏi cơ sở dữ liệu gốc? Thao tác này không thể hoàn tác.`,
          onConfirm: () => {
            const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
            const updatedDict = targetDict.filter(i => i.goods_no !== item.goods_no);
            if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
            setConfirmState(prev => ({ ...prev, isOpen: false }));
            showNotification(`Đã xóa thành công [${item.goods_no}] ra khỏi từ điển.`);
          }
        });
      };

      // --- CHỨC NĂNG IMPORT FILE EXCEL THÔNG MINH CHO TỪ ĐIỂN ---
      const handleExcelImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            const rawJson = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (rawJson.length < 2) {
              return showNotification("Tệp Excel trống rỗng hoặc không có dữ liệu!", "error");
            }

            const headers = rawJson[0].map(h => h
              ? h.toString().toLowerCase().trim()
                  .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                  .replace(/[^a-z0-9]/g, '')
              : '');

            const idxGoodsNo = headers.findIndex(h => h.includes('mahang') || h.includes('goodsno') || h.includes('masanpham'));
            const idxHsCode = headers.findIndex(h => h.includes('hscode') || h.includes('mahs'));
            const idxNameEn = headers.findIndex(h => h.includes('tienganh') || h.includes('english') || h.includes('nameen'));
            const idxNameLocal = headers.findIndex(h => h.includes('tiengviet') || h.includes('vietnamese') || h.includes('namevn'));

            const finalGoodsNo  = idxGoodsNo  !== -1 ? idxGoodsNo  : 0;
            const finalHsCode   = idxHsCode   !== -1 ? idxHsCode   : 1;
            const finalNameEn   = idxNameEn   !== -1 ? idxNameEn   : 2;
            const finalNameLocal= idxNameLocal !== -1 ? idxNameLocal: 3;

            const importedItems = [];
            for (let i = 1; i < rawJson.length; i++) {
              const row = rawJson[i];
              if (!row || !row[finalGoodsNo]) continue;

              importedItems.push({
                goods_no: row[finalGoodsNo].toString().trim(),
                hs_code: row[finalHsCode] ? row[finalHsCode].toString().trim() : '00000000',
                goods_name_en: row[finalNameEn] ? row[finalNameEn].toString().trim() : 'No Description',
                goods_name_local: row[finalNameLocal] ? row[finalNameLocal].toString().trim() : 'Chưa có mô tả tiếng Việt',
                goods_unit_en: 'PCS',
                goods_unit_local: 'Cái'
              });
            }

            if (importedItems.length === 0) {
              return showNotification("Không đọc được mặt hàng nào hợp lệ!", "warning");
            }

            const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
            let updatedDict = [...targetDict];
            importedItems.forEach(newItem => {
              const idx = updatedDict.findIndex(i => i.goods_no.toLowerCase() === newItem.goods_no.toLowerCase());
              if (idx !== -1) {
                updatedDict[idx] = newItem;
              } else {
                updatedDict.push(newItem);
              }
            });

            if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
            showNotification(`Import thành công! Đã cập nhật ${importedItems.length} mặt hàng vào Danh mục ${dbSelectedTab}.`);
          } catch (err) {
            console.error(err);
            showNotification("Đọc Excel thất bại! Vui lòng kiểm tra lại cấu trúc file.", "error");
          }
        };
        reader.readAsArrayBuffer(file);
      };

      // --- CÁC HÀM XÓA CASCADING (XÓA PHÂN CẤP TRÁNH RÁC DATABASE) ---
      const executeDeleteLot = (targetLotNo) => {
        const remainingLots = lots.filter(l => l.lot_no !== targetLotNo);
        const remainingInvoices = invoices.filter(i => i.lot_no !== targetLotNo);
        const relatedInvoiceNos = invoices.filter(i => i.lot_no === targetLotNo).map(i => i.invoice_no);
        const remainingGoods = goods.filter(g => !relatedInvoiceNos.includes(g.invoice_no));

        saveLotsToStorage(remainingLots);
        saveInvoicesToStorage(remainingInvoices);
        saveGoodsToStorage(remainingGoods);
        
        setSelectedLotNo(null);
        setSelectedInvoiceNo(null);
        setConfirmState(prev => ({ ...prev, isOpen: false }));
        showNotification(`Đã xóa hoàn toàn Lô hàng ${targetLotNo} cùng toàn bộ hóa đơn phụ thuộc.`);
      };

      const executeDeleteInvoice = (targetInvoiceNo) => {
        const remainingInvoices = invoices.filter(i => i.invoice_no !== targetInvoiceNo);
        const remainingGoods = goods.filter(g => g.invoice_no !== targetInvoiceNo);

        saveInvoicesToStorage(remainingInvoices);
        saveGoodsToStorage(remainingGoods);
        
        setSelectedInvoiceNo(null);
        setConfirmState(prev => ({ ...prev, isOpen: false }));
        showNotification(`Đã xóa hóa đơn ${targetInvoiceNo}`);
      };

      const executeDeleteGoods = (goodsId) => {
        const remainingGoods = goods.filter(g => g.id !== goodsId);
        saveGoodsToStorage(remainingGoods);
        setConfirmState(prev => ({ ...prev, isOpen: false }));
        showNotification("Đã xóa dòng mặt hàng thành công!");

                            type="text" required list="goods-en-names-datalist" value={goodsForm.goods_name_en} 
                            onChange={(e) => { const name = e.target.value; setGoodsForm(prev => ({...prev, goods_name_en: name})); handleEnglishNameAutoLookup(name, goodsForm.invoice_no); }} 
                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-amber-300 font-bold" 
                          />
                          <datalist id="goods-en-names-datalist">
                            {(() => {
                              const currentInv = invoices.find(i => i.invoice_no === goodsForm.invoice_no);
                              const targetDict = currentInv?.loai_hinh === 'E21' ? dictE21 : dictA12;
                              return targetDict.map((item, idx) => <option key={idx} value={item.goods_name_en}>{item.goods_no} - HS: {item.hs_code}</option>);
                            })()}
                          </datalist>
                        </div>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Mã Sản Phẩm (Tự động điền)</label>
                          <input type="text" readOnly value={goodsForm.goods_no} className="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-xs text-amber-400 font-mono font-bold focus:outline-none" />
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">HS Code (Tự động điền)</label>
                          <input type="text" readOnly value={goodsForm.hs_code} className="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none" />
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-300 mb-1">Số lượng 1 *</label>
                          <input type="number" step="any" required value={goodsForm.qty1 || ''} onChange={e => setGoodsForm({...goodsForm, qty1: Number(e.target.value)})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" placeholder="0" />
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-300 mb-1">Đơn vị tính 1 *</label>
                          <input type="text" required value={goodsForm.goods_unit_local || ''} onChange={e => setGoodsForm({...goodsForm, goods_unit_local: e.target.value, unit1: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" placeholder="VD: Cái, Kg" />
                        </div>
                      </div>

                      <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Số lượng 2 (Tùy chọn)</label>
                          <input type="number" step="any" value={goodsForm.qty2 || ''} onChange={e => setGoodsForm({...goodsForm, qty2: Number(e.target.value)})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" placeholder="0" />
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Đơn vị tính 2 (Tùy chọn)</label>
                          <input type="text" value={goodsForm.goods_unit_local2 || ''} onChange={e => setGoodsForm({...goodsForm, goods_unit_local2: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" placeholder="VD: Hộp, Thùng" />
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-300 mb-1">Đơn giá *</label>
                          <input type="number" step="any" required value={goodsForm.price || ''} onChange={e => setGoodsForm({...goodsForm, price: Number(e.target.value)})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" placeholder="0.00" />
                        </div>
                      </div>

                      <div>
                        <label className="block text-[11px] text-slate-400 mb-1">Tên Tiếng Việt Gốc (Chỉ đọc)</label>
                        <textarea readOnly rows="1" value={goodsForm.goods_name_local} className="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-xs text-slate-400 focus:outline-none" />
                      </div>

                      {/* Tên khai báo hải quan (Yêu cầu 3) */}
                      <div>
                        <label className="block text-[11px] text-emerald-400 mb-1 font-bold uppercase tracking-wider">📋 Tên Khai Báo Hải Quan (Tự động bắt hoặc Chỉnh sửa thủ công)</label>
                        <input 
                          type="text" 
                          value={goodsForm.customs_name} 
                          onChange={e => setGoodsForm({...goodsForm, customs_name: e.target.value})} 
                          placeholder="Mặc định: Tên tiếng Việt / Tên tiếng Anh" 
                          className="w-full bg-slate-950 border border-emerald-900/50 rounded px-3 py-2 text-xs text-emerald-300 font-mono focus:outline-none focus:border-emerald-500"
                        />
                      </div>

                      <div className="bg-slate-950/40 p-4 border border-slate-800 rounded-xl flex justify-between items-center">
                        <div>
                          <span className="text-xs text-slate-500 block">Thành tiền tạm tính:</span>
                          <span className="text-base font-black text-amber-400 font-mono">${((Number(goodsForm.qty1) || 0) * (Number(goodsForm.price) || 0)).toLocaleString(undefined, {minimumFractionDigits: 2})} USD</span>
                        </div>
                      </div>

                      {/* Chức năng Import Excel nhanh hàng hoá trực tiếp từ Modal (Yêu cầu 4) */}
                      <div className="pt-4 border-t border-slate-800 flex justify-between items-center flex-wrap gap-2">
                        <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded text-xs flex items-center gap-1.5 shadow">
                          📥 Import Excel Hàng Hoá
                          <input type="file" accept=".xlsx, .xls" onChange={(e) => { handleGoodsExcelImport(e, goodsForm.invoice_no); }} className="hidden" />
                        </label>
                        <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg text-xs font-bold">➕ Ghi Nhận Mặt Hàng</button>
                      </div>
                    </form>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* --- BẢNG KÊ PREVIEW IN (PRINT MODAL) --- */}
          {showMasterInvoiceModal && selectedLotNo && (
            <div className="fixed inset-0 z-50 bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col my-8">
                <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                  <h3 className="font-bold text-xs uppercase text-amber-400">📋 Xem trước bản in Bảng kê hóa đơn (Mẫu 02)</h3>
                  <div className="flex gap-2">
                    <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg text-xs">🖨️ In Bảng Kê</button>
                    <button onClick={() => setShowMasterInvoiceModal(false)} className="bg-slate-800 text-slate-300 font-bold px-3 py-2 rounded text-xs">Đóng</button>
                  </div>
                </div>

                <div className="p-8 bg-white text-slate-950 font-serif text-sm overflow-y-auto print-area max-h-[75vh]" id="printable-master-invoice">
                  <div className="flex justify-between items-start text-xs border-b border-slate-300 pb-3">
                    <div>
                      <h1 className="font-bold text-sm uppercase">CÔNG TY TNHH CHANG YANG VIỆT NAM</h1>
                      <p>Mã xưởng liên kết: {lots.find(l => l.lot_no === selectedLotNo)?.factory_no}</p>
                    </div>
                    <div className="text-right">
                      <h3 className="font-bold">Mẫu số 02/BKHĐ/GSQL</h3>
                      <p className="text-[10px]">TT 39/2018/TT-BTC</p>
                    </div>
                  </div>
                  <div className="text-center my-6">
                    <h2 className="text-base font-bold uppercase">BẢNG KÊ HÓA ĐƠN THƯƠNG MẠI HÀNG HÓA NHẬP KHẨU</h2>
                    <p className="text-xs font-semibold mt-1">SỐ LÔ QUẢN LÝ: {selectedLotNo}</p>
                  </div>

                  <table className="w-full text-left text-xs border-collapse border border-slate-400 mt-4 font-sans">
                    <thead>
                      <tr className="bg-slate-100 border-b border-slate-400 font-bold">
                        <th className="p-2 border-r border-slate-400 text-center w-10">STT</th>
                        <th className="p-2 border-r border-slate-400">Số HĐ (Invoice No)</th>
                        <th className="p-2 border-r border-slate-400">Ngày HĐ</th>
                        <th className="p-2 border-r border-slate-400">Hợp đồng (Bắt đầu ➔ Kết thúc)</th>
                        <th className="p-2 border-r border-slate-400 text-right">Trị Giá (USD)</th>
                      </tr>
                    </thead>
                    <tbody>
                      {currentInvoices.map((inv, index) => (
                        <tr key={inv.invoice_no} className="border-b border-slate-400">
                          <td className="p-2 border-r border-slate-400 text-center">{index + 1}</td>
                          <td className="p-2 border-r border-slate-400 font-mono font-bold">{inv.invoice_no}</td>
                          <td className="p-2 border-r border-slate-400 font-mono">{inv.invoice_date}</td>
                          <td className="p-2 border-r border-slate-400 font-mono text-[11px]">
                            {inv.contract_start ? `${inv.contract_start} đến ${inv.contract_end}` : 'Chưa thiết lập'}
                          </td>
                          <td className="p-2 border-r border-slate-400 text-right font-mono">${getInvoiceValueSum(inv).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        </tr>
                      ))}
                      <tr className="bg-slate-100 font-bold text-xs">
                        <td colSpan="4" className="p-2.5 border-r border-slate-400 uppercase text-center">TỔNG TRỊ GIÁ TRÊN BẢNG KÊ</td>
                        <td className="p-2.5 text-right font-mono">${getSelectedLotTotalValue().toLocaleString(undefined, {minimumFractionDigits: 2})} USD</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
