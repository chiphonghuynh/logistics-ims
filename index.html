    const CY_DB_NAME = 'ChangYangIMS_v2';
    const CY_DB_VERSION = 1;
    const CY_STORE = 'keyvalue';
    let _cyDb = null;

    function cyOpenDB() {
      if (_cyDb) return Promise.resolve(_cyDb);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(CY_DB_NAME, CY_DB_VERSION);
        req.onupgradeneeded = e => e.target.result.createObjectStore(CY_STORE);
        req.onsuccess = e => { _cyDb = e.target.result; resolve(_cyDb); };
        req.onerror = e => reject(e.target.error);
      });
    }
    window.cyLocalGet = async (key) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const req = db.transaction(CY_STORE,'readonly').objectStore(CY_STORE).get(key);
        req.onsuccess = () => res(req.result ?? null);
        req.onerror = () => rej(req.error);
      });
    };
    window.cyLocalSet = async (key, value) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(CY_STORE,'readwrite');
        tx.objectStore(CY_STORE).put(value, key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    };

    window.CY_API_URL = localStorage.getItem('cy_api_url') || '';

    window.cyApiCall = async (action, payload = {}) => {
      const url = window.CY_API_URL;
      if (!url) throw new Error('NO_API_URL');
      const body = JSON.stringify({ action, ...payload });
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, 
        body
      });
      if (!res.ok) throw new Error('HTTP_' + res.status);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message || 'API_ERROR');
      return json.data;
    };

    window.cySheetGet = async (sheet) => {
      const data = await window.cyApiCall('getSheet', { sheet });
      await window.cyLocalSet('cy_' + sheet, data);
      return data;
    };

    window.cySheetSet = async (sheet, data) => {
      await window.cyLocalSet('cy_' + sheet, data); 
      await window.cyApiCall('setSheet', { sheet, data }); 
    };

    window.cyLoadAll = async () => {
      const data = await window.cyApiCall('getAll');
      for (const [k, v] of Object.entries(data)) {
        await window.cyLocalSet('cy_' + k, v);
      }
      return data;
    };
  </script>

      const checkInvoiceDuplicate = (invNo, currentIndex) => {

        // 1. Kiểm tra xem có trùng với ô nhập liệu nào khác ngay trong Modal không
        const duplicateInModal = modalInvoices.some((inv, i) => i !== currentIndex && inv.invoice_no && inv.invoice_no.trim().toLowerCase() === target);
        if (duplicateInModal) return true;

        // 2. Kiểm tra xem có trùng với hóa đơn của các lô hàng khác đã lưu trên hệ thống không
        const currentLotNo = modalMode === 'add' ? lotForm.lot_no : selectedLotNo;
        const duplicateInGlobal = invoices.some(i => i.lot_no !== currentLotNo && i.invoice_no && i.invoice_no.trim().toLowerCase() === target);
        return duplicateInGlobal;
      };
      const [selectedFactories, setSelectedFactories] = useState([]);

      const getFirstVacantSeq = () => {
        const activeSeqs = lots.map(l => Number(l.stt)).filter(n => !isNaN(n) && n > 0);
        const uniqueSeqs = Array.from(new Set(activeSeqs)).sort((a, b) => a - b);
        let nextSeq = 1;
        for (let i = 0; i < uniqueSeqs.length; i++) {
          if (uniqueSeqs[i] === nextSeq) nextSeq++; else if (uniqueSeqs[i] > nextSeq) break;
        }
        return nextSeq;
      };

      const generateLotNoString = (type, subType, sttNum) => {
        const yy = new Date().getFullYear().toString().slice(-2);
        if (type === 'A12') {
          return subType === 'H11' ? `CH${sttNum}-${yy}PMD` : subType === 'DT' ? `CH${sttNum}DT-${yy}` : `CH${sttNum}KD-${yy}`;
        } else if (type === 'E21') {
          return subType === 'CHUYEN_TIEP' ? `CH${sttNum}-${yy}CT` : `CH${sttNum}-${yy}`;
        }
        return `CH${sttNum}-${yy}`;
      };

      useEffect(() => {

          setLotForm(prev => ({ ...prev, lot_no: calculatedLotNo, stt: vacantStt }));

      const checkBillNoGroupingHelper = (typedBillNo, currentLoaiHinh, currentLoaiHinhCon, isHangChungBill) => {
        if (!typedBillNo || !isHangChungBill) return { matches: false, status: 'NORMAL' };
        const matchingInvoices = invoices.filter(i => i.bill_no && i.bill_no.trim().toLowerCase() === typedBillNo.trim().toLowerCase());
        if (matchingInvoices.length === 0) return { matches: false, status: 'NEW_BILL' };
        
        const relatedLots = lots.filter(l => matchingInvoices.some(i => i.lot_no === l.lot_no));
        if (relatedLots.length === 0) return { matches: false, status: 'NEW_BILL' };

        const sameTypeLot = relatedLots.find(l => l.loai_hinh === currentLoaiHinh && l.loai_hinh_con === currentLoaiHinhCon);

          return {
            matches: true, status: 'SAME_BILL_SAME_TYPE', proposedLotNo: sameTypeLot.lot_no, stt: sameTypeLot.stt,
            message: `Shared Bill & Same Custom Type with Lot [${sameTypeLot.lot_no}]. Invoice will auto-group.`

          const baseLot = relatedLots[0];

      };

      // --- CẬP NHẬT LOGIC LƯU ĐA HOÁ ĐƠN AN TOÀN ---
      const handleSaveInvoice = (e) => {
        e.preventDefault();
        
        // Kiểm tra hợp lệ dữ liệu và chống trùng lặp trước khi cho lưu
        for (let i = 0; i < modalInvoices.length; i++) {

        // Định dạng chuẩn dữ liệu số trước khi lưu
        const processedInvoices = modalInvoices.map(inv => {

        // Tiến hành xóa bỏ các hóa đơn cũ liên kết với lô này và chèn danh sách mới cập nhật vào Database
        const cleanGlobalInvoices = invoices.filter(i => i.lot_no !== currentLotNo);

        saveInvoicesToStorage(updatedGlobalInvoices);

        }

        if (modalMode === 'add') {
          setModalTab('goods'); // Tạo mới lô hàng sẽ chuyển tiếp sang Tab nhập chi tiết sản phẩm
        } else {
          setShowAddModal(false); // Chỉnh sửa thông tin lô hàng cũ sẽ đóng Modal luôn
        }
        showNotification(`Đã cập nhật thành công ${processedInvoices.length} Hóa đơn cho lô hàng ${currentLotNo}`);
      };

        const finalInvoice = {
          ...invoiceForm, invoice_no: invoiceForm.invoice_no.trim(), lot_no: targetLotNo,
          total_amount: Number(invoiceForm.total_amount) || 0, foc_amount: Number(invoiceForm.foc_amount) || 0,
          plus_sea_freight: Number(invoiceForm.plus_sea_freight) || 0, handling_charges: Number(invoiceForm.handling_charges) || 0, other_charges: Number(invoiceForm.other_charges) || 0,
        };
        if (finalInvoice.supplier) addSupplierHistory(finalInvoice.supplier.trim());

        let newInvoices = [];
        if (modalMode === 'add') {
          if (invoices.some(i => i.invoice_no.toLowerCase() === invoiceForm.invoice_no.trim().toLowerCase())) {
            return showNotification("Invoice number already exists!", "error");
          }
          newInvoices = [finalInvoice, ...invoices];
          setGoodsForm(prev => ({ ...prev, invoice_no: finalInvoice.invoice_no, goods_no: '', goods_name_en: '', goods_name_local: '', hs_code: '', origin: '', qty_1: 1, unit_1: 'PCS', qty_2: 0, unit_2: '', unit_price: 0, total_amount: 0 }));
          setModalTab('goods');
        } else {
          newInvoices = invoices.map(i => i.invoice_no === finalInvoice.invoice_no ? finalInvoice : i);
          setShowAddModal(false);
        }
        saveInvoicesToStorage(newInvoices);
        setSelectedLotNo(targetLotNo);
        setSelectedInvoiceNo(finalInvoice.invoice_no);
        showNotification(`Saved Invoice ${finalInvoice.invoice_no}`);
      };

      const handleSaveGoods = (e) => {
        e.preventDefault();
        if (!goodsForm.goods_name_en.trim() && !goodsForm.goods_no.trim()) return showNotification("Please fill in Goods No or English Name!", "error");

        const isEditing = modalMode === 'edit' && goodsForm.id;

        const finalGoods = { 
          ...goodsForm, 
          id: goodsId,

          });
        }
        saveGoodsToStorage(newGoods);
        showNotification(`Successfully saved item ${finalGoods.goods_name_en || finalGoods.goods_no}.`);
      };

      const handleGoodsExcelImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawJson = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

            if (rawJson.length < 2) return showNotification("Excel file is empty!", "error");

            const newImportedGoods = [];
            let rowCount = 0;
            for (let i = 1; i < rawJson.length; i++) {
              const row = rawJson[i];
              if (!row || !row[0]) continue; 

              const invNo = row[0] ? row[0].toString().trim() : invoiceForm.invoice_no;
              const nameEn = row[1] ? row[1].toString().trim() : '';
              const origin = row[2] ? row[2].toString().trim() : '';
              const qty1 = Number(row[3]) || 0;
              const unit1 = row[4] ? row[4].toString().trim() : 'PCS';
              const qty2 = Number(row[5]) || 0;
              const unit2 = row[6] ? row[6].toString().trim() : '';
              const price = Number(row[7]) || 0;

              rowCount++;
              newImportedGoods.push({
                id: "goods_" + Date.now() + "_" + i,
                invoice_no: invNo,
                goods_no: '', 
                goods_name_en: nameEn,
                goods_name_local: '',
                hs_code: '',
                origin: origin,
                qty_1: qty1,
                unit_1: unit1,
                qty_2: qty2,
                unit_2: unit2,
                unit_price: price,
                total_amount: qty1 * price,
                goods_item: goods.filter(g => g.invoice_no === invNo).length + rowCount
              });
            }

            const updatedGoods = [...goods, ...newImportedGoods];
            saveGoodsToStorage(updatedGoods);
            showNotification(`Successfully imported ${newImportedGoods.length} items!`);
          } catch (err) {
            console.error(err);
            showNotification("Failed to read Excel file. Please ensure correct format.", "error");
          }
        };
        reader.readAsArrayBuffer(file);
      };

        showNotification(`ATC Date updated for Lot ${lotNo}`);
        setInlineAtcLotNo(null);

        });

        });

      const handleSaveDictItem = (e) => {

        setShowDictModal(false);

          title: `Confirm Delete from ${dbSelectedTab}`,
          message: `Are you sure you want to delete [${item.goods_no}] from the master dictionary? This action cannot be undone.`,
          onConfirm: () => {

            const updatedDict = targetDict.filter(i => i.goods_no !== item.goods_no);

            setConfirmState(prev => ({ ...prev, isOpen: false }));

      const handleExcelImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            
            const rawJson = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (rawJson.length < 2) return showNotification("Excel file is empty!", "error");

            const headers = rawJson[0].map(h => h ? h.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, '') : '');
            const idxGoodsNo = headers.findIndex(h => h === 'mahang' || h === 'goodsno' || h === 'itemcode' || h === 'masanpham' || h.startsWith('mahang') || h.includes('goodsno') || h.includes('itemcode') || h.includes('masanpham'));
            const idxHsCode = headers.findIndex(h => h === 'hscode' || h === 'mahs' || h === 'hs' || h.includes('hscode') || h.includes('mahs') || h.startsWith('hscode'));
            const idxNameEn = headers.findIndex(h => h.includes('tientienganh') || h.includes('tentienganh') || h.includes('tienganh') || h.includes('english') || h.includes('nameen') || h.includes('tenhangen') || h.includes('descen') || (h.includes('ten') && h.includes('anh')));
            const idxNameLocal = headers.findIndex(h => h.includes('tientingviet') || h.includes('tentingviet') || h.includes('tiengviet') || h.includes('vietnamese') || h.includes('namevn') || h.includes('tenhangviet') || h.includes('mota') || (h.includes('ten') && h.includes('viet')));

            const finalGoodsNo  = idxGoodsNo  !== -1 ? idxGoodsNo  : 0;
            const finalHsCode   = idxHsCode   !== -1 ? idxHsCode   : 1;
            const finalNameEn   = idxNameEn   !== -1 ? idxNameEn   : 2;
            const finalNameLocal= idxNameLocal !== -1 ? idxNameLocal: 3;

            const importedItems = [];
            for (let i = 1; i < rawJson.length; i++) {
              const row = rawJson[i];
              if (!row || !row[finalGoodsNo]) continue;

              importedItems.push({
                goods_no: row[finalGoodsNo].toString().trim(),
                hs_code: row[finalHsCode] ? row[finalHsCode].toString().trim() : '00000000',
                goods_name_en: row[finalNameEn] ? row[finalNameEn].toString().trim() : 'No Description',

                goods_unit_en: 'PCS',
                goods_unit_local: 'Cái'
              });
            }

            if (importedItems.length === 0) return showNotification("No valid items found!", "warning");

            const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
            let updatedDict = [...targetDict];
            importedItems.forEach(newItem => {
              const idx = updatedDict.findIndex(i => i.goods_no.toLowerCase() === newItem.goods_no.toLowerCase());
              if (idx !== -1) updatedDict[idx] = newItem; 
              else updatedDict.push(newItem);
            });

            if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
            showNotification(`Successfully imported ${importedItems.length} items to Dictionary ${dbSelectedTab}.`);
          } catch (err) {
            console.error(err);
            showNotification("Failed to read Excel file.", "error");
          }
        };
        reader.readAsArrayBuffer(file);
      };

      const executeDeleteLot = (targetLotNo) => {
        const remainingLots = lots.filter(l => l.lot_no !== targetLotNo);
        const relatedInvoiceNos = invoices.filter(i => i.lot_no === targetLotNo).map(i => i.invoice_no);

                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1 font-bold">English Name * (Type to auto-sync)</label>
                            <input type="text" list="goods-en-names-datalist" value={goodsForm.goods_name_en} onChange={(e) => { const name = e.target.value; setGoodsForm(prev => ({...prev, goods_name_en: name})); handleEnglishNameAutoLookup(name, goodsForm.invoice_no); }} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-amber-300 font-bold" />
                            <datalist id="goods-en-names-datalist">
                              {(() => {
                                const currentInv = invoices.find(i => i.invoice_no === goodsForm.invoice_no);
                                const targetDict = currentInv?.loai_hinh === 'E21' ? dictE21 : dictA12;
                                return targetDict.map((item, idx) => <option key={idx} value={item.goods_name_en}>{item.goods_no} - HS: {item.hs_code}</option>);
                              })()}
                            </datalist>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Goods No</label><input type="text" value={goodsForm.goods_no} onChange={e => setGoodsForm({...goodsForm, goods_no: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white font-mono font-bold" /></div>
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Origin</label><input type="text" value={goodsForm.origin} onChange={e => setGoodsForm({...goodsForm, origin: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white" /></div>
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Qty 1</label><input type="number" required value={goodsForm.qty_1} onChange={e => { const val = Number(e.target.value); setGoodsForm(p => ({...p, qty_1: val, total_amount: val * p.unit_price})); }} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white" /></div>
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Unit 1</label><input type="text" required value={goodsForm.unit_1} onChange={e => setGoodsForm({...goodsForm, unit_1: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white" /></div>
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Qty 2</label><input type="number" value={goodsForm.qty_2} onChange={e => setGoodsForm({...goodsForm, qty_2: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white" /></div>
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Unit 2</label><input type="text" value={goodsForm.unit_2} onChange={e => setGoodsForm({...goodsForm, unit_2: e.target.value})} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white" /></div>
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Unit Price ($)</label><input type="number" step="0.001" required value={goodsForm.unit_price} onChange={e => { const val = Number(e.target.value); setGoodsForm(p => ({...p, unit_price: val, total_amount: val * p.qty_1})); }} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-white" /></div>
                          <div className="col-span-1"><label className="block text-[11px] text-slate-400 mb-1">Total Amount ($)</label><input type="number" readOnly value={goodsForm.total_amount} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-xs text-amber-400 font-bold opacity-80" /></div>
                        </div>
                        
                        {(goodsForm.goods_name_local || goodsForm.goods_name_en) && (
                          <div>
                            <label className="block text-[11px] text-emerald-400 mb-1 font-bold uppercase tracking-wider">📋 Customs Declared Name (Preview)</label>
                            <div className="w-full bg-slate-950/60 border border-emerald-900/50 rounded px-3 py-2.5 text-xs text-emerald-300 font-mono leading-relaxed select-all">
                              {[goodsForm.goods_name_local, goodsForm.goods_name_en].filter(Boolean).join(' / ')}
                            </div>
                          </div>
                        )}

                        <div className="text-right">
                          <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-2 rounded-lg text-xs">Save Item</button>
                        </div>
                      </form>

                      <div className="border border-slate-800 rounded-xl overflow-hidden mt-4">
                        <table className="w-full text-left text-xs border-collapse">
                          <thead className="bg-slate-950 text-slate-400 border-b border-slate-800">
                            <tr>
                              <th className="p-3">Goods No</th>
                              <th className="p-3">English Name</th>
                              <th className="p-3">Origin</th>
                              <th className="p-3 text-right">Qty 1</th>
                              <th className="p-3">Unit 1</th>
                              <th className="p-3 text-right">Unit Price</th>
                              <th className="p-3 text-right">Total Amount</th>
                              <th className="p-3 text-center">Action</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-850">
                            {goods.filter(g => g.invoice_no === invoiceForm.invoice_no).map((g) => (
                              <tr key={g.id} className="hover:bg-slate-850 text-slate-300">
                                <td className="p-3 font-mono text-emerald-400 font-bold">{g.goods_no}</td>
                                <td className="p-3 font-medium text-slate-200 truncate max-w-[200px]">{g.goods_name_en}</td>
                                <td className="p-3">{g.origin}</td>
                                <td className="p-3 text-right">{g.qty_1}</td>
                                <td className="p-3">{g.unit_1}</td>
                                <td className="p-3 text-right">${g.unit_price}</td>
                                <td className="p-3 text-right text-amber-400 font-bold">${g.total_amount}</td>
                                <td className="p-3 text-center space-x-2">
                                  <button type="button" onClick={() => executeDeleteGoods(g.id)} className="text-rose-500 hover:underline">Del</button>
                                </td>
                              </tr>
                            ))}
                            {goods.filter(g => g.invoice_no === invoiceForm.invoice_no).length === 0 && <tr><td colSpan="8" className="p-6 text-center text-slate-500 italic">No items for this invoice yet.</td></tr>}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                </div>
                <div className="bg-slate-950 px-6 py-4 border-t border-slate-800 flex justify-between items-center shrink-0">
                  <span className="text-xs text-slate-500">Ensure data is correct before saving.</span>
                  <button type="submit" form={modalTab + 'Form'} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2 rounded-lg text-xs">
                    💾 Save {modalTab.toUpperCase()}
                  </button>
                </div>
              </div>
            </div>
          )}

          {showMasterInvoiceModal && selectedLotNo && (
            <div className="fixed inset-0 z-50 bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col my-8">
                <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                  <h3 className="font-bold text-xs uppercase text-amber-400">📋 Preview Master Invoice List (Form 02)</h3>
                  <div className="flex gap-2">
                    <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg text-xs">🖨️ Print Form</button>
                    <button onClick={() => setShowMasterInvoiceModal(false)} className="bg-slate-800 text-slate-300 font-bold px-3 py-2 rounded text-xs">Close</button>
                  </div>
                </div>

                <div className="p-8 bg-white text-slate-950 font-serif text-sm overflow-y-auto print-area max-h-[75vh]" id="printable-master-invoice">
                  <div className="flex justify-between items-start text-xs border-b border-slate-300 pb-3">
                    <div>
                      <h1 className="font-bold text-sm uppercase">CHANG YANG VIET NAM CO., LTD</h1>
                      <p>Linked Factory Code: {lots.find(l => l.lot_no === selectedLotNo)?.factory_no}</p>
                    </div>
                    <div className="text-right">
                      <h3 className="font-bold">Form No: 02/BKHĐ/GSQL</h3>
                      <p className="text-[10px]">Circular 39/2018/TT-BTC</p>
                    </div>
                  </div>
                  <div className="text-center my-6">
                    <h2 className="text-base font-bold uppercase">COMMERCIAL INVOICE MASTER LIST FOR IMPORTED GOODS</h2>
                    <p className="text-xs font-semibold mt-1">LOT REF: {selectedLotNo}</p>
                  </div>

                  <table className="w-full text-left text-xs border-collapse border border-slate-400 mt-4">
                    <thead>
                      <tr className="bg-slate-150 border-b border-slate-400 font-bold">
                        <th className="p-2 border-r border-slate-400 text-center w-10">Seq</th>
                        <th className="p-2 border-r border-slate-400">Invoice No</th>
                        <th className="p-2 border-r border-slate-400">Invoice Date</th>
                        <th className="p-2 border-r border-slate-400 text-right">Value (USD)</th>
                      </tr>
                    </thead>
                    <tbody>
                      {currentInvoices.map((inv, index) => (
                        <tr key={inv.invoice_no} className="border-b border-slate-400">
                          <td className="p-2 border-r border-slate-400 text-center">{index + 1}</td>
                          <td className="p-2 border-r border-slate-400 font-mono font-bold">{inv.invoice_no}</td>
                          <td className="p-2 border-r border-slate-400">{inv.invoice_date}</td>
                          <td className="p-2 border-r border-slate-400 text-right font-mono">${getInvoiceValueSum(inv).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        </tr>
                      ))}
                      <tr className="bg-slate-100 font-bold text-xs">
                        <td colSpan="3" className="p-2.5 border-r border-slate-400 uppercase text-center">TOTAL VALUE ON MASTER LIST</td>
                        <td className="p-2.5 text-right font-mono">${getSelectedLotTotalValue().toLocaleString(undefined, {minimumFractionDigits: 2})} USD</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
