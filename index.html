    // =====================================================================
    // CHANG YANG IMS - GOOGLE SHEETS STORAGE LAYER
    // Dữ liệu lưu trên Google Sheets qua Apps Script Web App
    // IndexedDB được dùng làm cache offline tạm thời
    // =====================================================================

    const CY_DB_NAME = 'ChangYangIMS_v2';
    const CY_DB_VERSION = 1;
    const CY_STORE = 'keyvalue';
    let _cyDb = null;

    // --- IndexedDB (cache offline) ---
    function cyOpenDB() {
      if (_cyDb) return Promise.resolve(_cyDb);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(CY_DB_NAME, CY_DB_VERSION);
        req.onupgradeneeded = e => e.target.result.createObjectStore(CY_STORE);
        req.onsuccess = e => { _cyDb = e.target.result; resolve(_cyDb); };
        req.onerror = e => reject(e.target.error);
      });
    }
    window.cyLocalGet = async (key) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const req = db.transaction(CY_STORE,'readonly').objectStore(CY_STORE).get(key);
        req.onsuccess = () => res(req.result ?? null);
        req.onerror = () => rej(req.error);
      });
    };
    window.cyLocalSet = async (key, value) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(CY_STORE,'readwrite');
        tx.objectStore(CY_STORE).put(value, key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    };

    // --- Google Sheets API (qua Apps Script Web App) ---
    window.CY_API_URL = localStorage.getItem('cy_api_url') || '';

    window.cyApiCall = async (action, payload = {}) => {
      const url = window.CY_API_URL;
      if (!url) throw new Error('NO_API_URL');
      const body = JSON.stringify({ action, ...payload });
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // Apps Script yêu cầu text/plain để tránh CORS preflight
        body
      });
      if (!res.ok) throw new Error('HTTP_' + res.status);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message || 'API_ERROR');
      return json.data;
    };

    // Đọc toàn bộ 1 sheet
    window.cySheetGet = async (sheet) => {
      const data = await window.cyApiCall('getSheet', { sheet });
      await window.cyLocalSet('cy_' + sheet, data); // cache offline
      return data;
    };

    // Ghi đè toàn bộ 1 sheet
    window.cySheetSet = async (sheet, data) => {
      await window.cyLocalSet('cy_' + sheet, data); // lưu cache ngay
      await window.cyApiCall('setSheet', { sheet, data }); // ghi lên Sheets
    };

    // Đọc tất cả sheets cùng lúc
    window.cyLoadAll = async () => {
      const data = await window.cyApiCall('getAll');
      for (const [k, v] of Object.entries(data)) {
        await window.cyLocalSet('cy_' + k, v);
      }
      return data;
    };
  </script>

      const [confirmState, setConfirmState] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

      // Lưu lịch sử hãng tàu/FWD và nhà cung ứng để gợi ý lần sau
      const [carrierHistory, setCarrierHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('cy_carrier_history') || '[]'); } catch { return []; }
      });
      const [supplierHistory, setSupplierHistory] = useState(() => {
        try { return JSON.parse(localStorage.getItem('cy_supplier_history') || '["CHANG YANG MATERIAL CORP."]'); } catch { return ['CHANG YANG MATERIAL CORP.']; }
      });
      const addCarrierHistory = (val) => {
        if (!val || carrierHistory.includes(val)) return;
        const next = [val, ...carrierHistory].slice(0, 30);
        setCarrierHistory(next);
        localStorage.setItem('cy_carrier_history', JSON.stringify(next));
      };
      const addSupplierHistory = (val) => {
        if (!val || supplierHistory.includes(val)) return;
        const next = [val, ...supplierHistory].slice(0, 30);
        setSupplierHistory(next);
        localStorage.setItem('cy_supplier_history', JSON.stringify(next));
      };

      // Các Form nhập liệu của nghiệp vụ chính
      const [lotForm, setLotForm] = useState({
        lot_no: '', stt: 1, lot_date: new Date().toISOString().substring(0, 10), get_docs_date: new Date().toISOString().substring(0, 10),
        factory_no: '', bill_no: '', bill_date: '', pol: '', pod: '', bill_term: 'Freight Prepaid',
        carrier: '', // Hãng tàu / FWD
        transport_type: 'SEA_CONT', // AIR | EXPRESS | SEA_CONT | SEA_CFS
        is_cont: true, cont_no: '', seal_no: '', cont_type: '40HC',
        pkg_qty: 0, gw: 0, cbm: 0, eta: '', atc_date: '',
        origin_country: 'TAIWAN', loai_hinh: 'NEUTRAL', loai_hinh_con: 'DEFAULT', sale_qty: 0,
        is_hang_chung_bill: false,
        contract_start: '', contract_end: ''
      });

      const [invoiceForm, setInvoiceForm] = useState({
        invoice_no: '', lot_no: '', bill_no: '', bill_stt: 0, invoice_date: new Date().toISOString().substring(0, 10),
        inv_pkg_qty: 0, inv_gw: 0,
        incoterm: 'CIF', total_amount: 0, foc_amount: 0, plus_sea_freight: 0, handling_charges: 0, other_charges: 0,
        other_charges_note: '',
        is_hang_chung_bill: false, loai_hinh: 'A12', loai_hinh_con: 'DEFAULT',
        currency: 'USD', factory_no: '',
        supplier: 'CHANG YANG MATERIAL CORP.',
        contract_start: '', contract_end: ''
      });

      const [goodsForm, setGoodsForm] = useState({
        invoice_no: '', goods_no: '', goods_item: 1, goods_name_en: '', goods_unit_en: 'PCS', goods_unit_en2: '',
        goods_name_local: '', goods_unit_local: 'Cái', goods_unit_local2: '', hs_code: '', invoice_description: '', sale_amount: 0,
        origin_country: 'TAIWAN', qty1: 0, unit1: 'PCS', qty2: 0, unit2: '', unit_price: 0, unit_price_str: ''
      });

      const [selectedFactories, setSelectedFactories] = useState([]);
      // Danh sách invoice tạm thời cho lô đang tạo (Tab 2 preview)
      const [draftInvoiceNos, setDraftInvoiceNos] = useState([]);
      // Tab 4: Tạo Mã Lô — state gắn invoice vào lô
      const [lotAssignForm, setLotAssignForm] = useState({
        loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', selectedInvoiceNos: [], stt: 1
      });
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4500);
      };

      // Sinh Số Thứ Tự (STT) trống nhỏ nhất tự động
      const getFirstVacantSeq = () => {
        const activeSeqs = lots.map(l => Number(l.stt)).filter(n => !isNaN(n) && n > 0);
        const uniqueSeqs = Array.from(new Set(activeSeqs)).sort((a, b) => a - b);
        let nextSeq = 1;
        for (let i = 0; i < uniqueSeqs.length; i++) {
          if (uniqueSeqs[i] === nextSeq) nextSeq++; else if (uniqueSeqs[i] > nextSeq) break;
        }
        return nextSeq;
      };

      // Hàm tự động phát sinh mã lô
      const generateLotNoString = (type, subType, sttNum) => {
        const yy = new Date().getFullYear().toString().slice(-2);
        if (!type || type === 'NEUTRAL') return `CH${sttNum}-${yy}`;
        if (type === 'A12') {
          return subType === 'H11' ? `CH${sttNum}-${yy}PMD` : subType === 'DT' ? `CH${sttNum}DT-${yy}` : `CH${sttNum}KD-${yy}`;
        } else if (type === 'E21') {
          return subType === 'CHUYEN_TIEP' ? `CH${sttNum}-${yy}CT` : `CH${sttNum}-${yy}`;
        }
        return `CH${sttNum}-${yy}`;
      };

      // ── DISPLAY HELPERS ─────────────────────────────────────────────
      // ── DATE NORMALIZE: chuyển bất kỳ dạng ngày nào về YYYY-MM-DD cho input type="date"
      const normalizeDate = (d) => {
        if (!d) return '';
        const s = String(d).trim();
        // Already YYYY-MM-DD
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // ISO timestamp: 2026-06-08T17:00:00.000Z → 2026-06-08
        const isoMatch = s.match(/^(\d{4}-\d{2}-\d{2})T/);
        if (isoMatch) return isoMatch[1];
        // DD/MM/YYYY → YYYY-MM-DD
        const dmyMatch = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (dmyMatch) return `${dmyMatch[3]}-${dmyMatch[2]}-${dmyMatch[1]}`;
        // Try Date parse as fallback
        try {
          const parsed = new Date(d);
          if (!isNaN(parsed)) return parsed.toISOString().substring(0,10);
        } catch(e) {}
        return '';
      };

      const fmtDisplayDate = (d) => {
        if (!d) return '—';
        // Handle ISO timestamps like "2026-06-03T17:00:00.000Z"
        const str = String(d);
        const match = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (match) return `${match[3]}/${match[2]}/${match[1]}`;
        return str;
      };

      const getUniqueSuppliers = () => Array.from(new Set(lots.map(l => l.supplier).filter(Boolean)));
      const getUniquePols = () => Array.from(new Set(lots.map(l => l.pol).filter(Boolean).map(p => p.trim().toUpperCase())));
      const getUniquePods = () => Array.from(new Set(lots.map(l => l.pod).filter(Boolean).map(p => p.trim().toUpperCase())));
      const getUniqueOrigins = () => Array.from(new Set([...lots.map(l => l.origin_country), ...goods.map(g => g.origin_country)].filter(Boolean).map(s => s.trim().toUpperCase())));

      // Tự động nhảy STT & Mã lô khi mở tab thêm Lô Mới
      useEffect(() => {
        if (showAddModal && modalMode === 'add' && modalTab === 'lot') {
          const vacantStt = getFirstVacantSeq();
          const calculatedLotNo = generateLotNoString(lotForm.loai_hinh || 'NEUTRAL', lotForm.loai_hinh_con, vacantStt);
          setLotForm(prev => ({ ...prev, lot_no: calculatedLotNo, stt: vacantStt }));
        }
      }, [showAddModal, lotForm.loai_hinh, lotForm.loai_hinh_con, lots, modalMode, modalTab]);

      useEffect(() => {
        setLotForm(prev => ({ ...prev, factory_no: selectedFactories.join(', ') }));
      }, [selectedFactories]);

      // Phân tích Hàng Chung Bill
      // ── SHARED BILL HELPER ───────────────────────────────────────────
      // Logic mới: hàng chung bill chỉ cần link qua bill_no + is_hang_chung_bill=true
      // Không cần cùng STT. Hệ thống tạo lô mới độc lập, chỉ hiển thị cảnh báo/gợi ý.
      const checkBillNoGroupingHelper = (typedBillNo, currentLoaiHinh, currentLoaiHinhCon, isHangChungBill) => {
        if (!typedBillNo || !isHangChungBill) return { matches: false, status: 'NORMAL' };
        const normBill = String(typedBillNo).trim().toLowerCase();
        const matchingInvoices = invoices.filter(i => i.bill_no && String(i.bill_no).trim().toLowerCase() === normBill);
        if (matchingInvoices.length === 0) return { matches: false, status: 'NEW_BILL' };

        const relatedLots = lots.filter(l => matchingInvoices.some(i => String(i.lot_no||'') === String(l.lot_no||'')));
        if (relatedLots.length === 0) return { matches: false, status: 'NEW_BILL' };

        // Kiểm tra đã có lô cùng loại hình chưa → gộp vào đó
        const sameTypeLot = relatedLots.find(l => l.loai_hinh === currentLoaiHinh && l.loai_hinh_con === currentLoaiHinhCon);
        if (sameTypeLot) {
          return {
            matches: true, status: 'SAME_BILL_SAME_TYPE',
            proposedLotNo: sameTypeLot.lot_no, baseLot: sameTypeLot,
            message: `✅ Cùng Bill & Cùng loại hình → Invoice sẽ ghép vào Lô [${sameTypeLot.lot_no}]`
          };
        }

        // Khác loại hình → gợi ý tạo lô mới (STT tự do, user tự nhập lot_no)
        const baseLot = relatedLots[0];
        return {
          matches: true, status: 'SAME_BILL_DIFF_TYPE', baseLot,
          message: `⚡ Bill [${typedBillNo}] đã dùng cho Lô [${baseLot.lot_no}] (${baseLot.loai_hinh}). Invoice này KHÁC loại hình → sẽ tạo lô mới riêng, nhập Mã Lô bên dưới.`
        };
      };

      const activeBillStatus = checkBillNoGroupingHelper(String(invoiceForm.bill_no||''), invoiceForm.loai_hinh, invoiceForm.loai_hinh_con, invoiceForm.is_hang_chung_bill);

      // --- CÁC HÀM LƯU DỮ LIỆU CHÍNH (MASTER - DETAIL) ---
      const handleSaveLot = (e) => {
        e.preventDefault();
        if (!Number(lotForm.stt)) return showNotification("Vui lòng nhập Số Thứ Tự (STT)!", "error");

        if (modalMode === 'edit') {
          // Edit mode: validate lot_no exists
          if (!lotForm.lot_no.trim()) return showNotification("Mã lô hàng không được trống", "error");
          const finalLot = {
            ...lotForm, lot_no: lotForm.lot_no.trim(), stt: Number(lotForm.stt),
            pkg_qty: Number(lotForm.pkg_qty)||0, gw: Number(lotForm.gw)||0, cbm: Number(lotForm.cbm)||0,
            lot_date: normalizeDate(lotForm.lot_date),
            bill_date: normalizeDate(lotForm.bill_date),
            eta: normalizeDate(lotForm.eta),
            atc_date: normalizeDate(lotForm.atc_date),
            get_docs_date: normalizeDate(lotForm.get_docs_date),
            contract_start: normalizeDate(lotForm.contract_start),
            contract_end: normalizeDate(lotForm.contract_end),
          };
          if (finalLot.carrier) addCarrierHistory(finalLot.carrier.trim());
          const newLots = lots.map(l => l.lot_no === finalLot.lot_no ? finalLot : l);
          saveLotsToStorage(newLots);
          showNotification(`✅ Đã cập nhật Lô hàng ${finalLot.lot_no}`);
          // Highlight row vừa cập nhật, tự clear sau 5 giây
          setRecentlyUpdatedLots(prev => new Set([...prev, finalLot.lot_no]));
          setTimeout(() => setRecentlyUpdatedLots(prev => { const n = new Set(prev); n.delete(finalLot.lot_no); return n; }), 5000);
          setShowAddModal(false);
          return;
        }

        // ADD mode: check bill_no uniqueness (warn but don't block - hàng chung bill is valid)
        if (lotForm.bill_no && !lotForm.is_hang_chung_bill) {
          const existingBill = lots.find(l => l.bill_no && String(l.bill_no).trim().toUpperCase() === String(lotForm.bill_no).trim().toUpperCase());
          if (existingBill) {
            const msg = 'Bill [' + lotForm.bill_no + '] da ton tai trong Lo [' + existingBill.lot_no + ']. Neu day la hang chung Bill, bat toggle Hang Chung Bill. Nhan OK de tiep tuc.';
            const proceed = window.confirm(msg);
            if (!proceed) return;
          }
        }
        // ADD mode: Save bill/transport info (no lot_no yet), move to invoice tab
        // Store in a temporary "draft" state keyed by stt
        const draftLot = { ...lotForm, lot_no: '', stt: Number(lotForm.stt), pkg_qty: Number(lotForm.pkg_qty)||0, gw: Number(lotForm.gw)||0, cbm: Number(lotForm.cbm)||0 };
        if (draftLot.carrier) addCarrierHistory(draftLot.carrier.trim());
        setLotForm(draftLot);
        // Pre-fill lotAssignForm STT from lotForm
        setLotAssignForm(prev => ({...prev, stt: draftLot.stt || getFirstVacantSeq()}));
        setInvoiceForm(prev => ({ ...prev, lot_no: '', bill_stt: draftLot.stt, bill_no: draftLot.bill_no, is_hang_chung_bill: draftLot.is_hang_chung_bill || false }));
        setDraftInvoiceNos([]); // Reset draft list for new lot
        setModalTab('invoice');
        showNotification('Thông tin Bill đã lưu — tiếp tục nhập Invoice');
      };

      // Tab 4: Finalize lot — create lot_no from loai_hinh + assign invoices to it
      const handleFinalizeLot = () => {
        const { loai_hinh, loai_hinh_con, selectedInvoiceNos } = lotAssignForm;
        if (!loai_hinh) return showNotification("Chọn loại hình hải quan!", "error");
        if (selectedInvoiceNos.length === 0) return showNotification("Chọn ít nhất 1 invoice!", "error");
        const stt = Number(lotAssignForm.stt || lotForm.stt || 1);
        if (!stt) return showNotification("Nhập Số STT hợp lệ!", "error");
        const lot_no = generateLotNoString(loai_hinh, loai_hinh_con, stt);
        if (lots.some(l => String(l.lot_no||'').toLowerCase() === lot_no.toLowerCase())) {
          return showNotification(`Mã lô [${lot_no}] đã tồn tại! Thay đổi STT hoặc loại hình.`, "error");
        }
        // Aggregate pkg_qty and gw from selected invoices (for hang chung bill)
        const selInvs = invoices.filter(i => selectedInvoiceNos.includes(i.invoice_no));
        const totalInvPkg = selInvs.reduce((s, i) => s + Number(i.inv_pkg_qty||0), 0);
        const totalInvGw  = selInvs.reduce((s, i) => s + Number(i.inv_gw||0), 0);
        // Use bill pkg/gw if no per-invoice breakdown given; otherwise use sum of invoices
        const finalPkgQty = totalInvPkg > 0 ? totalInvPkg : Number(lotForm.pkg_qty)||0;
        const finalGw     = totalInvGw  > 0 ? totalInvGw  : Number(lotForm.gw)||0;

        const finalLot = {
          ...lotForm, lot_no, stt, loai_hinh, loai_hinh_con,
          factory_no: selectedFactories.join(', '),
          pkg_qty: finalPkgQty, gw: finalGw,
        };
        if (finalLot.carrier) addCarrierHistory(finalLot.carrier.trim());
        saveLotsToStorage([finalLot, ...lots]);
        // Update selected invoices → assign lot_no + loai_hinh
        const updatedInvoices = invoices.map(inv =>
          selectedInvoiceNos.includes(inv.invoice_no)
            ? { ...inv, lot_no, loai_hinh, loai_hinh_con }
            : inv
        );
        saveInvoicesToStorage(updatedInvoices);
        setSelectedLotNo(lot_no);
        setLotAssignForm({ loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', selectedInvoiceNos: [], stt: getFirstVacantSeq() });
        showNotification(`✅ Đã tạo Lô [${lot_no}] với ${selectedInvoiceNos.length} invoice!`);
        // Stay on Tab 4 so user can create more lots (e.g. 2nd lot for hang chung bill diff type)
        // Close modal only if no more unassigned invoices
      };

      const handleSaveInvoice = (e) => {
        e.preventDefault();
        if (!invoiceForm.invoice_no.trim()) return showNotification("Vui lòng điền Số hóa đơn!", "error");
        let targetLotNo = invoiceForm.lot_no;

        if (invoiceForm.is_hang_chung_bill && activeBillStatus.matches) {
          if (activeBillStatus.status === 'SAME_BILL_SAME_TYPE') {
            // Gộp vào lô cùng loại hình hiện có
            targetLotNo = activeBillStatus.proposedLotNo;
          }
          // DIFF_TYPE: targetLotNo giữ nguyên invoiceForm.lot_no (user đã nhập)
          // Invoice được đánh dấu is_hang_chung_bill=true để phân biệt
        }

        // Bill term vs Incoterm validation
        const prepaidTerms = ['CIF','CFR','CIP','CPT'];
        const collectTerms = ['FOB','FCA','EXW','FAS'];
        const lotForInv = lots.find(l => l.bill_no === (invoiceForm.bill_no || lotForm.bill_no));
        const billTerm = lotForInv?.bill_term || lotForm.bill_term || '';
        const incoterm = invoiceForm.incoterm || '';
        if (billTerm === 'Freight Prepaid' && collectTerms.includes(incoterm)) {
          return showNotification(`⚠️ Không hợp lệ: Bill [Freight Prepaid] không phù hợp với Incoterm [${incoterm}]. Nên dùng: CIF, C&F, CIP, CPT`, 'error');
        }
        if (billTerm === 'Freight Collect' && prepaidTerms.includes(incoterm)) {
          return showNotification(`⚠️ Không hợp lệ: Bill [Freight Collect] không phù hợp với Incoterm [${incoterm}]. Nên dùng: FOB, FCA, EXW, FAS`, 'error');
        }
        const finalInvoice = {
          ...invoiceForm, invoice_no: invoiceForm.invoice_no.trim(), lot_no: targetLotNo,
          bill_stt: Number(invoiceForm.bill_stt || lotForm.stt || 0),
          bill_no: invoiceForm.bill_no || lotForm.bill_no,
          is_hang_chung_bill: lotForm.is_hang_chung_bill || false,
          total_amount: Number(invoiceForm.total_amount) || 0, foc_amount: Number(invoiceForm.foc_amount) || 0,
          plus_sea_freight: Number(invoiceForm.plus_sea_freight) || 0, handling_charges: Number(invoiceForm.handling_charges) || 0, other_charges: Number(invoiceForm.other_charges) || 0,
          // Normalize ngày về YYYY-MM-DD trước khi lưu
          invoice_date: normalizeDate(invoiceForm.invoice_date),
          contract_start: normalizeDate(invoiceForm.contract_start),
          contract_end: normalizeDate(invoiceForm.contract_end),
        };
        if (finalInvoice.supplier) addSupplierHistory(finalInvoice.supplier.trim());

        let newInvoices = [];
        if (modalMode === 'add') {
          if (invoices.some(i => String(i.invoice_no||'').toLowerCase() === invoiceForm.invoice_no.trim().toLowerCase())) {
            return showNotification("Invoice No. already exists!", "error");
          }
          newInvoices = [finalInvoice, ...invoices];
          setDraftInvoiceNos(prev => prev.includes(finalInvoice.invoice_no) ? prev : [...prev, finalInvoice.invoice_no]);
          setGoodsForm(prev => ({ ...prev, invoice_no: finalInvoice.invoice_no, goods_no: '', goods_name_en: '', goods_name_local: '', hs_code: '', sale_amount: 0, qty1: 0, unit1: 'PCS', qty2: 0, unit2: '', unit_price: 0, unit_price_str: '' }));
          setModalTab('goods');
        } else {
          newInvoices = invoices.map(i => i.invoice_no === finalInvoice.invoice_no ? finalInvoice : i);
          showNotification(`✅ Đã cập nhật Hóa Đơn ${finalInvoice.invoice_no}`);
          setRecentlyUpdatedInvoices(prev => new Set([...prev, finalInvoice.invoice_no]));
          setTimeout(() => setRecentlyUpdatedInvoices(prev => { const n = new Set(prev); n.delete(finalInvoice.invoice_no); return n; }), 5000);
          setShowAddModal(false);
        }
        saveInvoicesToStorage(newInvoices);
        setSelectedLotNo(targetLotNo);
        setSelectedInvoiceNo(finalInvoice.invoice_no);
        // Check invoice total vs goods total
        const invGoods = goods.filter(g => g.invoice_no === finalInvoice.invoice_no);
        if (invGoods.length > 0) {
          const goodsTotal = invGoods.reduce((s, g) => s + Number(g.sale_amount||0), 0);
          const invTotal = Number(finalInvoice.total_amount)||0;
          const diff = Math.abs(goodsTotal - invTotal);
          if (diff > 0.01) {
            showNotification(`⚠️ Trị giá Invoice (${invTotal.toFixed(2)}) ≠ Tổng hàng hóa (${goodsTotal.toFixed(2)}). Chênh lệch: ${diff.toFixed(2)}`, 'error');
          } else {
            showNotification(`Đã lưu Hóa đơn ${finalInvoice.invoice_no}`);
          }
        } else {
          showNotification(`Đã lưu Hóa đơn ${finalInvoice.invoice_no}`);
        }
      };

      const handleSaveGoods = (e) => {
        e.preventDefault();
        if (!goodsForm.goods_no.trim() || !goodsForm.goods_name_en.trim()) return showNotification("Vui lòng điền đủ thông tin!", "error");

        const isEditing = modalMode === 'edit' && goodsForm.id;
        const goodsId = isEditing ? goodsForm.id : "goods_" + Date.now();
        const qty1Val = Number(goodsForm.qty1) || 0;
        const unit_priceVal = Number(goodsForm.unit_price) || 0;
        const finalGoods = {
          ...goodsForm,
          id: goodsId,
          goods_no: goodsForm.goods_no.trim(),
          goods_item: Number(goodsForm.goods_item) || 1,
          origin_country: goodsForm.origin_country || 'TAIWAN',
          qty1: qty1Val,
          unit1: goodsForm.unit1 || goodsForm.goods_unit_en || 'PCS',
          qty2: Number(goodsForm.qty2) || 0,
          unit2: goodsForm.unit2 || goodsForm.goods_unit_en2 || '',
          unit_price: unit_priceVal,
          sale_amount: Number(goodsForm.sale_amount) || (qty1Val * unit_priceVal),
        };

        let newGoods = [];
        if (isEditing) {
          newGoods = goods.map(g => g.id === goodsId ? finalGoods : g);
          showNotification(`✅ Đã cập nhật mặt hàng ${finalGoods.goods_no}`);
          setRecentlyUpdatedGoods(prev => new Set([...prev, goodsId]));
          setTimeout(() => setRecentlyUpdatedGoods(prev => { const n = new Set(prev); n.delete(goodsId); return n; }), 5000);
          setShowAddModal(false);
        } else {
          newGoods = [...goods, finalGoods];
          setGoodsForm({
            invoice_no: finalGoods.invoice_no, goods_no: '', goods_item: finalGoods.goods_item + 1, goods_name_en: '',
            goods_unit_en: 'PCS', goods_unit_en2: '', goods_name_local: '', goods_unit_local: 'Cái', goods_unit_local2: '',
            hs_code: '', invoice_description: '', sale_amount: 0,
            origin_country: finalGoods.origin_country || 'TAIWAN',
            qty1: 0, unit1: 'PCS', qty2: 0, unit2: '', unit_price: 0, unit_price_str: ''
          });
        }
        saveGoodsToStorage(newGoods);
        showNotification(`Đã lưu sản phẩm ${finalGoods.goods_no} thành công.`);
      };

      const handleInlineAtcUpdate = (lotNo, dateString) => {
        const newLots = lots.map(l => l.lot_no === lotNo ? { ...l, atc_date: dateString } : l);
        saveLotsToStorage(newLots);
        showNotification(`Đã cập nhật Ngày nhập kho ATC cho lô ${lotNo}`);
        setInlineAtcLotNo(null);
      };

      // --- CÁC HÀM CRUD CHO TỪ ĐIỂN SẢN PHẨM GỐC ---
      const handleOpenAddDict = () => {
        setDictModalMode('add');
        setDictForm({
          goods_no: '', hs_code: '', goods_name_en: '', goods_name_local: '',

      const handleSaveDictItem = (e) => {

      // --- CHỨC NĂNG IMPORT FILE EXCEL THÔNG MINH (COLUMNS AUTO-MAPPING) ---
      const handleExcelImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // Đọc bảng tính thành mảng 2 chiều
            const rawJson = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (rawJson.length < 2) {
              return showNotification("Tệp Excel trống rỗng hoặc không có dữ liệu!", "error");
            }

            // Tiền xử lý dòng tiêu đề (loại bỏ dấu tiếng Việt, viết thường, loại bỏ khoảng trắng VÀ ký tự đặc biệt)
            const headers = rawJson[0].map(h => h
              ? h.toString().toLowerCase().trim()
                  .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // bỏ dấu tiếng Việt
                  .replace(/[^a-z0-9]/g, '')                        // bỏ tất cả ký tự không phải chữ/số (kể cả ngoặc, gạch ngang...)
              : '');

            // Debug: log headers ra console để kiểm tra nếu cần
            console.log('[Import] Headers sau normalize:', headers);

            // Tìm kiếm chỉ số cột - ưu tiên keyword cụ thể hơn để tránh nhầm
            // idxGoodsNo: Mã Hàng / Goods No / Item Code / Mã Sản Phẩm
            const idxGoodsNo = headers.findIndex(h =>
              h === 'mahang' || h === 'goodsno' || h === 'itemcode' || h === 'masanpham' ||
              h.startsWith('mahang') || h.includes('goodsno') || h.includes('itemcode') || h.includes('masanpham')
            );
            // idxHsCode: HS Code / Mã HS — dùng keyword dài hơn để không nhầm
            const idxHsCode = headers.findIndex(h =>
              h === 'hscode' || h === 'mahs' || h === 'hs' ||
              h.includes('hscode') || h.includes('mahs') || h.startsWith('hscode')
            );
            // idxNameEn: Tên Tiếng Anh / English Name / Description
            const idxNameEn = headers.findIndex(h =>
              h.includes('tientienganh') || h.includes('tentienganh') || h.includes('tienganh') ||
              h.includes('english') || h.includes('nameen') || h.includes('tenhangen') ||
              h.includes('descen') || (h.includes('ten') && h.includes('anh'))
            );
            // idxNameLocal: Tên Tiếng Việt / Vietnamese Name
            const idxNameLocal = headers.findIndex(h =>
              h.includes('tientingviet') || h.includes('tentingviet') || h.includes('tiengviet') ||
              h.includes('vietnamese') || h.includes('namevn') || h.includes('tenhangviet') ||
              h.includes('mota') || (h.includes('ten') && h.includes('viet'))
            );

            // Nếu không tìm được, thử fallback theo vị trí cột (A=0, B=1, C=2, D=3)
            const finalGoodsNo  = idxGoodsNo  !== -1 ? idxGoodsNo  : 0;
            const finalHsCode   = idxHsCode   !== -1 ? idxHsCode   : 1;
            const finalNameEn   = idxNameEn   !== -1 ? idxNameEn   : 2;
            const finalNameLocal= idxNameLocal !== -1 ? idxNameLocal: 3;

            // Chỉ báo lỗi nếu cả tự động lẫn fallback đều không có dữ liệu
            const missingCols = [];
            if (idxGoodsNo === -1)  missingCols.push('Mã Hàng (cột A)');
            if (idxHsCode === -1)   missingCols.push('HS Code (cột B)');
            if (idxNameEn === -1)   missingCols.push('Tên Tiếng Anh (cột C)');
            if (missingCols.length === 3) {
              // Hoàn toàn không nhận diện được → báo lỗi kèm hướng dẫn
              return showNotification(`Không nhận diện được cột! Hệ thống đang dùng vị trí cột mặc định A/B/C/D. Vui lòng đảm bảo header dòng 1 không bị trống.`, "error");
            }

            const importedItems = [];
            for (let i = 1; i < rawJson.length; i++) {
              const row = rawJson[i];
              if (!row || !row[finalGoodsNo]) continue;

              importedItems.push({
                goods_no: row[finalGoodsNo].toString().trim(),
                hs_code: row[finalHsCode] ? row[finalHsCode].toString().trim() : '00000000',
                goods_name_en: row[finalNameEn] ? row[finalNameEn].toString().trim() : 'No Description',
                goods_name_local: row[finalNameLocal] ? row[finalNameLocal].toString().trim() : 'Chưa có mô tả tiếng Việt',
                goods_unit_en: 'PCS',
                goods_unit_local: 'Cái'
              });
            }

            if (importedItems.length === 0) {
              return showNotification("Không đọc được mặt hàng nào hợp lệ!", "warning");
            }

            const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
            
            // Trộn dữ liệu: Ghi đè thông tin nếu trùng mã hàng, hoặc thêm mới
            let updatedDict = [...targetDict];
            importedItems.forEach(newItem => {
              const idx = updatedDict.findIndex(i => i.goods_no.toLowerCase() === newItem.goods_no.toLowerCase());
              if (idx !== -1) {
                updatedDict[idx] = newItem; // Đè dữ liệu mới
              } else {
                updatedDict.push(newItem); // Thêm dòng mới
              }
            });

            if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
            const detected = `Cột phát hiện: A=${finalGoodsNo}, B=${finalHsCode}, C=${finalNameEn}, D=${finalNameLocal}`;
            showNotification(`Import thành công! Đã cập nhật ${importedItems.length} mặt hàng vào Danh mục ${dbSelectedTab}.`);
          } catch (err) {
            console.error(err);
            if (err.name === 'QuotaExceededError' || (err.message && err.message.toLowerCase().includes('quota'))) {
              showNotification("Bộ nhớ cục bộ đã đầy! Hãy xóa bớt dữ liệu cũ hoặc dùng trình duyệt khác.", "error");
            } else {
              showNotification("Đọc Excel thất bại! Vui lòng kiểm tra lại cấu trúc file.", "error");
            }
          }
        };
        reader.readAsArrayBuffer(file);
      };

      // --- CÁC HÀM XÓA CASCADING (XÓA PHÂN CẤP TRÁNH RÁC DATABASE) ---
      const executeDeleteLot = (targetLotNo) => {
        const remainingLots = lots.filter(l => l.lot_no !== targetLotNo);
        const remainingInvoices = invoices.filter(i => i.lot_no !== targetLotNo);
        const relatedInvoiceNos = invoices.filter(i => i.lot_no === targetLotNo).map(i => i.invoice_no);
        const remainingGoods = goods.filter(g => !relatedInvoiceNos.includes(g.invoice_no));

        saveLotsToStorage(remainingLots);
        saveInvoicesToStorage(remainingInvoices);
        saveGoodsToStorage(remainingGoods);
        
        setSelectedLotNo(null);
        setSelectedInvoiceNo(null);
        setConfirmState(prev => ({ ...prev, isOpen: false }));
        showNotification(`Đã xóa hoàn toàn Lô hàng ${targetLotNo} cùng toàn bộ hóa đơn phụ thuộc.`);
      };

      const executeDeleteInvoice = (targetInvoiceNo) => {
        const remainingInvoices = invoices.filter(i => i.invoice_no !== targetInvoiceNo);
        const remainingGoods = goods.filter(g => g.invoice_no !== targetInvoiceNo);

        saveInvoicesToStorage(remainingInvoices);
        saveGoodsToStorage(remainingGoods);
        
        setSelectedInvoiceNo(null);
        setConfirmState(prev => ({ ...prev, isOpen: false }));
        showNotification(`Đã xóa hóa đơn ${targetInvoiceNo}`);
      };

      const executeDeleteGoods = (goodsId) => {
        const remainingGoods = goods.filter(g => g.id !== goodsId);
        saveGoodsToStorage(remainingGoods);
        setConfirmState(prev => ({ ...prev, isOpen: false }));
        showNotification("Đã xóa dòng mặt hàng thành công!");
      };

      // ── Suy ra transport_type từ dữ liệu cũ (trước khi có field transport_type) ──
      const inferTransportType = (lot) => {
        if (lot.transport_type) return lot.transport_type;
        // Legacy: is_cont=true → SEA_CONT, is_cont=false → SEA_CFS
        if (lot.is_cont === true || lot.is_cont === 'true') return 'SEA_CONT';
        if (lot.is_cont === false || lot.is_cont === 'false') return 'SEA_CFS';
        return 'SEA_CONT';
      };

      // Mở nhanh Edit modal
      const startEditLot = (lot, e) => {
        if(e) e.stopPropagation();
        setModalMode('edit');
        // Set selectedLotNo để currentInvoices và currentGoods hiển thị đúng lô đang sửa
        setSelectedLotNo(lot.lot_no);
        const inferredTransport = inferTransportType(lot);
        // Load ĐẦY ĐỦ toàn bộ dữ liệu lot cũ lên form, đảm bảo mọi field có giá trị
        setLotForm({
          lot_no:           lot.lot_no            || '',

          lot_date:         normalizeDate(lot.lot_date),
          get_docs_date:    normalizeDate(lot.get_docs_date),

          bill_no:          lot.bill_no           || '',
          bill_date:        normalizeDate(lot.bill_date),
          pol:              lot.pol               || '',
          pod:              lot.pod               || '',
          bill_term:        lot.bill_term         || 'Freight Prepaid',
          carrier:          lot.carrier           || '',
          transport_type:   inferredTransport,
          is_cont:          inferredTransport === 'SEA_CONT',
          cont_no:          lot.cont_no           || '',
          seal_no:          lot.seal_no           || '',
          cont_type:        lot.cont_type         || '40HC',
          pkg_qty:          Number(lot.pkg_qty)   || 0,
          gw:               Number(lot.gw)        || 0,
          cbm:              Number(lot.cbm)       || 0,
          cbm_str:          lot.cbm               ? String(lot.cbm) : '',
          eta:              normalizeDate(lot.eta),
          atc_date:         normalizeDate(lot.atc_date),
          origin_country:   lot.origin_country    || 'TAIWAN',
          loai_hinh:        lot.loai_hinh         || 'NEUTRAL',
          loai_hinh_con:    lot.loai_hinh_con     || 'DEFAULT',

        setSelectedFactories(lot.factory_no ? lot.factory_no.split(',').map(s=>s.trim()).filter(Boolean) : []);
        setModalTab('lot');
        setShowAddModal(true);
      };
      const startEditInvoice = (inv, e) => {
        if(e) e.stopPropagation();
        setModalMode('edit');
        // Load ĐẦY ĐỦ toàn bộ dữ liệu invoice cũ lên form với fallback cho từng field
        setInvoiceForm({
          invoice_no:          inv.invoice_no          || '',
          lot_no:              inv.lot_no              || '',
          bill_no:             inv.bill_no             || '',
          bill_stt:            Number(inv.bill_stt)    || 1,

          supplier:            inv.supplier            || 'CHANG YANG MATERIAL CORP.',
          currency:            inv.currency            || 'USD',
          total_amount:        Number(inv.total_amount)        || 0,
          foc_amount:          Number(inv.foc_amount)          || 0,
          plus_sea_freight:    Number(inv.plus_sea_freight)    || 0,

          other_charges_note:  inv.other_charges_note  || '',
          inv_pkg_qty:         Number(inv.inv_pkg_qty)         || 0,
          inv_gw:              Number(inv.inv_gw)              || 0,
          is_hang_chung_bill:  inv.is_hang_chung_bill  || false,
          factory_no:          inv.factory_no          || '',
          contract_start:      normalizeDate(inv.contract_start),
          contract_end:        normalizeDate(inv.contract_end),
        });
        // Load parent lot để form hiển thị đúng context (hàng chung bill, etc.)
        const parentLot = lots.find(l => l.lot_no === inv.lot_no);
        if (parentLot) {
          setLotForm(prev => ({
            ...prev,

          }));
        }
        // Set selected IDs so main table highlights correct row
        setSelectedLotNo(inv.lot_no || null);
        setSelectedInvoiceNo(inv.invoice_no || null);

        setShowAddModal(true);
      };
      const startEditGoods = (item, e) => {
        if(e) e.stopPropagation();
        setModalMode('edit');
        // Load ĐẦY ĐỦ toàn bộ dữ liệu goods cũ lên form với fallback cho từng field
        setGoodsForm({
          id:                   item.id                   || '',
          invoice_no:           item.invoice_no           || '',
          goods_no:             item.goods_no             || '',
          goods_item:           Number(item.goods_item)   || 1,
          goods_name_en:        item.goods_name_en        || '',
          goods_name_local:     item.goods_name_local     || '',
          goods_unit_en:        item.goods_unit_en        || 'PCS',
          goods_unit_en2:       item.goods_unit_en2       || '',
          goods_unit_local:     item.goods_unit_local     || 'Cái',
          goods_unit_local2:    item.goods_unit_local2    || '',
          hs_code:              item.hs_code              || '',
          invoice_description:  item.invoice_description  || '',
          origin_country:       item.origin_country       || 'TAIWAN',
          qty1:                 Number(item.qty1)          || 0,
          unit1:                item.unit1                || item.goods_unit_en || 'PCS',
          qty2:                 Number(item.qty2)          || 0,
          unit2:                item.unit2                || item.goods_unit_en2 || '',
          unit_price:           Number(item.unit_price)   || 0,
          unit_price_str:       item.unit_price           ? String(item.unit_price) : '',
          sale_amount:          Number(item.sale_amount)  || 0,
        });
        // Set selected invoice so goods table shows correct data
        const parentInv = invoices.find(i => i.invoice_no === item.invoice_no);
        if (parentInv) {
          setSelectedLotNo(parentInv.lot_no || null);
          setSelectedInvoiceNo(item.invoice_no);
        }
        setModalTab('goods');
        setShowAddModal(true);
      };

      const triggerDeleteLotConfirm = (lotNo, e) => {
        if(e) e.stopPropagation();
        const lotInvCount = invoices.filter(i => i.lot_no === lotNo).length;
        const lotGoodsCount = goods.filter(g => invoices.filter(i => i.lot_no === lotNo).map(i => i.invoice_no).includes(g.invoice_no)).length;
        setConfirmState({
          isOpen: true,
          title: '⚠️ Xóa Lô Hàng — Thao tác không thể hoàn tác',
          message: 'Lô hàng [' + lotNo + '] chứa ' + lotInvCount + ' hóa đơn và ' + lotGoodsCount + ' mặt hàng sẽ bị xóa vĩnh viễn theo cơ chế Cascading. Bạn có chắc chắn?',
          onConfirm: () => executeDeleteLot(lotNo)
        });
      };
      const triggerDeleteInvoiceConfirm = (invNo, e) => { if(e) e.stopPropagation(); setConfirmState({ isOpen: true, title: 'Xóa Hóa Đơn', message: `Hóa đơn thương mại [${invNo}] và các mặt hàng bên trong sẽ bị xóa khỏi hệ thống.`, onConfirm: () => executeDeleteInvoice(invNo) }); };
      const triggerDeleteGoodsConfirm = (gId, e) => { if(e) e.stopPropagation(); setConfirmState({ isOpen: true, title: 'Xóa Chi Tiết Mặt Hàng', message: `Xác nhận xóa mặt hàng này khỏi hóa đơn?`, onConfirm: () => executeDeleteGoods(gId) }); };

      const handlePortalQuickSearch = (e) => { e.preventDefault(); setFilterLotNo(homeSearchQuery); setActiveMenu('E010'); };
      
      // Kiểm tra có filter đang active không
      const hasActiveFilter = !!(filterFromDate || filterToDate || filterLotNo.trim());

      const filteredLots = lots.filter(lot => {
        if (filterLotNo && filterLotNo !== '__ALL__') {
          const q = filterLotNo.toLowerCase();
          const lotMatch = lot.lot_no.toLowerCase().includes(q) || (lot.supplier && lot.supplier.toLowerCase().includes(q)) || (lot.bill_no && lot.bill_no.toLowerCase().includes(q));
          if (!lotMatch) return false;
        }
        if (filterFromDate && lot.lot_date < filterFromDate) return false;
        if (filterToDate && lot.lot_date > filterToDate) return false;
        return true;
      });

      // Shared container detection
      const sharedContNos = (() => {
        const contMap = {};
        lots.forEach(l => {
          if (l.cont_no && l.cont_no.trim()) {
            const key = l.cont_no.trim().toUpperCase();
            if (!contMap[key]) contMap[key] = [];
            contMap[key].push(l.lot_no);
          }
        });
        const shared = new Set();
        Object.values(contMap).forEach(arr => { if (arr.length > 1) arr.forEach(n => shared.add(n)); });
        return shared;
      })();
      const currentInvoices = invoices.filter(inv => inv.lot_no === selectedLotNo);
      const currentGoods = goods.filter(g => g.invoice_no === selectedInvoiceNo);
      const pendingAtcLots = lots.filter(lot => !lot.atc_date || lot.atc_date.trim() === '');

      const getInvoiceValueSum = (inv) => {
        const base = goods.filter(g => g.invoice_no === inv.invoice_no).reduce((sum, item) => sum + item.sale_amount, 0);
        return base + (Number(inv.plus_sea_freight) || 0) + (Number(inv.handling_charges) || 0) + (Number(inv.other_charges) || 0) - (Number(inv.foc_amount) || 0);
      };

      const getSelectedLotTotalValue = () => invoices.filter(i => i.lot_no === selectedLotNo).reduce((sum, inv) => sum + getInvoiceValueSum(inv), 0);
      const totalImportValue = invoices.reduce((sum, inv) => sum + getInvoiceValueSum(inv), 0);

      // Export CSV
      const handleExportCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
        csvContent += `STT,Mã Lô Hàng,Ngày Mở Lô,Số Bill,Cảng Đi,Cảng Đến,Số Cont,Tổng Tiền Lô\r\n`;
        filteredLots.forEach(lot => {
          const lotVal = invoices.filter(i => i.lot_no === lot.lot_no).reduce((sum, inv) => sum + getInvoiceValueSum(inv), 0);
          csvContent += `"${lot.stt}","${lot.lot_no}","${lot.lot_date}","${lot.bill_no || ''}","${lot.pol || ''}","${lot.pod || ''}","${lot.cont_no || ''}","${lotVal}"\r\n`;
        });
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `BaoCao_Logistics_ChangYang_${new Date().toISOString().slice(0, 10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showNotification("Đã xuất báo cáo CSV thành công!");
      };

      // Đối chiếu danh mục tự động
      // ── FUZZY MATCH HELPERS ─────────────────────────────────────────
      const fuzzyScore = (a, b) => {
        const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g, ' ').replace(/\s+/g, ' ').trim();
        const na = norm(a), nb = norm(b);
        if (na === nb) return 1;
        if (na.length < 2 || nb.length < 2) return (na.includes(nb) || nb.includes(na)) ? 0.5 : 0;

                        <div>

                      {/* ROW 3: Số Bill + Ngày Bill + Điều kiện Bill + Hãng Tàu/FWD */}

                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Điều kiện Bill</label>
                          <select value={lotForm.bill_term} onChange={(e) => setLotForm({...lotForm, bill_term: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" style={{colorScheme:"dark"}}>
                            <option value="Freight Prepaid">Freight Prepaid (Người gửi trả cước)</option>
                            <option value="Freight Collect">Freight Collect (Người nhận trả cước)</option>
                          </select>

                          <label className="block text-[11px] text-slate-400 mb-1">Hãng Tàu / Forwarder</label>

                      {/* ROW 4: Cảng Đi + Cảng Đến + Xuất Xứ */}

                          <label className="block text-[11px] text-slate-400 mb-1">Cảng Đi (POL)</label>

                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Cảng Đến (POD)</label>
                          <input type="text" value={lotForm.pod} onChange={(e) => setLotForm({...lotForm, pod: e.target.value.toUpperCase()})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" style={{colorScheme:"dark"}} />

                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Xuất Xứ Hàng Hóa</label>
                          <input type="text" list="origin-country-list" value={lotForm.origin_country}

                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" style={{colorScheme:"dark"}} />

                            <option value="JAPAN" /><option value="KOREA" /><option value="VIETNAM" />
                            <option value="GERMANY" /><option value="USA" /><option value="ITALY" />
                          </datalist>
                        </div>
                      </div>

                      {/* ROW 5: Loại hàng vận chuyển */}
                      <div className="bg-slate-950/50 border border-slate-800 rounded-xl p-4 space-y-4">

                        <div className="flex gap-3 flex-wrap">
                          {[
                            { val: 'AIR', label: '✈ AIR', color: 'sky' },
                            { val: 'EXPRESS', label: '📦 EXPRESS (DHL/FedEx)', color: 'purple' },
                            { val: 'SEA_CONT', label: '🚢 SEA – CONT', color: 'blue' },
                            { val: 'SEA_CFS', label: '⚓ SEA – CFS (LCL)', color: 'indigo' },
                            { val: 'NGOAI_QUAN', label: '🏭 Ngoại Quan', color: 'amber' },
                            { val: 'BY_TRUCK', label: '🚛 By Truck', color: 'green' },
                          ].map(opt => (
                            <button type="button" key={opt.val}
                              onClick={() => setLotForm(prev => ({...prev, transport_type: opt.val, is_cont: opt.val === 'SEA_CONT'}))}
                              className={`px-4 py-2 rounded-lg text-xs font-bold border transition-all
                                ${lotForm.transport_type === opt.val
                                  ? 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/40'
                                  : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                              {opt.label}
                            </button>
                          ))}
                        </div>

                        {/* SEA CONT: Số Cont + Seal + Loại Cont */}
                        {lotForm.transport_type === 'SEA_CONT' && (
                          <div className="grid grid-cols-3 gap-4 pt-2 border-t border-slate-800">
                            <div>
                              <label className="block text-[11px] text-slate-400 mb-1">Số Cont *</label>
                              <input type="text" value={lotForm.cont_no} onChange={(e) => setLotForm({...lotForm, cont_no: e.target.value.toUpperCase()})} className="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white font-mono" placeholder="TGBU-9928172" />
                            </div>
                            <div>
                              <label className="block text-[11px] text-slate-400 mb-1">Số Seal</label>
                              <input type="text" value={lotForm.seal_no} onChange={(e) => setLotForm({...lotForm, seal_no: e.target.value.toUpperCase()})} className="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white font-mono" />
                            </div>
                            <div>
                              <label className="block text-[11px] text-slate-400 mb-1">Loại Cont</label>
                              <select value={lotForm.cont_type} onChange={(e) => setLotForm({...lotForm, cont_type: e.target.value})} className="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white">
                                <option>20DC</option><option>40DC</option><option>40HC</option><option>45HC</option>
                              </select>
                            </div>
                          </div>

                            <label className="block text-[11px] text-slate-400 mb-1">Số Kiện (Pkg Qty)</label>

                              onChange={(e) => setLotForm({...lotForm, pkg_qty: parseFloat(e.target.value)||0})}
                              className="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-400 mb-1">Gross Weight (KG)</label>
                            <input type="number" step="0.001" min="0" value={lotForm.gw || ''}
                              onChange={(e) => setLotForm({...lotForm, gw: parseFloat(e.target.value)||0})}
                              className="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-400 mb-1">
                              CBM (m³){(lotForm.transport_type === 'AIR' || lotForm.transport_type === 'EXPRESS') ? ' — N/A' : ''}

                                const raw = e.target.value;
                                if (!/^[0-9]*\.?[0-9]*$/.test(raw) && raw !== '') return;
                                setLotForm(prev => ({...prev, cbm_str: raw, cbm: raw === '' || raw === '.' ? 0 : parseFloat(raw)||0}));
                              }}
                              placeholder="0.000"
                              className={`w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-xs text-white font-mono ${(lotForm.transport_type === 'AIR' || lotForm.transport_type === 'EXPRESS') ? 'opacity-30 cursor-not-allowed' : ''}`} />
                          </div>
                        </div>
                      </div>

                      <div className="pt-4 border-t border-slate-800 flex justify-between items-center">

                        )}
                        <button type="submit"
                          className={`ml-auto px-6 py-2.5 rounded-lg text-xs font-bold text-white ${modalMode === 'edit' ? 'bg-amber-600 hover:bg-amber-500' : 'bg-blue-600 hover:bg-blue-700'}`}>
                          {modalMode === 'edit' ? '✔ Cập Nhật Thông Tin Bill' : 'Lưu Thông Tin Bill → Nhập Invoice ➔'}
                        </button>
                      </div>
                    </form>
                  )}

                  {/* TAB 2: HÓA ĐƠN */}
                  {modalTab === 'invoice' && (
                    <form onSubmit={handleSaveInvoice} className="space-y-5">

                      {/* --- CHỌN HÓA ĐƠN ĐỂ SỬA (edit mode, khi chưa chọn invoice nào) --- */}
                      {modalMode === 'edit' && !invoiceForm.invoice_no && selectedLotNo && (() => {
                        const lotInvoices = invoices.filter(i => i.lot_no === selectedLotNo);
                        if (lotInvoices.length === 0) return (
                          <div className="bg-slate-950/50 border border-slate-800 rounded-xl p-6 text-center">
                            <p className="text-slate-400 text-xs">Lô <strong className="text-white">{selectedLotNo}</strong> chưa có hóa đơn nào.</p>
                          </div>
                        );
                        return (
                          <div className="bg-indigo-950/20 border border-indigo-800/40 rounded-xl overflow-hidden">
                            <div className="bg-indigo-950/40 px-4 py-2.5 border-b border-indigo-900/30">
                              <p className="text-[11px] font-bold text-indigo-300 uppercase tracking-wider">📋 Chọn Hóa Đơn Để Sửa — Lô {selectedLotNo}</p>
                            </div>
                            <div className="p-3 flex flex-wrap gap-2">
                              {lotInvoices.map(inv => (
                                <button key={inv.invoice_no} type="button"
                                  onClick={() => startEditInvoice(inv)}
                                  className="flex flex-col items-start bg-slate-900 hover:bg-indigo-900/30 border border-slate-700 hover:border-indigo-600 rounded-lg px-4 py-2.5 transition-all text-left">
                                  <span className="font-mono font-bold text-indigo-300 text-xs">{inv.invoice_no}</span>
                                  <span className="text-[10px] text-slate-500 mt-0.5">{fmtDisplayDate(inv.invoice_date)} · {inv.currency||'USD'} {Number(inv.total_amount||0).toLocaleString()}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        );
                      })()}

                      {/* ── HÀNG CHUNG BILL: per-invoice pkg/gw when lotForm.is_hang_chung_bill ── */}
                      {lotForm.is_hang_chung_bill && (
                        <div className="bg-amber-950/20 border border-amber-700/50 rounded-xl p-4 space-y-3">
                          <p className="text-[10px] font-bold text-amber-400 uppercase tracking-wider">📦 Số Kiện & GW Riêng Của Invoice Này (Hàng Chung Bill)</p>
                          <p className="text-[10px] text-slate-500 italic">Số kiện + GW của các invoice cộng lại = tổng trên Bill. Nhập riêng cho từng invoice.</p>
                          <div className="grid grid-cols-2 gap-3">
                            <div>
                              <label className="block text-[11px] text-amber-300 mb-1">Số Kiện (Invoice này)</label>
                              <input type="number" step="1" min="0"
                                value={invoiceForm.inv_pkg_qty || ''}
                                onChange={e => setInvoiceForm(prev => ({...prev, inv_pkg_qty: Number(e.target.value)||0}))}
                                className="w-full bg-slate-950 border border-amber-900/40 rounded px-3 py-2 text-xs text-sky-300 font-bold" />
                            </div>
                            <div>
                              <label className="block text-[11px] text-amber-300 mb-1">Gross Weight kg (Invoice này)</label>
                              <input type="number" step="0.1" min="0"
                                value={invoiceForm.inv_gw || ''}
                                onChange={e => setInvoiceForm(prev => ({...prev, inv_gw: Number(e.target.value)||0}))}
                                className="w-full bg-slate-950 border border-amber-900/40 rounded px-3 py-2 text-xs text-sky-300 font-bold" />
                            </div>
                          </div>
                        </div>
                      )}

                      {/* ROW 1: Loại hình + Sub + Nhà cung ứng */}

                          <select value={invoiceForm.loai_hinh} onChange={(e) => setInvoiceForm({...invoiceForm, loai_hinh: e.target.value, loai_hinh_con: 'DEFAULT'})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-slate-200">
                            <option value="A12">A12 (Kinh doanh)</option>
                            <option value="E21">E21 (Gia công)</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Loại hình con</label>
                          <select value={invoiceForm.loai_hinh_con} onChange={(e) => setInvoiceForm({...invoiceForm, loai_hinh_con: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-slate-200">
                            {invoiceForm.loai_hinh === 'A12' ? <>
                              <option value="DEFAULT">KD – Kinh doanh</option>
                              <option value="H11">H11 – Hàng phi mậu dịch</option>
                              <option value="DT">DT – Đầu tư</option>
                            </> : <>
                              <option value="DEFAULT">E21 – Mặc định</option>
                              <option value="CHUYEN_TIEP">Chuyển tiếp</option>
                            </>}
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Nhà Cung Ứng (Supplier)</label>
                          <input type="text" list="supplier-history-list" value={invoiceForm.supplier}
                            onChange={(e) => setInvoiceForm({...invoiceForm, supplier: e.target.value})}
                            placeholder="Gõ hoặc chọn nhà cung ứng..."
                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" style={{colorScheme:"dark"}} />
                          <datalist id="supplier-history-list">
                            {supplierHistory.map((s, i) => <option key={i} value={s} />)}
                          </datalist>
                        </div>
                      </div>

                          <select value={invoiceForm.bill_stt || lotForm.stt || ''}
                            onChange={(e) => {
                              const stt = Number(e.target.value);
                              setInvoiceForm(prev => ({...prev, bill_stt: stt}));
                              setLotAssignForm(prev => ({...prev, stt}));

                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-amber-400 font-bold font-mono">
                            <option value="">— Chọn STT từ Bill đã nhập —</option>
                            {/* STT hiện tại từ lotForm (draft) */}

                              <option value={lotForm.stt}>
                                STT {lotForm.stt} — Bill: {lotForm.bill_no || 'N/A'} ({fmtDisplayDate(lotForm.lot_date)})
                              </option>
                            )}
                          </select>
                          <p className="text-[10px] text-slate-600 mt-1">STT từ thông tin Bill vừa nhập ở Tab 1</p>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Số Hóa Đơn Thương Mại *</label>

                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Ngày Hóa Đơn</label>

                            const d = e.target.value;
                            if (!d) { setInvoiceForm({...invoiceForm, invoice_date: d}); return; }
                            const startD = new Date(d);
                            startD.setDate(startD.getDate() - 10);
                            const endD = new Date(startD);
                            endD.setDate(endD.getDate() + 180);
                            const fmt = dt => dt.toISOString().substring(0,10);
                            setInvoiceForm(prev => ({
                              ...prev,
                              invoice_date: d,
                              contract_start: prev.contract_start || fmt(startD),
                              contract_end: prev.contract_end || fmt(endD),
                            }));
                          }} className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white" style={{colorScheme:"dark"}} />
                        </div>
                      </div>

                      {/* ROW 3: Currency + Incoterm + Số Bill */}
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Currency</label>
                          <select value={invoiceForm.currency || 'USD'}
                            onChange={e => setInvoiceForm({...invoiceForm, currency: e.target.value})}
                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-emerald-300 font-bold">
                            <option value="USD">USD – US Dollar</option>
                            <option value="EUR">EUR – Euro</option>
                            <option value="JPY">JPY – Japanese Yen</option>
                            <option value="CNY">CNY – Chinese Yuan</option>
                            <option value="TWD">TWD – Taiwan Dollar</option>
                            <option value="KRW">KRW – Korean Won</option>
                            <option value="GBP">GBP – British Pound</option>
                            <option value="SGD">SGD – Singapore Dollar</option>
                            <option value="VND">VND – Vietnamese Dong</option>
                            <option value="THB">THB – Thai Baht</option>
                            <option value="MYR">MYR – Malaysian Ringgit</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Điều Khoản Incoterm</label>

                            <optgroup label="Nhóm E – EXW">
                              <option value="EXW">EXW – Ex Works</option>
                            </optgroup>
                            <optgroup label="Nhóm F – Free…">
                              <option value="FCA">FCA – Free Carrier</option>
                              <option value="FOB">FOB – Free on Board</option>
                              <option value="FAS">FAS – Free Alongside Ship</option>
                            </optgroup>
                            <optgroup label="Nhóm C – Cost…">
                              <option value="CIF">CIF – Cost, Insurance & Freight</option>
                              <option value="CFR">CFR / C&F – Cost & Freight</option>
                              <option value="CIP">CIP – Carriage & Insurance Paid</option>
                              <option value="CPT">CPT – Carriage Paid To</option>
                            </optgroup>
                            <optgroup label="Nhóm D – Delivered…">
                              <option value="DAP">DAP – Delivered at Place</option>
                              <option value="DAT">DAT – Delivered at Terminal</option>
                              <option value="DDP">DDP – Delivered Duty Paid</option>
                            </optgroup>
                          </select>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Số Bill liên quan
                            <span className="ml-1 text-slate-600 normal-case font-normal">— dò tìm từ lô đã tạo</span>
                          </label>
                          <input type="text" list="bill-no-suggestions" value={invoiceForm.bill_no}
                            onChange={(e) => setInvoiceForm({...invoiceForm, bill_no: e.target.value.toUpperCase()})}
                            placeholder="Nhập vài ký tự để tìm bill..."
                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-white font-mono" />
                          <datalist id="bill-no-suggestions">
                            {[...new Set(lots.filter(l => l.bill_no).map(l => l.bill_no))].map((b, i) => (
                              <option key={i} value={b}>{b} — {lots.filter(l => l.bill_no === b).map(l => l.lot_no).join(', ')}</option>

                                try {
                                  const data = new Uint8Array(ev.target.result);

                                  const ws = wb.Sheets[wb.SheetNames[0]];
                                  const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });

                                  const norm = h => h ? h.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,'') : '';

                                  const idxInv   = headers.findIndex(h => h.includes('invoice') || h.includes('hoadon') || h === 'invoiceno');
                                  const idxName  = headers.findIndex(h => h.includes('tienganh') || h.includes('english') || h.includes('name') || h.includes('ten'));
                                  const idxOrig  = headers.findIndex(h => h.includes('origin') || h.includes('xuatxu') || h.includes('xuat'));
                                  const idxQty1  = headers.findIndex(h => (h.includes('soluong') || h.includes('qty')) && !h.includes('2'));
                                  const idxUnit1 = headers.findIndex(h => (h.includes('donvi') || h.includes('unit')) && !h.includes('2'));
                                  const idxQty2  = headers.findIndex(h => (h.includes('soluong') || h.includes('qty')) && h.includes('2'));
                                  const idxUnit2 = headers.findIndex(h => (h.includes('donvi') || h.includes('unit')) && h.includes('2'));
                                  const idxPrice = headers.findIndex(h => h.includes('dongia') || h.includes('unitprice') || h.includes('price'));
                                  const currentInv = invoices.find(i => i.invoice_no === goodsForm.invoice_no);
                                  const targetDict = currentInv?.loai_hinh === 'E21' ? dictE21 : dictA12;
                                  let batch = [...goods];
                                  let count = 0, skipped = 0;
                                  let itemNo = goods.filter(g => String(g.invoice_no) === String(goodsForm.invoice_no)).length + 1;
                                  for (let ri = 1; ri < rows.length; ri++) {
                                    const row = rows[ri];
                                    if (idxInv !== -1) {
                                      const rowInv = String(row[idxInv]||'').trim();
                                      if (rowInv && rowInv !== String(goodsForm.invoice_no).trim()) { skipped++; continue; }
                                    }
                                    const nameVal = (idxName !== -1 && row[idxName]) ? row[idxName].toString().trim() : '';
                                    if (!nameVal) continue;
                                    const fuzzyRes = findBestDictMatch(nameVal, targetDict);
                                    const dm = fuzzyRes ? fuzzyRes.item : null;
                                    const qty1v = idxQty1 !== -1 ? Number(row[idxQty1])||0 : 0;
                                    const pv = idxPrice !== -1 ? Number(row[idxPrice])||0 : 0;
                                    batch.push({
                                      id: "goods_" + Date.now() + "_" + ri,
                                      invoice_no: goodsForm.invoice_no, goods_item: itemNo++,
                                      goods_no: dm?.goods_no || nameVal.substring(0,20).toUpperCase(),
                                      goods_name_en: dm?.goods_name_en || nameVal,
                                      goods_name_local: dm?.goods_name_local || '',
                                      hs_code: dm?.hs_code || '', goods_unit_en: dm?.goods_unit_en || 'PCS',
                                      goods_unit_local: dm?.goods_unit_local || '', invoice_description: nameVal,
                                      origin_country: idxOrig !== -1 ? String(row[idxOrig]||'TAIWAN').trim().toUpperCase() : 'TAIWAN',
                                      qty1: qty1v, unit1: idxUnit1 !== -1 ? String(row[idxUnit1]||'PCS').trim() : 'PCS',
                                      qty2: idxQty2 !== -1 ? Number(row[idxQty2])||0 : 0,
                                      unit2: idxUnit2 !== -1 ? String(row[idxUnit2]||'').trim() : '',
                                      unit_price: pv, sale_amount: qty1v * pv,
                                    });
                                    count++;
                                  }
                                  saveGoodsToStorage(batch);
                                  showNotification(`Imported ${count} item(s) to ${goodsForm.invoice_no}${skipped ? ' ('+skipped+' skipped)' : ''}`);
                                  e.target.value = '';
                                } catch(err) { console.error(err); showNotification("Failed to read Excel!", "error"); }
                              };
                              reader.readAsArrayBuffer(file);
                            }} />
                          </label>
                          <p className="text-[10px] text-slate-600 mt-1">Invoice No | EN Name | Origin | Qty1 | Unit1 | Qty2 | Unit2 | Unit Price</p>
                        </div>
                      </div>

                              const targetDict = currentInv?.loai_hinh === 'E21' ? dictE21 : dictA12;
                              return targetDict.map((item, idx) => <option key={idx} value={item.goods_name_en}>{item.goods_no} — HS: {item.hs_code}</option>);

                        </div>
                        <div>

                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">HS Code (auto-filled)</label>
                          <input type="text" readOnly value={goodsForm.hs_code} className="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none" />
                        </div>
                      </div>

                      {/* Origin + Qty1 + Unit1 + Qty2 + Unit2 */}
                      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Origin</label>
                          <input type="text" list="goods-origin-list" value={goodsForm.origin_country || 'TAIWAN'}
                            onChange={e => setGoodsForm({...goodsForm, origin_country: e.target.value.toUpperCase()})}

                          <datalist id="goods-origin-list">

                            <option value="JAPAN" /><option value="KOREA" /><option value="VIETNAM" />

                            className="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-xs text-sky-300 font-bold" />

                        </button>

                      if (previewItems.length === 0) return null;
                      return (
                        <div className="mt-6 bg-slate-950/60 border border-emerald-900/30 rounded-xl overflow-hidden">
                          <div className="bg-emerald-950/40 px-4 py-2 border-b border-emerald-900/30 flex justify-between items-center">

                              ✅ Items in Invoice: {goodsForm.invoice_no}

                            <span className="text-[10px] text-emerald-600">{previewItems.length} item(s)</span>

                                <tr className="bg-slate-950 text-slate-500 border-b border-slate-800">

                                  <th className="px-3 py-2">Item Code</th>
                                  <th className="px-3 py-2">English Name</th>
                                  <th className="px-3 py-2 text-center">Origin</th>
                                  <th className="px-3 py-2 text-right">Qty 1</th>
                                  <th className="px-3 py-2 text-center">Unit 1</th>
                                  <th className="px-3 py-2 text-right">Qty 2</th>
                                  <th className="px-3 py-2 text-center">Unit 2</th>
                                  <th className="px-3 py-2 text-right">Unit Price</th>
                                  <th className="px-3 py-2 text-right">Amount</th>

                                </tr>

                                {previewItems.sort((a,b) => (a.goods_item||0)-(b.goods_item||0)).map((g, idx) => (

                                    <td className="px-3 py-2 text-center text-slate-600">{g.goods_item || idx+1}</td>
                                    <td className="px-3 py-2 font-mono text-emerald-400 font-bold">{(g.goods_no||'').split('*')[0].trim()}</td>
                                    <td className="px-3 py-2 text-slate-300 max-w-[180px] truncate" title={g.goods_name_en}>{g.goods_name_en}</td>
                                    <td className="px-3 py-2 text-center text-slate-400">{g.origin_country || 'TAIWAN'}</td>
                                    <td className="px-3 py-2 text-right font-mono text-sky-300">{Number(g.qty1||0).toLocaleString()}</td>
                                    <td className="px-3 py-2 text-center text-slate-400">{g.unit1 || g.goods_unit_en || 'PCS'}</td>
                                    <td className="px-3 py-2 text-right font-mono text-sky-400/70">{g.qty2 ? Number(g.qty2).toLocaleString() : '—'}</td>
                                    <td className="px-3 py-2 text-center text-slate-500">{g.unit2 || '—'}</td>

                  {/* ════════════════════════════════════════════

                      ════════════════════════════════════════════ */}
                  {modalTab === 'assign' && modalMode !== 'edit' && (() => {

                          <div className="mt-2 text-[10px] text-amber-700 space-y-0.5">
                            <p>A12 KD → <span className="font-mono text-amber-400">CH[stt]KD-[yy]</span> &nbsp;|&nbsp;
                               A12 H11 → <span className="font-mono text-amber-400">CH[stt]-[yy]PMD</span> &nbsp;|&nbsp;
                               A12 DT → <span className="font-mono text-amber-400">CH[stt]DT-[yy]</span></p>
                            <p>E21 → <span className="font-mono text-amber-400">CH[stt]-[yy]</span> &nbsp;|&nbsp;

                              {(() => {

                                invoices.filter(i => draftInvoiceNos.includes(i.invoice_no)).forEach(i => {

                          </div>
                          <div className="bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-2.5 flex items-center gap-2">

                            <span className="text-[10px] text-slate-600 ml-2">STT: {lotForm.stt}</span>
                          </div>
                        </div>

                        {/* Danh sách invoice chưa có lô */}
                        {unassignedInvoices.length === 0 ? (

                            <p className="text-slate-500 text-xs">Bấm nút Kết Thúc để xem danh sách lô.</p>

                              <button type="button"
                                onClick={() => setLotAssignForm(prev => ({
                                  ...prev,
                                  selectedInvoiceNos: prev.selectedInvoiceNos.length === unassignedInvoices.length
                                    ? [] : unassignedInvoices.map(i => i.invoice_no)
                                }))}
                                className="text-[10px] text-blue-400 hover:text-blue-300">
                                {lotAssignForm.selectedInvoiceNos.length === unassignedInvoices.length ? 'Bỏ chọn tất cả' : 'Chọn tất cả'}
                              </button>
                            </div>

                            <div className="space-y-2 max-h-56 overflow-y-auto pr-1">
                              {unassignedInvoices.map(inv => {
                                const checked = lotAssignForm.selectedInvoiceNos.includes(inv.invoice_no);
                                const stt = Number(inv.bill_stt) || Number(lotForm.stt) || 1;
                                const previewLot = generateLotNoString(inv.loai_hinh||'A12', inv.loai_hinh_con||'DEFAULT', stt);
