                                        <span className="text-[10px] text-slate-600">→ <span className="font-mono text-amber-500">{previewLot}</span></span>
                                      </div>
                                      <div className="text-[10px] text-slate-500 mt-0.5">
                                        {fmtDisplayDate(inv.invoice_date)} | {inv.currency||'USD'} {Number(inv.total_amount||0).toLocaleString()}
                                        {inv.inv_pkg_qty ? ` | ${inv.inv_pkg_qty} kiện / ${inv.inv_gw}kg` : ''}
                                      </div>
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        )}

                        {/* Preview: các lô sẽ được tạo từ invoices đã chọn */}
                        {lotAssignForm.selectedInvoiceNos.length > 0 && (() => {
                          const selInvs = invoices.filter(i => lotAssignForm.selectedInvoiceNos.includes(i.invoice_no));
                          // Group selected by STT + loai_hinh
                          const previewGroups = [];
                          selInvs.forEach(inv => {
                            const stt = Number(inv.bill_stt) || Number(lotForm.stt) || 1;
                            const key = `${stt}_${inv.loai_hinh||'A12'}_${inv.loai_hinh_con||'DEFAULT'}`;
                            let g = previewGroups.find(x => x.key === key);
                            if (!g) {
                              const lotNo = generateLotNoString(inv.loai_hinh||'A12', inv.loai_hinh_con||'DEFAULT', stt);
                              const exists = lots.some(l => String(l.lot_no||'').toLowerCase() === lotNo.toLowerCase());
                              g = { key, stt, loai_hinh: inv.loai_hinh, loai_hinh_con: inv.loai_hinh_con, lotNo, exists, invs: [] };
                              previewGroups.push(g);
                            }
                            g.invs.push(inv);
                          });

                          return (
                            <div className="bg-slate-900/50 border border-amber-900/30 rounded-xl overflow-hidden">
                              <div className="bg-amber-950/30 px-4 py-2 border-b border-amber-900/30">
                                <p className="text-[11px] font-bold text-amber-400">📦 Các Mã Lô Sẽ Được Tạo ({previewGroups.length} lô)</p>
                              </div>
                              <div className="divide-y divide-slate-800">
                                {previewGroups.map(grp => (
                                  <div key={grp.key} className={`px-4 py-3 flex items-center justify-between gap-4 ${grp.exists ? 'bg-rose-950/20' : ''}`}>
                                    <div>
                                      <p className={`text-base font-black font-mono ${grp.exists ? 'text-rose-400' : 'text-amber-400'}`}>{grp.lotNo}</p>
                                      <p className="text-[10px] text-slate-500">{grp.loai_hinh} / {grp.loai_hinh_con} — STT {grp.stt}</p>
                                    </div>
                                    <div className="text-right">
                                      <p className="text-[11px] text-slate-300">{grp.invs.length} invoice(s)</p>
                                      <p className="text-[10px] text-slate-500">{grp.invs.map(i=>i.invoice_no).join(', ')}</p>
                                      {grp.exists && <p className="text-[10px] text-rose-400 font-bold">⚠️ Mã lô đã tồn tại!</p>}
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        })()}

                        {/* Action buttons */}
                        <div className="pt-4 border-t border-slate-800 flex gap-3 justify-end">
                          <button type="button"
                            onClick={() => {
                              if (lotAssignForm.selectedInvoiceNos.length === 0) return showNotification("Chọn ít nhất 1 invoice!", "error");
                              const selInvs = invoices.filter(i => lotAssignForm.selectedInvoiceNos.includes(i.invoice_no));
                              // Group by STT + loai_hinh + loai_hinh_con
                              const groups = {};
                              selInvs.forEach(inv => {
                                const stt = Number(inv.bill_stt) || Number(lotForm.stt) || 1;
                                const key = `${stt}_${inv.loai_hinh||'A12'}_${inv.loai_hinh_con||'DEFAULT'}`;
                                if (!groups[key]) groups[key] = { stt, loai_hinh: inv.loai_hinh||'A12', loai_hinh_con: inv.loai_hinh_con||'DEFAULT', invs: [] };
                                groups[key].invs.push(inv);
                              });
                              let createdLots = [...lots];
                              let updatedInvoices = [...invoices];
                              let lotNames = [];
                              let hasError = false;

                              Object.values(groups).forEach(grp => {
                                const lot_no = generateLotNoString(grp.loai_hinh, grp.loai_hinh_con, grp.stt);
                                if (createdLots.some(l => String(l.lot_no||'').toLowerCase() === lot_no.toLowerCase())) {
                                  showNotification(`Mã lô [${lot_no}] đã tồn tại!`, "error");
                                  hasError = true; return;
                                }
                                const grpPkg = grp.invs.reduce((s,i) => s + Number(i.inv_pkg_qty||0), 0);
                                const grpGw  = grp.invs.reduce((s,i) => s + Number(i.inv_gw||0), 0);
                                const grpFactories = new Set();
                                grp.invs.forEach(inv => { (inv.factory_no||'').split(',').map(f=>f.trim()).filter(Boolean).forEach(f=>grpFactories.add(f)); });
                                const newLot = {
                                  ...lotForm, lot_no, stt: grp.stt, loai_hinh: grp.loai_hinh, loai_hinh_con: grp.loai_hinh_con,
                                  factory_no: grpFactories.size ? Array.from(grpFactories).join(', ') : (lotForm.factory_no||''),
                                  pkg_qty: grpPkg > 0 ? grpPkg : Number(lotForm.pkg_qty)||0,
                                  gw: grpGw > 0 ? grpGw : Number(lotForm.gw)||0,
                                };
                                if (newLot.carrier) addCarrierHistory(newLot.carrier.trim());
                                createdLots = [newLot, ...createdLots];
                                updatedInvoices = updatedInvoices.map(inv =>
                                  grp.invs.some(gi => gi.invoice_no === inv.invoice_no)
                                    ? { ...inv, lot_no, loai_hinh: grp.loai_hinh, loai_hinh_con: grp.loai_hinh_con }
                                    : inv
                                );
                                lotNames.push(lot_no);
                              });

                              if (!hasError) {
                                saveLotsToStorage(createdLots);
                                saveInvoicesToStorage(updatedInvoices);
                                if (lotNames.length > 0) setSelectedLotNo(lotNames[lotNames.length - 1]);
                                setLotAssignForm(prev => ({...prev, selectedInvoiceNos: []}));
                                setDraftInvoiceNos([]);
                                showNotification(`✅ Đã tạo ${lotNames.length} lô: ${lotNames.join(', ')}`);
                              }
                            }}
                            disabled={lotAssignForm.selectedInvoiceNos.length === 0}
                            className="bg-amber-600 hover:bg-amber-500 disabled:bg-slate-700 disabled:text-slate-500 text-white font-black px-6 py-2.5 rounded-lg text-xs transition-all">
                            ✦ Tạo Lô Từ Invoice Đã Chọn
                          </button>
                          <button type="button"
                            onClick={() => {
                              setShowAddModal(false);
                              setActiveMenu('E010');
                              // Full reset so next "Khai Lô Mới" starts clean
                              const freshStt = getFirstVacantSeq();
                              setDraftInvoiceNos([]);
                              setLotAssignForm({ loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', selectedInvoiceNos: [], stt: freshStt });
                              setLotForm(prev => ({ ...prev, bill_no: '', cont_no: '', seal_no: '', pkg_qty: 0, gw: 0, cbm: 0, cbm_str: '', is_hang_chung_bill: false }));
                              setInvoiceForm({ invoice_no: '', lot_no: '', bill_no: '', bill_stt: freshStt, invoice_date: new Date().toISOString().substring(0, 10), inv_pkg_qty: 0, inv_gw: 0, incoterm: 'CIF', total_amount: 0, foc_amount: 0, plus_sea_freight: 0, handling_charges: 0, other_charges: 0, other_charges_note: '', is_hang_chung_bill: false, loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', currency: 'USD', supplier: 'CHANG YANG MATERIAL CORP.', contract_start: '', contract_end: '', factory_no: '' });
                              setSelectedFactories([]);
                            }}
                            className="bg-emerald-700 hover:bg-emerald-600 text-white font-black px-5 py-2.5 rounded-lg text-xs transition-all">
                            ✅ Kết Thúc — Xem Danh Sách Lô
                          </button>
                        </div>
                      </div>
                    );
                  })()}

                </div>
              </div>
            </div>
          )}

          {/* --- BẢNG KÊ PREVIEW IN (Mẫu 02/BKHĐ/GSQL) --- */}
          {showMasterInvoiceModal && selectedLotNo && (() => {
            const printLot = lots.find(l => l.lot_no === selectedLotNo);
            const printInvoices = currentInvoices;
            // Chỉ hiện nếu lô có nhiều invoice cùng loại hình
            if (!printLot || printInvoices.length < 2) {
              return (
                <div className="fixed inset-0 z-50 bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="bg-slate-900 border border-slate-800 rounded-xl p-8 max-w-md text-center">
                    <p className="text-amber-400 font-bold text-sm mb-2">⚠️ Bảng kê chỉ áp dụng khi lô có nhiều hóa đơn cùng loại hình</p>
                    <p className="text-slate-400 text-xs mb-4">Lô <strong>{selectedLotNo}</strong> hiện có {printInvoices.length} hóa đơn.</p>
                    <button onClick={() => setShowMasterInvoiceModal(false)} className="bg-slate-700 text-white px-4 py-2 rounded text-xs font-bold">Đóng</button>
                  </div>
                </div>
              );
            }
            const firstInv = printInvoices[0];
            const supplier = firstInv?.supplier || printLot?.supplier || 'CHANG YANG MATERIAL CORP.';
            const totalVal = printInvoices.reduce((s, inv) => s + getInvoiceValueSum(inv), 0);
            const currency = firstInv?.currency || 'USD';
            const fmtDate = (d) => d ? d.replace(/-/g, '/') : '';
            return (
              <div className="fixed inset-0 z-50 bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
                <div className="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col my-8">
                  <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                    <h3 className="font-bold text-xs uppercase text-amber-400">📋 Bảng Kê Hóa Đơn – Mẫu 02/BKHĐ/GSQL</h3>
                    <div className="flex gap-2">
                      <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg text-xs">🖨️ In Bảng Kê</button>
                      <button onClick={() => exportBangKeWord(selectedLotNo, printInvoices, totalVal, currency, supplier)} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg text-xs">📄 Tải Word</button>
                      <button onClick={() => setShowMasterInvoiceModal(false)} className="bg-slate-800 text-slate-300 font-bold px-3 py-2 rounded text-xs">Đóng</button>
                    </div>
                  </div>

                  <div style={{fontFamily:"'Times New Roman', Times, serif"}}
                    className="p-10 bg-white text-black text-sm overflow-y-auto max-h-[80vh]" id="printable-master-invoice">

                    {/* Header: Company left | Mẫu số right */}
                    <div className="flex justify-between items-start pb-2 mb-3">
                      <div>
                        <p style={{fontWeight:'bold', fontSize:13, textTransform:'uppercase'}}>CÔNG TY TNHH CHANG YANG VIỆT NAM</p>
                      </div>
                      <div className="text-right" style={{fontSize:11}}>
                        <p style={{fontWeight:'bold'}}>Mẫu số 02/BKHĐ/GSQL</p>
                        <p style={{fontSize:10}}>(Ban hành kèm TT 39/2018/TT-BTC)</p>
                      </div>
                    </div>

                    {/* Title */}
                    <div className="text-center my-5">
                      <h2 style={{fontSize:15, fontWeight:'bold', textTransform:'uppercase', letterSpacing:'0.03em'}}>
                        BẢNG KÊ HÓA ĐƠN THƯƠNG MẠI HÀNG HÓA XUẤT KHẨU, NHẬP KHẨU
                      </h2>
                    </div>

                    {/* Số + Ngày — date = most recent invoice date */}
                    {(() => {
                      const latestDate = printInvoices
                        .map(i => i.invoice_date || '')
                        .filter(Boolean)
                        .sort()
                        .reverse()[0] || '';
                      return (
                        <div className="flex justify-between mb-4" style={{fontSize:12}}>
                          <p><strong>Số :</strong> {selectedLotNo}</p>
                          <p><strong>Ngày :</strong> {fmtDate(latestDate)}</p>
                        </div>
                      );
                    })()}

                    {/* Người bán */}
                    <div className="mb-3" style={{fontSize:12}}>
                      <p><strong>Người bán:</strong> {supplier}</p>
                      <p style={{marginLeft:64, fontSize:11}}>
                        NO. 16, LN. 267, SEC. 1, ZHANGNAN RD., CHANGHUA CITY, CHANGHUA COUNTY, TAIWAN.
                      </p>
                    </div>

                    {/* Người mua */}
                    <div className="mb-5" style={{fontSize:12}}>
                      <p><strong>Người mua:</strong> CHANGYANG VIETNAM LTD</p>
                      <p style={{marginLeft:64, fontSize:11}}>D10/89Q, LE DUC ANH ROAD, TAN TAO WARD, HO CHI MINH CITY, VIET NAM</p>
                    </div>

                    <p style={{fontSize:12, fontWeight:'bold', marginBottom:8}}>Danh mục hóa đơn thương mại:</p>

                    {/* Invoice table */}
                    <table style={{width:'100%', borderCollapse:'collapse', border:'1px solid black', fontSize:12}}>
                      <thead>
                        <tr style={{backgroundColor:'#f3f4f6', fontWeight:'bold', borderBottom:'2px solid black'}}>
                          <th style={{padding:'6px 8px', borderRight:'1px solid black', textAlign:'center', width:40}}>STT</th>
                          <th style={{padding:'6px 8px', borderRight:'1px solid black', textAlign:'left'}}>Số hóa đơn (Invoice No.)</th>
                          <th style={{padding:'6px 8px', borderRight:'1px solid black', textAlign:'center'}}>Ngày hóa đơn</th>
                          <th style={{padding:'6px 8px', textAlign:'right'}}>Thành tiền ({currency})</th>
                        </tr>
                      </thead>
                      <tbody>
                        {printInvoices.map((inv, idx) => (
                          <tr key={inv.invoice_no} style={{borderBottom:'1px solid black'}}>
                            <td style={{padding:'6px 8px', borderRight:'1px solid black', textAlign:'center'}}>{idx + 1}</td>
                            <td style={{padding:'6px 8px', borderRight:'1px solid black', fontWeight:'bold'}}>{inv.invoice_no}</td>
                            <td style={{padding:'6px 8px', borderRight:'1px solid black', textAlign:'center'}}>{fmtDate(inv.invoice_date)}</td>
                            <td style={{padding:'6px 8px', textAlign:'right', fontFamily:'monospace'}}>
                              {getInvoiceValueSum(inv).toLocaleString(undefined, {minimumFractionDigits: 2})}
                            </td>
                          </tr>
                        ))}
                        <tr style={{fontWeight:'bold', backgroundColor:'#f9fafb', borderTop:'2px solid black'}}>
                          <td colSpan="3" style={{padding:'6px 8px', borderRight:'1px solid black', textAlign:'center', textTransform:'uppercase', fontSize:11}}>
                            Tổng giá trị hóa đơn
                          </td>
                          <td style={{padding:'6px 8px', textAlign:'right', fontFamily:'monospace', fontWeight:'bold'}}>
                            {totalVal.toLocaleString(undefined, {minimumFractionDigits: 2})}
                          </td>
                        </tr>
                      </tbody>
                    </table>

                    {/* Signature block */}
                    <div className="mt-12 flex justify-end">
                      <div className="text-right" style={{fontSize:12, minWidth:200}}>
                        <p style={{fontWeight:'bold', textTransform:'uppercase'}}>ĐẠI DIỆN DOANH NGHIỆP</p>
                        <p style={{fontSize:10, color:'#6b7280', marginTop:4}}>(Ký, ghi rõ họ tên, đóng dấu)</p>
                        {/* Stamp placeholder — paste image here */}
                        <div style={{
                          marginTop:8, height:80, width:80,
                          border:'1px dashed #d1d5db', borderRadius:'50%',
                          display:'inline-flex', alignItems:'center', justifyContent:'center',
                          fontSize:9, color:'#9ca3af', textAlign:'center', padding:8,
                          marginRight:16
                        }}>
                          [MỘC]
                        </div>
                        <div style={{marginTop:48, borderTop:'1px solid black', paddingTop:4, textAlign:'center'}}>
                          <p style={{fontWeight:'bold', fontSize:12}}>Ngô Thanh Hoàng</p>
                          <p style={{fontSize:11}}>Giám Đốc</p>
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            );
          })()}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
