    // =====================================================================
    // CHANG YANG IMS - GOOGLE SHEETS STORAGE LAYER
    // Dữ liệu lưu trên Google Sheets qua Apps Script Web App
    // IndexedDB được dùng làm cache offline tạm thời
    // =====================================================================

    const CY_DB_NAME = 'ChangYangIMS_v2';
    const CY_DB_VERSION = 1;
    const CY_STORE = 'keyvalue';
    let _cyDb = null;

    // --- IndexedDB (cache offline) ---
    function cyOpenDB() {
      if (_cyDb) return Promise.resolve(_cyDb);
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(CY_DB_NAME, CY_DB_VERSION);
        req.onupgradeneeded = e => e.target.result.createObjectStore(CY_STORE);
        req.onsuccess = e => { _cyDb = e.target.result; resolve(_cyDb); };
        req.onerror = e => reject(e.target.error);
      });
    }
    window.cyLocalGet = async (key) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const req = db.transaction(CY_STORE,'readonly').objectStore(CY_STORE).get(key);
        req.onsuccess = () => res(req.result ?? null);
        req.onerror = () => rej(req.error);
      });
    };
    window.cyLocalSet = async (key, value) => {
      const db = await cyOpenDB();
      return new Promise((res, rej) => {
        const tx = db.transaction(CY_STORE,'readwrite');
        tx.objectStore(CY_STORE).put(value, key);
        tx.oncomplete = () => res(true);
        tx.onerror = () => rej(tx.error);
      });
    };

    // --- Google Sheets API (qua Apps Script Web App) ---
    window.CY_API_URL = localStorage.getItem('cy_api_url') || '';

    window.cyApiCall = async (action, payload = {}) => {
      const url = window.CY_API_URL;
      if (!url) throw new Error('NO_API_URL');
      const body = JSON.stringify({ action, ...payload });
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // Apps Script yêu cầu text/plain để tránh CORS preflight
        body
      });
      if (!res.ok) throw new Error('HTTP_' + res.status);
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message || 'API_ERROR');
      return json.data;
    };

    // Đọc toàn bộ 1 sheet
    window.cySheetGet = async (sheet) => {
      const data = await window.cyApiCall('getSheet', { sheet });
      await window.cyLocalSet('cy_' + sheet, data); // cache offline
      return data;
    };

    // Ghi đè toàn bộ 1 sheet
    window.cySheetSet = async (sheet, data) => {
      await window.cyLocalSet('cy_' + sheet, data); // lưu cache ngay
      await window.cyApiCall('setSheet', { sheet, data }); // ghi lên Sheets
    };

    // Đọc tất cả sheets cùng lúc
    window.cyLoadAll = async () => {
      const data = await window.cyApiCall('getAll');
      for (const [k, v] of Object.entries(data)) {
        await window.cyLocalSet('cy_' + k, v);
      }
      return data;
    };
  </script>

      const normalizeDate = (d) => {
        if (!d) return '';
        const s = String(d).trim();
        // Already YYYY-MM-DD
        if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
        // ISO timestamp: 2026-06-08T17:00:00.000Z → 2026-06-08
        const isoMatch = s.match(/^(\d{4}-\d{2}-\d{2})T/);
        if (isoMatch) return isoMatch[1];
        // DD/MM/YYYY → YYYY-MM-DD
        const dmyMatch = s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
        if (dmyMatch) return `${dmyMatch[3]}-${dmyMatch[2]}-${dmyMatch[1]}`;
        // Try Date parse as fallback

        const relatedLots = lots.filter(l => matchingInvoices.some(i => String(i.lot_no||'') === String(l.lot_no||'')));
        if (relatedLots.length === 0) return { matches: false, status: 'NEW_BILL' };

        // Kiểm tra đã có lô cùng loại hình chưa → gộp vào đó
        const sameTypeLot = relatedLots.find(l => l.loai_hinh === currentLoaiHinh && l.loai_hinh_con === currentLoaiHinhCon);
        if (sameTypeLot) {
          return {
            matches: true, status: 'SAME_BILL_SAME_TYPE',
            proposedLotNo: sameTypeLot.lot_no, baseLot: sameTypeLot,
            message: `✅ Cùng Bill & Cùng loại hình → Invoice sẽ ghép vào Lô [${sameTypeLot.lot_no}]`
          };
        }

        // Khác loại hình → gợi ý tạo lô mới (STT tự do, user tự nhập lot_no)
        const baseLot = relatedLots[0];
        return {
          matches: true, status: 'SAME_BILL_DIFF_TYPE', baseLot,
          message: `⚡ Bill [${typedBillNo}] đã dùng cho Lô [${baseLot.lot_no}] (${baseLot.loai_hinh}). Invoice này KHÁC loại hình → sẽ tạo lô mới riêng, nhập Mã Lô bên dưới.`
        };
      };

      const activeBillStatus = checkBillNoGroupingHelper(String(invoiceForm.bill_no||''), invoiceForm.loai_hinh, invoiceForm.loai_hinh_con, invoiceForm.is_hang_chung_bill);

      // --- CÁC HÀM LƯU DỮ LIỆU CHÍNH (MASTER - DETAIL) ---
      const handleSaveLot = (e) => {
        e.preventDefault();
        if (!Number(lotForm.stt)) return showNotification("Vui lòng nhập Số Thứ Tự (STT)!", "error");

        if (modalMode === 'edit') {
          // Edit mode: validate lot_no exists
          if (!lotForm.lot_no.trim()) return showNotification("Mã lô hàng không được trống", "error");
          // Serialize contList → containers (JSON) + backward compat fields
          const validConts = (lotForm.contList || []).filter(c => c.cont_no && c.cont_no.trim());
          const primaryCont = validConts[0] || {};
          const finalLot = {
            ...lotForm, lot_no: lotForm.lot_no.trim(), stt: Number(lotForm.stt),
            pkg_qty: Number(lotForm.pkg_qty)||0, gw: Number(lotForm.gw)||0, cbm: Number(lotForm.cbm)||0,
            lot_date: normalizeDate(lotForm.lot_date),
            bill_date: normalizeDate(lotForm.bill_date),
            eta: normalizeDate(lotForm.eta),
            atc_date: normalizeDate(lotForm.atc_date),
            get_docs_date: normalizeDate(lotForm.get_docs_date),
            contract_start: normalizeDate(lotForm.contract_start),
            contract_end: normalizeDate(lotForm.contract_end),
            // Multi-container: lưu JSON array + giữ cont_no/seal_no/cont_type cho backward compat
            containers: serializeContainers(validConts.length > 0 ? validConts : [{cont_no:'',seal_no:'',cont_type:lotForm.cont_type||'40HC'}]),
            cont_no:   primaryCont.cont_no   || '',
            seal_no:   primaryCont.seal_no   || '',
            cont_type: primaryCont.cont_type || lotForm.cont_type || '40HC',
          };
          if (finalLot.carrier) addCarrierHistory(finalLot.carrier.trim());
          const newLots = lots.map(l => l.lot_no === finalLot.lot_no ? finalLot : l);
          saveLotsToStorage(newLots);
          showNotification(`✅ Đã cập nhật Lô hàng ${finalLot.lot_no}`);
          // Highlight row vừa cập nhật, tự clear sau 5 giây
          setRecentlyUpdatedLots(prev => new Set([...prev, finalLot.lot_no]));
          setTimeout(() => setRecentlyUpdatedLots(prev => { const n = new Set(prev); n.delete(finalLot.lot_no); return n; }), 5000);
          setShowAddModal(false);
          return;
        }

        // ADD mode: check bill_no uniqueness (warn but don't block - hàng chung bill is valid)
        if (lotForm.bill_no && !lotForm.is_hang_chung_bill) {
          const existingBill = lots.find(l => l.bill_no && String(l.bill_no).trim().toUpperCase() === String(lotForm.bill_no).trim().toUpperCase());
          if (existingBill) {
            const msg = 'Bill [' + lotForm.bill_no + '] da ton tai trong Lo [' + existingBill.lot_no + ']. Neu day la hang chung Bill, bat toggle Hang Chung Bill. Nhan OK de tiep tuc.';
            const proceed = window.confirm(msg);
            if (!proceed) return;
          }
        }
        // ADD mode: Save bill/transport info (no lot_no yet), move to invoice tab
        // Store in a temporary "draft" state keyed by stt
        const draftLot = { ...lotForm, lot_no: '', stt: Number(lotForm.stt), pkg_qty: Number(lotForm.pkg_qty)||0, gw: Number(lotForm.gw)||0, cbm: Number(lotForm.cbm)||0 };
        if (draftLot.carrier) addCarrierHistory(draftLot.carrier.trim());
        setLotForm(draftLot);
        // Pre-fill lotAssignForm STT from lotForm
        setLotAssignForm(prev => ({...prev, stt: draftLot.stt || getFirstVacantSeq()}));
        setInvoiceForm(prev => ({ ...prev, lot_no: '', bill_stt: draftLot.stt, bill_no: draftLot.bill_no, is_hang_chung_bill: draftLot.is_hang_chung_bill || false }));
        setDraftInvoiceNos([]); // Reset draft list for new lot
        setModalTab('invoice');
        showNotification('Thông tin Bill đã lưu — tiếp tục nhập Invoice');
      };

      // Tab 4: Finalize lot — create lot_no from loai_hinh + assign invoices to it
      const handleFinalizeLot = () => {
        const { loai_hinh, loai_hinh_con, selectedInvoiceNos } = lotAssignForm;
        if (!loai_hinh) return showNotification("Chọn loại hình hải quan!", "error");
        if (selectedInvoiceNos.length === 0) return showNotification("Chọn ít nhất 1 invoice!", "error");
        const stt = Number(lotAssignForm.stt || lotForm.stt || 1);
        if (!stt) return showNotification("Nhập Số STT hợp lệ!", "error");
        const lot_no = generateLotNoString(loai_hinh, loai_hinh_con, stt);
        if (lots.some(l => String(l.lot_no||'').toLowerCase() === lot_no.toLowerCase())) {
          return showNotification(`Mã lô [${lot_no}] đã tồn tại! Thay đổi STT hoặc loại hình.`, "error");
        }
        // Aggregate pkg_qty and gw from selected invoices (for hang chung bill)
        const selInvs = invoices.filter(i => selectedInvoiceNos.includes(i.invoice_no));
        const totalInvPkg = selInvs.reduce((s, i) => s + Number(i.inv_pkg_qty||0), 0);
        const totalInvGw  = selInvs.reduce((s, i) => s + Number(i.inv_gw||0), 0);
        // Use bill pkg/gw if no per-invoice breakdown given; otherwise use sum of invoices
        const finalPkgQty = totalInvPkg > 0 ? totalInvPkg : Number(lotForm.pkg_qty)||0;
        const finalGw     = totalInvGw  > 0 ? totalInvGw  : Number(lotForm.gw)||0;

        const finalLot = {
          ...lotForm, lot_no, stt, loai_hinh, loai_hinh_con,
          factory_no: selectedFactories.join(', '),
          pkg_qty: finalPkgQty, gw: finalGw,
        };
        if (finalLot.carrier) addCarrierHistory(finalLot.carrier.trim());
        saveLotsToStorage([finalLot, ...lots]);
        // Update selected invoices → assign lot_no + loai_hinh
        const updatedInvoices = invoices.map(inv =>
          selectedInvoiceNos.includes(inv.invoice_no)
            ? { ...inv, lot_no, loai_hinh, loai_hinh_con }
            : inv
        );
        saveInvoicesToStorage(updatedInvoices);
        setSelectedLotNo(lot_no);
        setLotAssignForm({ loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', selectedInvoiceNos: [], stt: getFirstVacantSeq() });
        showNotification(`✅ Đã tạo Lô [${lot_no}] với ${selectedInvoiceNos.length} invoice!`);
        // Stay on Tab 4 so user can create more lots (e.g. 2nd lot for hang chung bill diff type)
        // Close modal only if no more unassigned invoices
      };

      const handleSaveInvoice = (e) => {
        e.preventDefault();
        if (!String(invoiceForm.invoice_no || '').trim()) return showNotification("Vui lòng điền Số hóa đơn!", "error");
        let targetLotNo = invoiceForm.lot_no;

        if (invoiceForm.is_hang_chung_bill && activeBillStatus.matches) {
          if (activeBillStatus.status === 'SAME_BILL_SAME_TYPE') {
            // Gộp vào lô cùng loại hình hiện có
            targetLotNo = activeBillStatus.proposedLotNo;
          }
          // DIFF_TYPE: targetLotNo giữ nguyên invoiceForm.lot_no (user đã nhập)
          // Invoice được đánh dấu is_hang_chung_bill=true để phân biệt
        }

        // Bill term vs Incoterm validation
        const prepaidTerms = ['CIF','CFR','CIP','CPT'];
        const collectTerms = ['FOB','FCA','EXW','FAS'];
        const lotForInv = lots.find(l => l.bill_no === (invoiceForm.bill_no || lotForm.bill_no));
        const billTerm = lotForInv?.bill_term || lotForm.bill_term || '';
        const incoterm = invoiceForm.incoterm || '';
        if (billTerm === 'Freight Prepaid' && collectTerms.includes(incoterm)) {
          return showNotification(`⚠️ Không hợp lệ: Bill [Freight Prepaid] không phù hợp với Incoterm [${incoterm}]. Nên dùng: CIF, C&F, CIP, CPT`, 'error');
        }
        if (billTerm === 'Freight Collect' && prepaidTerms.includes(incoterm)) {
          return showNotification(`⚠️ Không hợp lệ: Bill [Freight Collect] không phù hợp với Incoterm [${incoterm}]. Nên dùng: FOB, FCA, EXW, FAS`, 'error');
        }
        const finalInvoice = {
          ...invoiceForm, invoice_no: String(invoiceForm.invoice_no || '').trim(), lot_no: targetLotNo,
          bill_stt: Number(invoiceForm.bill_stt || lotForm.stt || 0),
          bill_no: invoiceForm.bill_no || lotForm.bill_no,
          is_hang_chung_bill: lotForm.is_hang_chung_bill || false,
          total_amount: Number(invoiceForm.total_amount) || 0, foc_amount: Number(invoiceForm.foc_amount) || 0,
          plus_sea_freight: Number(invoiceForm.plus_sea_freight) || 0, handling_charges: Number(invoiceForm.handling_charges) || 0, other_charges: Number(invoiceForm.other_charges) || 0,
          // Normalize ngày về YYYY-MM-DD trước khi lưu
          invoice_date: normalizeDate(invoiceForm.invoice_date),
          contract_start: normalizeDate(invoiceForm.contract_start),
          contract_end: normalizeDate(invoiceForm.contract_end),
        };

        // ── Kiểm tra tiền hoá đơn khớp tổng hàng + phí ──────────────────────
        // Chỉ kiểm tra khi đã có goods (tránh block khi mới tạo invoice chưa có hàng)
        const invGoods = goods.filter(g => String(g.invoice_no) === String(finalInvoice.invoice_no));
        if (invGoods.length > 0 && finalInvoice.total_amount > 0) {
          const goodsTotal   = invGoods.reduce((s, g) => s + (Number(g.sale_amount) || 0), 0);
          const expectedTotal = goodsTotal
            + (Number(finalInvoice.plus_sea_freight)  || 0)
            + (Number(finalInvoice.handling_charges)  || 0)
            + (Number(finalInvoice.other_charges)     || 0)
            - (Number(finalInvoice.foc_amount)        || 0);
          const diff = Math.abs(finalInvoice.total_amount - expectedTotal);
          if (diff > 0.01) { // cho phép sai số tối đa $0.01 do làm tròn
            const proceed = window.confirm(
              `⚠️ Tiền hoá đơn KHÔNG KHỚP!\n\n` +
              `Tổng tiền hàng:  ${goodsTotal.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `+ Phí biển:       ${(Number(finalInvoice.plus_sea_freight)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `+ Handling:       ${(Number(finalInvoice.handling_charges)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `+ Phí khác:       ${(Number(finalInvoice.other_charges)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `- FOC:            ${(Number(finalInvoice.foc_amount)||0).toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `──────────────────────────────\n` +
              `= Kỳ vọng:        ${expectedTotal.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `≠ Đã nhập:        ${finalInvoice.total_amount.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n` +
              `Chênh lệch:      ${diff.toLocaleString('en-US', {minimumFractionDigits:2})} USD\n\n` +
              `Nhấn OK để lưu anyway, Cancel để sửa lại.`
            );
            if (!proceed) return;
          }
        }

        if (finalInvoice.supplier) addSupplierHistory(finalInvoice.supplier.trim());
        let newInvoices = [];
        if (modalMode === 'add') {
          if (invoices.some(i => String(i.invoice_no||'').toLowerCase() === String(invoiceForm.invoice_no||'').trim().toLowerCase())) {
            return showNotification("Invoice No. already exists!", "error");
          }
          newInvoices = [finalInvoice, ...invoices];
          setDraftInvoiceNos(prev => prev.includes(finalInvoice.invoice_no) ? prev : [...prev, finalInvoice.invoice_no]);
          setGoodsForm(prev => ({ ...prev, invoice_no: finalInvoice.invoice_no, goods_no: '', goods_name_en: '', goods_name_local: '', hs_code: '', sale_amount: 0, qty1: 0, unit1: 'PCS', qty2: 0, unit2: '', unit_price: 0, unit_price_str: '' }));
          setModalTab('goods');
        } else {
          newInvoices = invoices.map(i => String(i.invoice_no) === String(finalInvoice.invoice_no) ? finalInvoice : i);
          showNotification(`✅ Đã cập nhật Hóa Đơn ${finalInvoice.invoice_no}`);
          setRecentlyUpdatedInvoices(prev => new Set([...prev, finalInvoice.invoice_no]));
          setTimeout(() => setRecentlyUpdatedInvoices(prev => { const n = new Set(prev); n.delete(finalInvoice.invoice_no); return n; }), 5000);
          setShowAddModal(false);
        }
        saveInvoicesToStorage(newInvoices);
        setSelectedLotNo(targetLotNo);
        setSelectedInvoiceNo(finalInvoice.invoice_no);
        // Check invoice total vs goods total
        const invGoods = goods.filter(g => String(g.invoice_no) === String(finalInvoice.invoice_no));
        if (invGoods.length > 0) {
          const goodsTotal = invGoods.reduce((s, g) => s + Number(g.sale_amount||0), 0);
          const invTotal = Number(finalInvoice.total_amount)||0;
          const diff = Math.abs(goodsTotal - invTotal);
          if (diff > 0.01) {
            showNotification(`⚠️ Trị giá Invoice (${invTotal.toFixed(2)}) ≠ Tổng hàng hóa (${goodsTotal.toFixed(2)}). Chênh lệch: ${diff.toFixed(2)}`, 'error');
          } else {
            showNotification(`Đã lưu Hóa đơn ${finalInvoice.invoice_no}`);
          }
        } else {
          showNotification(`Đã lưu Hóa đơn ${finalInvoice.invoice_no}`);
        }
      };

      const handleSaveGoods = (e) => {
        e.preventDefault();
        if (!goodsForm.goods_no.trim() || !goodsForm.goods_name_en.trim()) return showNotification("Vui lòng điền đủ thông tin!", "error");

        const isEditing = modalMode === 'edit' && goodsForm.id;
        const goodsId = isEditing ? goodsForm.id : "goods_" + Date.now();
        const qty1Val = Number(goodsForm.qty1) || 0;
        const unit_priceVal = Number(goodsForm.unit_price) || 0;
        const finalGoods = {
          ...goodsForm,
          id: goodsId,
          goods_no: goodsForm.goods_no.trim(),
          goods_item: Number(goodsForm.goods_item) || 1,
          origin_country: goodsForm.origin_country || 'TAIWAN',
          qty1: qty1Val,
          unit1: goodsForm.unit1 || goodsForm.goods_unit_en || 'PCS',
          qty2: Number(goodsForm.qty2) || 0,
          unit2: goodsForm.unit2 || goodsForm.goods_unit_en2 || '',
          unit_price: unit_priceVal,
          sale_amount: Number(goodsForm.sale_amount) || (qty1Val * unit_priceVal),
        };

        let newGoods = [];
        if (isEditing) {
          newGoods = goods.map(g => g.id === goodsId ? finalGoods : g);
          showNotification(`✅ Đã cập nhật mặt hàng ${finalGoods.goods_no}`);
          setRecentlyUpdatedGoods(prev => new Set([...prev, goodsId]));
          setTimeout(() => setRecentlyUpdatedGoods(prev => { const n = new Set(prev); n.delete(goodsId); return n; }), 5000);
          setShowAddModal(false);
        } else {
          newGoods = [...goods, finalGoods];
          setGoodsForm({
            invoice_no: finalGoods.invoice_no, goods_no: '', goods_item: finalGoods.goods_item + 1, goods_name_en: '',
            goods_unit_en: 'PCS', goods_unit_en2: '', goods_name_local: '', goods_unit_local: 'Cái', goods_unit_local2: '',
            hs_code: '', invoice_description: '', sale_amount: 0,
            origin_country: finalGoods.origin_country || 'TAIWAN',
            qty1: 0, unit1: 'PCS', qty2: 0, unit2: '', unit_price: 0, unit_price_str: ''
          });
        }
        saveGoodsToStorage(newGoods);
        showNotification(`Đã lưu sản phẩm ${finalGoods.goods_no} thành công.`);
      };

      const handleInlineAtcUpdate = (lotNo, dateString) => {
        const newLots = lots.map(l => l.lot_no === lotNo ? { ...l, atc_date: dateString } : l);
        saveLotsToStorage(newLots);
        showNotification(`Đã cập nhật Ngày nhập kho ATC cho lô ${lotNo}`);
        setInlineAtcLotNo(null);
      };

      // --- CÁC HÀM CRUD CHO TỪ ĐIỂN SẢN PHẨM GỐC ---
      const handleOpenAddDict = () => {
        setDictModalMode('add');
        setDictForm({
          goods_no: '', hs_code: '', goods_name_en: '', goods_name_local: '',
          goods_unit_en: 'PCS', goods_unit_local: 'Cái', original_goods_no: ''
        });
        setShowDictModal(true);
      };

      const handleOpenEditDict = (item, e) => {
        if (e) e.stopPropagation();
        setDictModalMode('edit');
        setDictForm({
          goods_no: item.goods_no, hs_code: item.hs_code, goods_name_en: item.goods_name_en, goods_name_local: item.goods_name_local,
          goods_unit_en: item.goods_unit_en || 'PCS', goods_unit_local: item.goods_unit_local || 'Cái', original_goods_no: item.goods_no
        });
        setShowDictModal(true);
      };

      const handleSaveDictItem = (e) => {
        e.preventDefault();
        if (!dictForm.goods_no.trim() || !dictForm.hs_code.trim() || !dictForm.goods_name_en.trim()) {
          return showNotification("Vui lòng nhập đầy đủ các trường bắt buộc!", "error");
        }

        const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
        const newItem = {
          goods_no: dictForm.goods_no.trim(),
          hs_code: dictForm.hs_code.trim(),
          goods_name_en: dictForm.goods_name_en.trim(),
          goods_name_local: dictForm.goods_name_local.trim() || 'Hàng nhập khẩu',
          goods_unit_en: dictForm.goods_unit_en.trim() || 'PCS',
          goods_unit_local: dictForm.goods_unit_local.trim() || 'Cái'
        };

        let updatedDict = [];
        if (dictModalMode === 'add') {
          if (targetDict.some(item => item.goods_no.toLowerCase() === newItem.goods_no.toLowerCase())) {
            return showNotification("Mã sản phẩm này đã tồn tại trong danh mục!", "error");
          }
          updatedDict = [newItem, ...targetDict];
        } else {
          updatedDict = targetDict.map(item => item.goods_no === dictForm.original_goods_no ? newItem : item);
        }

        if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
        setShowDictModal(false);
        showNotification(`Đã cập nhật danh mục ${dbSelectedTab} thành công!`);
      };

      const handleDeleteDictConfirm = (item, e) => {
        if (e) e.stopPropagation();
        setConfirmState({
          isOpen: true,
          title: `Xác nhận xóa khỏi Danh mục ${dbSelectedTab}`,
          message: `Bạn có chắc muốn xóa mã hàng [${item.goods_no}] ra khỏi cơ sở dữ liệu gốc? Thao tác này không thể hoàn tác.`,
          onConfirm: () => {
            const targetDict = dbSelectedTab === 'A12' ? dictA12 : dictE21;
            const updatedDict = targetDict.filter(i => i.goods_no !== item.goods_no);
            if (dbSelectedTab === 'A12') saveDictA12ToStorage(updatedDict); else saveDictE21ToStorage(updatedDict);
            setConfirmState(prev => ({ ...prev, isOpen: false }));
            showNotification(`Đã xóa thành công [${item.goods_no}] ra khỏi từ điển.`);
          }
        });
      };

      // --- CHỨC NĂNG IMPORT FILE EXCEL THÔNG MINH (COLUMNS AUTO-MAPPING) ---
      const handleExcelImport = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = new Uint8Array(event.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // Đọc bảng tính thành mảng 2 chiều
            const rawJson = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            if (rawJson.length < 2) {
              return showNotification("Tệp Excel trống rỗng hoặc không có dữ liệu!", "error");
            }

            // Tiền xử lý dòng tiêu đề (loại bỏ dấu tiếng Việt, viết thường, loại bỏ khoảng trắng VÀ ký tự đặc biệt)
            const headers = rawJson[0].map(h => h
              ? h.toString().toLowerCase().trim()
                  .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // bỏ dấu tiếng Việt
                  .replace(/[^a-z0-9]/g, '')                        // bỏ tất cả ký tự không phải chữ/số (kể cả ngoặc, gạch ngang...)
              : '');

            // Debug: log headers ra console để kiểm tra nếu cần
            console.log('[Import] Headers sau normalize:', headers);

            // Tìm kiếm chỉ số cột - ưu tiên keyword cụ thể hơn để tránh nhầm
            // idxGoodsNo: Mã Hàng / Goods No / Item Code / Mã Sản Phẩm
            const idxGoodsNo = headers.findIndex(h =>
              h === 'mahang' || h === 'goodsno' || h === 'itemcode' || h === 'masanpham' ||
              h.startsWith('mahang') || h.includes('goodsno') || h.includes('itemcode') || h.includes('masanpham')
            );
            // idxHsCode: HS Code / Mã HS — dùng keyword dài hơn để không nhầm
            const idxHsCode = headers.findIndex(h =>
              h === 'hscode' || h === 'mahs' || h === 'hs' ||
              h.includes('hscode') || h.includes('mahs') || h.startsWith('hscode')
            );
            // idxNameEn: Tên Tiếng Anh / English Name / Description
            const idxNameEn = headers.findIndex(h =>
              h.includes('tientienganh') || h.includes('tentienganh') || h.includes('tienganh') ||
              h.includes('english') || h.includes('nameen') || h.includes('tenhangen') ||

              h.includes('tientingviet') || h.includes('tentingviet') || h.includes('tiengviet') ||

              h.includes('mota') || (h.includes('ten') && h.includes('viet'))

            const finalHsCode   = idxHsCode   !== -1 ? idxHsCode   : 1;
            const finalNameEn   = idxNameEn   !== -1 ? idxNameEn   : 2;
            const finalNameLocal= idxNameLocal !== -1 ? idxNameLocal: 3;

            // Chỉ báo lỗi nếu cả tự động lẫn fallback đều không có dữ liệu
            const missingCols = [];
            if (idxGoodsNo === -1)  missingCols.push('Mã Hàng (cột A)');
            if (idxHsCode === -1)   missingCols.push('HS Code (cột B)');
            if (idxNameEn === -1)   missingCols.push('Tên Tiếng Anh (cột C)');

              return showNotification(`Không nhận diện được cột! Hệ thống đang dùng vị trí cột mặc định A/B/C/D. Vui lòng đảm bảo header dòng 1 không bị trống.`, "error");

            for (let i = 1; i < rawJson.length; i++) {
              const row = rawJson[i];

              importedItems.push({
                goods_no: row[finalGoodsNo].toString().trim(),

      const parseContainers = (lot) => {

          // Fallback: pipe-comma format "CONT1|SEAL1|40HC,CONT2|SEAL2|40HC"

            return lot.containers.split(',').map(s => {
              const [cont_no='', seal_no='', cont_type='40HC'] = s.split('|');
              return { cont_no: cont_no.trim(), seal_no: seal_no.trim(), cont_type: cont_type.trim() || '40HC' };
            }).filter(c => c.cont_no);
          }
        }
        // Format cũ: 3 field riêng → convert sang array 1 phần tử
        if (lot.cont_no && lot.cont_no.trim()) {
          return [{ cont_no: lot.cont_no.trim(), seal_no: lot.seal_no || '', cont_type: lot.cont_type || '40HC' }];

        return [{ cont_no: '', seal_no: '', cont_type: '40HC' }];

      // Đối chiếu danh mục tự động
      // ── FUZZY MATCH HELPERS ─────────────────────────────────────────
      const fuzzyScore = (a, b) => {
        const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g, ' ').replace(/\s+/g, ' ').trim();
        const na = norm(a), nb = norm(b);
        if (na === nb) return 1;
        if (na.length < 2 || nb.length < 2) return (na.includes(nb) || nb.includes(na)) ? 0.5 : 0;
        const bigrams = s => { const bg = new Set(); for (let i = 0; i < s.length - 1; i++) bg.add(s.slice(i,i+2)); return bg; };
        const ba = bigrams(na), bb = bigrams(nb);
        let inter = 0; ba.forEach(g => { if (bb.has(g)) inter++; });
        return (2 * inter) / (ba.size + bb.size);
      };
      const findBestDictMatch = (queryName, dict) => {
        if (!queryName || !dict.length) return null;
        const q = queryName.toLowerCase().replace(/[^a-z0-9]/g,' ').trim();
        let m = dict.find(d => d.goods_name_en.toLowerCase() === queryName.toLowerCase());
        if (m) return { item: m, score: 1 };
        m = dict.find(d => d.goods_no.toLowerCase() === queryName.toLowerCase());
        if (m) return { item: m, score: 1 };
        m = dict.find(d => d.goods_name_en.toLowerCase().includes(q) || q.includes(d.goods_name_en.toLowerCase().replace(/[^a-z0-9]/g,' ').trim()));
        if (m) return { item: m, score: 0.8 };
        let best = null, bestScore = 0;
        dict.forEach(d => { const s = fuzzyScore(queryName, d.goods_name_en); if (s > bestScore) { bestScore = s; best = d; } });
        if (bestScore >= 0.35) return { item: best, score: bestScore };
        return null;
      };

                              <option value="CPT">CPT – Carriage Paid To</option>

                            <input type="file" accept=".xlsx,.xls,.csv" className="hidden" onChange={(e) => {
                              const file = e.target.files[0];
                              if (!file) return;
                              if (!goodsForm.invoice_no) { showNotification("Please select an Invoice No. first!", "error"); return; }
                              const reader = new FileReader();
                              reader.onload = (ev) => {
                                try {
                                  const data = new Uint8Array(ev.target.result);
                                  const wb = XLSX.read(data, { type: 'array' });
                                  const ws = wb.Sheets[wb.SheetNames[0]];
                                  const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                                  if (rows.length < 2) return showNotification("Excel file is empty!", "error");
                                  const norm = h => h ? h.toString().toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g,'') : '';
                                  const headers = rows[0].map(norm);
                                  const idxInv   = headers.findIndex(h => h.includes('invoice') || h.includes('hoadon') || h === 'invoiceno');
                                  const idxName  = headers.findIndex(h => h.includes('tienganh') || h.includes('english') || h.includes('name') || h.includes('ten'));
                                  const idxOrig  = headers.findIndex(h => h.includes('origin') || h.includes('xuatxu') || h.includes('xuat'));
                                  const idxQty1  = headers.findIndex(h => (h.includes('soluong') || h.includes('qty')) && !h.includes('2'));
                                  const idxUnit1 = headers.findIndex(h => (h.includes('donvi') || h.includes('unit')) && !h.includes('2'));
                                  const idxQty2  = headers.findIndex(h => (h.includes('soluong') || h.includes('qty')) && h.includes('2'));
                                  const idxUnit2 = headers.findIndex(h => (h.includes('donvi') || h.includes('unit')) && h.includes('2'));
                                  const idxPrice = headers.findIndex(h => h.includes('dongia') || h.includes('unitprice') || h.includes('price'));
                                  const currentInv = invoices.find(i => String(i.invoice_no) === String(goodsForm.invoice_no));
                                  const targetDict = currentInv?.loai_hinh === 'E21' ? dictE21 : dictA12;
                                  let batch = [...goods];
                                  let count = 0, skipped = 0;
                                  let itemNo = goods.filter(g => String(g.invoice_no) === String(goodsForm.invoice_no)).length + 1;
                                  for (let ri = 1; ri < rows.length; ri++) {
                                    const row = rows[ri];
                                    if (idxInv !== -1) {
                                      const rowInv = String(row[idxInv]||'').trim();
                                      if (rowInv && rowInv !== String(goodsForm.invoice_no).trim()) { skipped++; continue; }
                                    }
                                    const nameVal = (idxName !== -1 && row[idxName]) ? row[idxName].toString().trim() : '';
                                    if (!nameVal) continue;
                                    const fuzzyRes = findBestDictMatch(nameVal, targetDict);
                                    const dm = fuzzyRes ? fuzzyRes.item : null;
                                    const qty1v = idxQty1 !== -1 ? Number(row[idxQty1])||0 : 0;
                                    const pv = idxPrice !== -1 ? Number(row[idxPrice])||0 : 0;
                                    batch.push({
                                      id: "goods_" + Date.now() + "_" + ri,
                                      invoice_no: goodsForm.invoice_no, goods_item: itemNo++,
                                      goods_no: dm?.goods_no || nameVal.substring(0,20).toUpperCase(),
                                      goods_name_en: dm?.goods_name_en || nameVal,
                                      goods_name_local: dm?.goods_name_local || '',
                                      hs_code: dm?.hs_code || '', goods_unit_en: dm?.goods_unit_en || 'PCS',
                                      goods_unit_local: dm?.goods_unit_local || '', invoice_description: nameVal,
                                      origin_country: idxOrig !== -1 ? String(row[idxOrig]||'TAIWAN').trim().toUpperCase() : 'TAIWAN',
                                      qty1: qty1v, unit1: idxUnit1 !== -1 ? String(row[idxUnit1]||'PCS').trim() : 'PCS',
                                      qty2: idxQty2 !== -1 ? Number(row[idxQty2])||0 : 0,
                                      unit2: idxUnit2 !== -1 ? String(row[idxUnit2]||'').trim() : '',
                                      unit_price: pv, sale_amount: qty1v * pv,
                                    });
                                    count++;
                                  }
                                  saveGoodsToStorage(batch);
                                  showNotification(`Imported ${count} item(s) to ${goodsForm.invoice_no}${skipped ? ' ('+skipped+' skipped)' : ''}`);
                                  e.target.value = '';
                                } catch(err) { console.error(err); showNotification("Failed to read Excel!", "error"); }
                              };
                              reader.readAsArrayBuffer(file);
                            }} />
                          </label>
                          <p className="text-[10px] text-slate-600 mt-1">Invoice No | EN Name | Origin | Qty1 | Unit1 | Qty2 | Unit2 | Unit Price</p>
                        </div>
                      </div>

                      {/* EN Name + Item Code + HS Code */}
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                          <label className="block text-[11px] text-slate-300 mb-1 font-bold">English Name * <span className="text-slate-500 font-normal">(fuzzy lookup)</span></label>
                          <input type="text" required list="goods-en-names-datalist" value={goodsForm.goods_name_en}
                            onChange={(e) => { const name = e.target.value; setGoodsForm(prev => ({...prev, goods_name_en: name})); handleEnglishNameAutoLookup(name, goodsForm.invoice_no); }}

                          <datalist id="goods-en-names-datalist">
                            {(() => {
                              const currentInv = invoices.find(i => String(i.invoice_no) === String(goodsForm.invoice_no));
                              const targetDict = currentInv?.loai_hinh === 'E21' ? dictE21 : dictA12;
                              return targetDict.map((item, idx) => <option key={idx} value={item.goods_name_en}>{item.goods_no} — HS: {item.hs_code}</option>);
                            })()}
                          </datalist>
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Item Code (auto-filled)</label>
                          <input type="text" readOnly value={goodsForm.goods_no} className="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-xs text-amber-400 font-mono font-bold focus:outline-none" />
                        </div>
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">HS Code (auto-filled)</label>
                          <input type="text" readOnly value={goodsForm.hs_code} className="w-full bg-slate-900 border border-slate-800 rounded px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none" />
                        </div>
                      </div>

                      {/* Origin + Qty1 + Unit1 + Qty2 + Unit2 */}
                      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                        <div>
                          <label className="block text-[11px] text-slate-400 mb-1">Origin</label>
                          <input type="text" list="goods-origin-list" value={goodsForm.origin_country || 'TAIWAN'}

                          <datalist id="goods-origin-list">

                        </button>

                      if (previewItems.length === 0) return null;
                      return (
                        <div className="mt-6 bg-slate-950/60 border border-emerald-900/30 rounded-xl overflow-hidden">
                          <div className="bg-emerald-950/40 px-4 py-2 border-b border-emerald-900/30 flex justify-between items-center">
                            <h4 className="text-[11px] font-bold text-emerald-400 uppercase tracking-wider">
                              ✅ Items in Invoice: {goodsForm.invoice_no}
                            </h4>
                            <span className="text-[10px] text-emerald-600">{previewItems.length} item(s)</span>
                          </div>
                          <div className="overflow-x-auto">
                            <table className="w-full text-left text-[11px] border-collapse min-w-[700px]">
                              <thead>
                                <tr className="bg-slate-950 text-slate-500 border-b border-slate-800">
                                  <th className="px-3 py-2 text-center w-8">#</th>
                                  <th className="px-3 py-2">Item Code</th>
                                  <th className="px-3 py-2">English Name</th>
                                  <th className="px-3 py-2 text-center">Origin</th>
                                  <th className="px-3 py-2 text-right">Qty 1</th>
                                  <th className="px-3 py-2 text-center">Unit 1</th>
                                  <th className="px-3 py-2 text-right">Qty 2</th>

                                {previewItems.sort((a,b) => (a.goods_item||0)-(b.goods_item||0)).map((g, idx) => (

                                    <td className="px-3 py-2 text-center text-slate-400">{g.origin_country || 'TAIWAN'}</td>
                                    <td className="px-3 py-2 text-right font-mono text-sky-300">{Number(g.qty1||0).toLocaleString()}</td>
                                    <td className="px-3 py-2 text-center text-slate-400">{g.unit1 || g.goods_unit_en || 'PCS'}</td>

                                    <td className="px-3 py-2 text-right font-mono text-amber-400 font-bold">{'$'}{Number(g.sale_amount||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>

                      ════════════════════════════════════════════ */}

                    // Chỉ hiện invoice CHƯA được gán vào mã lô hợp lệ nào

                          </p>
                          <div className="mt-2 text-[10px] text-amber-700 space-y-0.5">
                            <p>A12 KD → <span className="font-mono text-amber-400">CH[stt]KD-[yy]</span> &nbsp;|&nbsp;

                          <div className="bg-slate-900/40 border border-slate-800 rounded-lg px-4 py-2.5 flex items-center gap-2">

                        <div>
                          <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-3">📦 Transport & Container</p>
                          <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                            <Field label="Transport Mode"  value={lot.transport_type?.replace(/_/g,' ')} />
                            <Field label="Transport Mode"  value={lot.transport_type?.replace(/_/g,' ')} />
                            <Field label="Container Type"  value={lot.cont_type} />
                            {/* Multi-container display */}
                            {(() => {
                              const conts = parseContainers(lot);
                              if (conts.length <= 1) return (
                                <>
                                  <Field label="Container No." value={conts[0]?.cont_no || lot.cont_no} mono highlight="text-cyan-300" />
                                  <Field label="Seal No."      value={conts[0]?.seal_no || lot.seal_no} mono />
                                </>
                              );
                              return (
                                <div className="col-span-2">
                                  <p className="text-[9px] text-slate-500 uppercase mb-1.5">Containers ({conts.length})</p>
                                  <div className="space-y-1">
                                    {conts.map((c, i) => (
                                      <div key={i} className="flex items-center gap-3 text-[11px]">
                                        <span className="text-[9px] text-slate-600 w-4">{i+1}</span>
                                        <span className="font-mono text-cyan-300 font-bold">{c.cont_no}</span>
                                        {c.seal_no && <span className="text-slate-500 font-mono">seal: {c.seal_no}</span>}
                                        <span className="text-[9px] text-slate-600 bg-slate-800 px-1.5 py-0.5 rounded">{c.cont_type}</span>
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              );
                            })()}
                            <Field label="Pkg Qty"         value={lot.pkg_qty   ? Number(lot.pkg_qty).toLocaleString()   : null} />
                            <Field label="Gross Weight"    value={lot.gw        ? `${Number(lot.gw).toLocaleString()} KG` : null} />
                            <Field label="CBM"             value={lot.cbm       ? `${lot.cbm} m³`                          : null} />
                            <Field label="Origin Country"  value={lot.origin_country} />
                          </div>
                        </div>

                        {/* Dates */}
                        <div>
                          <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-3">📅 Key Dates</p>
                          <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                            <Field label="Lot Open Date"    value={fmtDisplayDate(lot.lot_date)}      mono />
                            <Field label="Docs Received"    value={fmtDisplayDate(lot.get_docs_date)} mono />
                            <Field label="ETA"              value={fmtDisplayDate(lot.eta)}           mono highlight={lot.eta      ? 'text-amber-300'  : ''} />
                            <Field label="ATC"              value={fmtDisplayDate(lot.atc_date)}      mono highlight={lot.atc_date ? 'text-emerald-400' : 'text-rose-400'} />
                          </div>
                        </div>

                        {/* Factory & Supplier */}
                        <div>
                          <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-3">🏭 Factory & Supplier</p>
                          <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                            <Field label="Factory Code" value={lot.factory_no} />
                            <Field label="Supplier"     value={displaySupplier} />
                            <Field label="Sale Qty"     value={lot.sale_qty ? Number(lot.sale_qty).toLocaleString() : null} />
                            <Field label="Shared Bill"  value={lot.is_hang_chung_bill ? 'Yes' : 'No'} />
                          </div>
                        </div>

                        {/* Contract Period — A12 only */}
                        {lot.loai_hinh === 'A12' && (lot.contract_start || lot.contract_end) && (
                          <div>
                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5 mb-3">📋 Contract Period (A12)</p>
                            <div className="grid grid-cols-2 gap-x-6 gap-y-3">
                              <Field label="Start Date" value={fmtDisplayDate(lot.contract_start)} mono highlight="text-blue-300" />
                              <Field label="End Date"   value={fmtDisplayDate(lot.contract_end)}   mono highlight="text-blue-300" />
                            </div>
                          </div>
                        )}
                      </div>

                      {/* RIGHT COLUMN — Invoices & Goods */}
                      <div className="p-6 space-y-4 overflow-y-auto">
                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-800 pb-1.5">
                          📄 Invoices & Goods ({lotInvoices.length} inv · {lotGoods.length} items)
                        </p>
                        {lotInvoices.length === 0
                          ? <p className="text-slate-600 italic text-xs">No invoices declared for this lot.</p>
                          : lotInvoices.map(inv => {
                              const invGoods = goods.filter(g => String(g.invoice_no) === String(inv.invoice_no));
                              const invTotal = getInvoiceValueSum(inv);
                              return (
                                <div key={inv.invoice_no} className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
                                  {/* Invoice header */}
                                  <div className="flex justify-between items-center px-4 py-2.5 border-b border-slate-800 bg-slate-950/60">
                                    <div className="flex items-center gap-2">
                                      <span className="font-mono font-bold text-indigo-300 text-xs">{inv.invoice_no}</span>
                                      <span className="text-[10px] text-slate-500">{fmtDisplayDate(inv.invoice_date)}</span>
                                      <span className="text-[10px] bg-slate-800 text-slate-400 px-1.5 py-0.5 rounded">{inv.incoterm}</span>
                                      {inv.currency && <span className="text-[10px] text-slate-500">{inv.currency}</span>}
                                    </div>
                                    <span className="font-mono font-bold text-emerald-400 text-xs">
                                      ${invTotal.toLocaleString(undefined,{minimumFractionDigits:2})}
                                    </span>
                                  </div>
                                  {/* Goods rows */}
                                  {invGoods.length > 0 ? (
                                    <div className="divide-y divide-slate-900">
                                      {invGoods.map(g => (
                                        <div key={g.id || g.goods_no} className="flex items-start justify-between px-4 py-2 text-[11px]">
                                          <div className="flex items-start gap-2 min-w-0">
                                            <span className="text-[9px] text-slate-600 w-4 text-right flex-shrink-0 mt-0.5">{g.goods_item}</span>
                                            <span className="text-emerald-600 font-mono flex-shrink-0">{(g.goods_no||'').split('*')[0].trim()}</span>
                                            <span className="text-slate-300 truncate">{g.goods_name_en}</span>
                                          </div>
                                          <div className="flex items-center gap-3 flex-shrink-0 ml-2 text-right">
                                            {g.qty1 && <span className="text-slate-500 font-mono">{g.qty1} {g.unit1||''}</span>}
                                            {g.sale_amount && <span className="text-amber-400 font-mono font-bold">${Number(g.sale_amount).toLocaleString(undefined,{minimumFractionDigits:2})}</span>}
                                          </div>
                                        </div>
                                      ))}
                                    </div>
                                  ) : (
                                    <p className="px-4 py-2 text-[10px] text-slate-600 italic">No goods items.</p>
                                  )}
                                </div>
                              );
                            })
                        }
                      </div>
                    </div>
                  </div>

                  {/* ── FOOTER ACTIONS ── */}
                  <div className="flex-shrink-0 border-t border-slate-800 bg-slate-900 px-6 py-3 flex justify-between items-center">
                    <span className="text-[10px] text-slate-600 italic">Read-only — use Edit to make changes</span>
                    <div className="flex gap-2">
                      {lot.loai_hinh === 'A12' && (
                        <button onClick={() => { setViewDetailLot(null); handleCreateContract(); setSelectedLotNo(lot.lot_no); }}
                          className="text-[11px] px-3 py-1.5 rounded-lg bg-emerald-700 hover:bg-emerald-600 text-white font-bold transition-all">
                          📄 Sale Contract
                        </button>
                      )}
                      <button onClick={() => { setViewDetailLot(null); startEditLot(lot); }}
                        className="text-[11px] px-3 py-1.5 rounded-lg bg-blue-700 hover:bg-blue-600 text-white font-bold transition-all">
                        ✏️ Edit
                      </button>
                      <button onClick={(e) => { setViewDetailLot(null); triggerDeleteLotConfirm(lot.lot_no, e); }}
                        className="text-[11px] px-3 py-1.5 rounded-lg bg-rose-900 hover:bg-rose-800 text-rose-300 font-bold transition-all">
                        🗑 Delete
                      </button>
                      <button onClick={() => setViewDetailLot(null)}
                        className="text-[11px] px-4 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-200 font-bold transition-all">
                        Close
                      </button>
                    </div>
                  </div>
                </div>

                <style>{`
                  @keyframes fadeIn  { from { opacity: 0; }               to { opacity: 1; } }
                  @keyframes scaleIn { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                `}</style>
              </div>
            );
          })()}
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
