      const [modalMode, setModalMode] = useState('add'); 
      const [modalTab, setModalTab] = useState('lot'); 
      const [showMasterInvoiceModal, setShowMasterInvoiceModal] = useState(false);

      const [inlineAtcLotNo, setInlineAtcLotNo] = useState(null);
      const [inlineAtcDate, setInlineAtcDate] = useState('');

      const [confirmState, setConfirmState] = useState({
        isOpen: false,
        title: '',
        message: '',
        onConfirm: null
      });

      // Form States
      const [lotForm, setLotForm] = useState({
        lot_no: '', stt: 1, lot_date: new Date().toISOString().substring(0, 10), get_docs_date: new Date().toISOString().substring(0, 10),
        factory_no: '', bill_no: '', bill_date: '', pol: '', pod: '', bill_term: 'Freight Prepaid', is_cont: true,
        cont_no: '', seal_no: '', cont_type: '40HC', pkg_qty: 0, gw: 0, cbm: 0, eta: '', atc_date: '',
        origin_country: 'TAIWAN', supplier: 'CHANG YANG MATERIAL CORP.', loai_hinh: 'A12', loai_hinh_con: 'DEFAULT', sale_qty: 0
      });

      const [invoiceForm, setInvoiceForm] = useState({
        invoice_no: '', lot_no: '', bill_no: '', invoice_date: new Date().toISOString().substring(0, 10), incoterm: 'CIF',
        total_amount: 0, foc_amount: 0, plus_sea_freight: 0, handling_charges: 0, other_charges: 0, is_hang_chung_bill: false,
        loai_hinh: 'A12', loai_hinh_con: 'DEFAULT'
      });

      const [goodsForm, setGoodsForm] = useState({
        invoice_no: '', goods_no: '', goods_item: 1, goods_name_en: '', goods_unit_en: 'PCS', goods_unit_en2: '',
        goods_name_local: '', goods_unit_local: 'Cái', goods_unit_local2: '', hs_code: '', invoice_description: '', sale_amount: 0
      });

      const [selectedFactories, setSelectedFactories] = useState([]);
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4500);
      };

      // --- KHỞI TẠO VÀ ĐỒNG BỘ DỮ LIỆU ---
      useEffect(() => {
        if (isFirebaseConfigured) {
          const initAuth = async () => {
            try {
              await signInAnonymously(auth);
            } catch (err) {
              console.error("Lỗi xác thực hệ thống:", err);
            }
          };
          initAuth();

          const unsubscribe = onAuthStateChanged(auth, (userState) => {
            setUser(userState);
          });
          return () => unsubscribe();
        } else {
          setUser({ uid: 'local_user', isAnonymous: true });
        }
      }, []);

      useEffect(() => {
        if (!user) return;

        if (isFirebaseConfigured) {
          const lotsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'lots');
          const invoicesColRef = collection(db, 'artifacts', appId, 'public', 'data', 'invoices');
          const goodsColRef = collection(db, 'artifacts', appId, 'public', 'data', 'goods');

          const unsubLots = onSnapshot(lotsColRef, (snapshot) => {
            const data = snapshot.docs.map(doc => doc.data());
            setLots(data.sort((a, b) => b.lot_date.localeCompare(a.lot_date)));
            if (snapshot.empty) initializeSampleFirebaseData();
          });

          const unsubInvoices = onSnapshot(invoicesColRef, (snapshot) => {
            setInvoices(snapshot.docs.map(doc => doc.data()));
          });

          const unsubGoods = onSnapshot(goodsColRef, (snapshot) => {
            setGoods(snapshot.docs.map(doc => doc.data()));
          });

          return () => {
            unsubLots();
            unsubInvoices();
            unsubGoods();
          };
        } else {
          // Fallback sang LocalStorage
          const localLots = localStorage.getItem('cy_lots');
          const localInvoices = localStorage.getItem('cy_invoices');
          const localGoods = localStorage.getItem('cy_goods');

          if (localLots) setLots(JSON.parse(localLots).sort((a, b) => b.lot_date.localeCompare(a.lot_date)));
          else {
            localStorage.setItem('cy_lots', JSON.stringify(INITIAL_LOTS));
            setLots(INITIAL_LOTS);
          }

          if (localInvoices) setInvoices(JSON.parse(localInvoices));
          else {
            localStorage.setItem('cy_invoices', JSON.stringify(INITIAL_INVOICES));
            setInvoices(INITIAL_INVOICES);
          }

          if (localGoods) setGoods(JSON.parse(localGoods));
          else {
            localStorage.setItem('cy_goods', JSON.stringify(INITIAL_GOODS));
            setGoods(INITIAL_GOODS);
          }
        }
      }, [user]);

      const initializeSampleFirebaseData = async () => {
        try {
          const batch = writeBatch(db);
          INITIAL_LOTS.forEach(lot => batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'lots', lot.lot_no), lot));
          INITIAL_INVOICES.forEach(inv => batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', inv.invoice_no), inv));
          INITIAL_GOODS.forEach(g => batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'goods', g.id), g));
          await batch.commit();
          showNotification("Đã khởi tạo dữ liệu mẫu lên đám mây Firestore!");
        } catch (err) {
          console.error("Lỗi đồng bộ dữ liệu ban đầu:", err);
        }
      };

      // --- LOGIC PHỤ TRỢ (HELPER FUNCTIONS) ---
      const getFirstVacantSeq = () => {
        const activeSeqs = lots.map(l => Number(l.stt)).filter(n => !isNaN(n) && n > 0);
        const uniqueSeqs = Array.from(new Set(activeSeqs)).sort((a, b) => a - b);
        let nextSeq = 1;
        for (let i = 0; i < uniqueSeqs.length; i++) {
          if (uniqueSeqs[i] === nextSeq) nextSeq++;
          else if (uniqueSeqs[i] > nextSeq) break;
        }
        return nextSeq;
      };

      const generateLotNoString = (type, subType, sttNum) => {
        const yy = new Date().getFullYear().toString().slice(-2);
        if (type === 'A12') {
          if (subType === 'H11') return `CH${sttNum}-${yy}PMD`;
          if (subType === 'DT') return `CH${sttNum}DT-${yy}`;
          return `CH${sttNum}KD-${yy}`;
        } else if (type === 'E21') {
          if (subType === 'CHUYEN_TIEP') return `CH${sttNum}-${yy}CT`;
          return `CH${sttNum}-${yy}`;
        }
        return `CH${sttNum}-${yy}`;
      };

      const getUniqueSuppliers = () => Array.from(new Set(lots.map(l => l.supplier).filter(Boolean)));
      const getUniquePols = () => Array.from(new Set(lots.map(l => l.pol).filter(Boolean).map(p => p.trim().toUpperCase())));
      const getUniquePods = () => Array.from(new Set(lots.map(l => l.pod).filter(Boolean).map(p => p.trim().toUpperCase())));

      useEffect(() => {
        if (showAddModal && modalMode === 'add' && modalTab === 'lot') {
          const vacantStt = getFirstVacantSeq();
          const calculatedLotNo = generateLotNoString(lotForm.loai_hinh, lotForm.loai_hinh_con, vacantStt);
          setLotForm(prev => ({ ...prev, lot_no: calculatedLotNo, stt: vacantStt }));
        }
      }, [showAddModal, lotForm.loai_hinh, lotForm.loai_hinh_con, lots, modalMode, modalTab]);

      useEffect(() => {
        setLotForm(prev => ({ ...prev, factory_no: selectedFactories.join(', ') }));
      }, [selectedFactories]);

      // --- LOGIC PHÂN TÍCH TÁCH/GHÉP HÀNG CHUNG BILL ---
      const checkBillNoGroupingHelper = (typedBillNo, currentLoaiHinh, currentLoaiHinhCon, isHangChungBill) => {
        if (!typedBillNo || !isHangChungBill) return { matches: false, status: 'NORMAL' };
        const matchingInvoices = invoices.filter(i => i.bill_no && i.bill_no.trim().toLowerCase() === typedBillNo.trim().toLowerCase());
        if (matchingInvoices.length === 0) return { matches: false, status: 'NEW_BILL' };
        
        const relatedLots = lots.filter(l => matchingInvoices.some(i => i.lot_no === l.lot_no));
        if (relatedLots.length === 0) return { matches: false, status: 'NEW_BILL' };

        const sameTypeLot = relatedLots.find(l => l.loai_hinh === currentLoaiHinh && l.loai_hinh_con === currentLoaiHinhCon);
        if (sameTypeLot) {
          return {
            matches: true, status: 'SAME_BILL_SAME_TYPE', proposedLotNo: sameTypeLot.lot_no, stt: sameTypeLot.stt,
            message: `Hàng chung Bill & Cùng loại hình với Lô [${sameTypeLot.lot_no}]. Hóa đơn này sẽ tự động ghép vào Lô hiện tại.`
          };
        } else {
          const baseLot = relatedLots[0];
          const sharedStt = baseLot.stt;
          const computedLotNo = generateLotNoString(currentLoaiHinh, currentLoaiHinhCon, sharedStt);
          const existingNewLot = lots.find(l => l.lot_no === computedLotNo);
          return {
            matches: true, status: 'SAME_BILL_DIFF_TYPE', proposedLotNo: computedLotNo, stt: sharedStt, existingNewLot: !!existingNewLot, baseLot: baseLot,
            message: `Trùng số Bill với Lô [${baseLot.lot_no}] (STT: ${sharedStt}) nhưng KHÁC loại hình. Hệ thống sẽ tự động tách làm Lô mới [${computedLotNo}] dùng CHUNG Số thứ tự [STT: ${sharedStt}]!`
          };
        }
      };

      const activeBillStatus = checkBillNoGroupingHelper(invoiceForm.bill_no, invoiceForm.loai_hinh, invoiceForm.loai_hinh_con, invoiceForm.is_hang_chung_bill);

      // --- LƯU TRỮ VÀ THAY ĐỔI DỮ LIỆU (CẢ HAI CHẾ ĐỘ DB) ---
      const handleSaveLot = async (e) => {
        e.preventDefault();
        if (!lotForm.lot_no.trim()) {
          showNotification("Mã lô hàng không được bỏ trống", "error");
          return;
        }
        if (modalMode === 'add' && lots.some(l => l.lot_no.toLowerCase() === lotForm.lot_no.trim().toLowerCase())) {
          showNotification("Mã lô hàng đã tồn tại!", "error");
          return;
        }

        const finalLot = {
          ...lotForm,
          lot_no: lotForm.lot_no.trim(),
          stt: Number(lotForm.stt),
          pkg_qty: Number(lotForm.pkg_qty) || 0,
          gw: Number(lotForm.gw) || 0,
          cbm: Number(lotForm.cbm) || 0,
          sale_qty: Number(lotForm.sale_qty) || 0
        };

        try {
          if (isFirebaseConfigured) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lots', finalLot.lot_no), finalLot);
          } else {
            const updatedLots = [finalLot, ...lots.filter(l => l.lot_no !== finalLot.lot_no)];
            setLots(updatedLots.sort((a, b) => b.lot_date.localeCompare(a.lot_date)));
            localStorage.setItem('cy_lots', JSON.stringify(updatedLots));
          }

          showNotification(`Đã ${modalMode === 'add' ? 'tạo mới' : 'cập nhật'} Lô hàng ${finalLot.lot_no} thành công!`);
          setSelectedLotNo(finalLot.lot_no);

          if (modalMode === 'add') {
            setInvoiceForm(prev => ({ 
              ...prev, lot_no: finalLot.lot_no, bill_no: finalLot.bill_no, loai_hinh: finalLot.loai_hinh, loai_hinh_con: finalLot.loai_hinh_con
            }));
            setModalTab('invoice');
          } else {
            setShowAddModal(false);
          }
          setSearchExecuted(true);
        } catch (err) {
          showNotification("Lỗi lưu lô hàng: " + err.message, "error");
        }
      };

      const handleSaveInvoice = async (e) => {
        e.preventDefault();
        if (!invoiceForm.invoice_no.trim()) {
          showNotification("Vui lòng điền Số hóa đơn!", "error");
          return;
        }

        let targetLotNo = invoiceForm.lot_no;

        if (invoiceForm.is_hang_chung_bill && activeBillStatus.matches) {
          targetLotNo = activeBillStatus.proposedLotNo;

          if (activeBillStatus.status === 'SAME_BILL_DIFF_TYPE' && !activeBillStatus.existingNewLot) {
            const baseLot = activeBillStatus.baseLot;
            const newAutoLot = {
              ...baseLot,
              lot_no: activeBillStatus.proposedLotNo,
              stt: Number(activeBillStatus.stt), 
              lot_date: invoiceForm.invoice_date || baseLot.lot_date,
              get_docs_date: baseLot.get_docs_date || new Date().toISOString().substring(0, 10),
              bill_no: invoiceForm.bill_no,
              atc_date: '',
              loai_hinh: invoiceForm.loai_hinh,
              loai_hinh_con: invoiceForm.loai_hinh_con,
              pkg_qty: 0, gw: 0, cbm: 0, sale_qty: 0
            };

            try {
              if (isFirebaseConfigured) {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lots', newAutoLot.lot_no), newAutoLot);
              } else {
                const updatedLots = [newAutoLot, ...lots.filter(l => l.lot_no !== newAutoLot.lot_no)];
                setLots(updatedLots.sort((a, b) => b.lot_date.localeCompare(a.lot_date)));
                localStorage.setItem('cy_lots', JSON.stringify(updatedLots));
              }
              showNotification(`Tự động tách Lô mới: [${newAutoLot.lot_no}] dùng chung STT: ${newAutoLot.stt}`);
            } catch (err) {
              showNotification("Lỗi tách lô ghép: " + err.message, "error");
              return;
            }
          }
        }

        if (!targetLotNo) {
          showNotification("Hóa đơn phải được liên kết với một Lô hàng!", "error");
          return;
        }

        if (modalMode === 'add' && invoices.some(i => i.invoice_no.toLowerCase() === invoiceForm.invoice_no.trim().toLowerCase())) {
          showNotification("Số hóa đơn này đã tồn tại!", "error");
          return;
        }

        const finalInvoice = {
          ...invoiceForm,
          invoice_no: invoiceForm.invoice_no.trim(),
          lot_no: targetLotNo,
          total_amount: Number(invoiceForm.total_amount) || 0,
          foc_amount: Number(invoiceForm.foc_amount) || 0,
          plus_sea_freight: Number(invoiceForm.plus_sea_freight) || 0,
          handling_charges: Number(invoiceForm.handling_charges) || 0,
          other_charges: Number(invoiceForm.other_charges) || 0,
        };

        try {
          if (isFirebaseConfigured) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', finalInvoice.invoice_no), finalInvoice);
          } else {
            const updatedInvoices = [finalInvoice, ...invoices.filter(i => i.invoice_no !== finalInvoice.invoice_no)];
            setInvoices(updatedInvoices);
            localStorage.setItem('cy_invoices', JSON.stringify(updatedInvoices));
          }

          showNotification(`Đã lưu Hóa đơn ${finalInvoice.invoice_no}`);
          setSelectedLotNo(targetLotNo);
          setSelectedInvoiceNo(finalInvoice.invoice_no);

          if (modalMode === 'add') {
            setGoodsForm(prev => ({ 
              ...prev, invoice_no: finalInvoice.invoice_no, goods_no: '', goods_name_en: '', goods_name_local: '',
              goods_unit_en: 'PCS', goods_unit_en2: '', goods_unit_local: 'Cái', goods_unit_local2: '', hs_code: '', sale_amount: 0
            }));
            setModalTab('goods');
          } else {
            setShowAddModal(false);
          }
        } catch (err) {
          showNotification("Lỗi lưu hóa đơn: " + err.message, "error");
        }
      };

      const handleSaveGoods = async (e) => {
        e.preventDefault();
        if (!goodsForm.goods_no.trim() || !goodsForm.goods_name_en.trim()) {
          showNotification("Vui lòng nhập đầy đủ thông tin hàng hóa!", "error");
          return;
        }

        const isEditing = modalMode === 'edit' && goodsForm.id;
        const goodsId = isEditing ? goodsForm.id : "goods_" + Date.now();
        
        const finalGoods = {
          ...goodsForm,
          id: goodsId,
          goods_no: goodsForm.goods_no.trim(),
          goods_item: Number(goodsForm.goods_item) || 1,
          sale_amount: Number(goodsForm.sale_amount) || 0
        };

        try {
          if (isFirebaseConfigured) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'goods', goodsId), finalGoods);
          } else {
            const updatedGoods = [finalGoods, ...goods.filter(g => g.id !== goodsId)];
            setGoods(updatedGoods);
            localStorage.setItem('cy_goods', JSON.stringify(updatedGoods));
          }

          showNotification(`Đã lưu mặt hàng ${finalGoods.goods_no}`);

          if (modalMode === 'add') {
            setGoodsForm({
              invoice_no: finalGoods.invoice_no, goods_no: '', goods_item: finalGoods.goods_item + 1, goods_name_en: '',
              goods_unit_en: 'PCS', goods_unit_en2: '', goods_name_local: 'Hàng hóa nhập khẩu mới',
              goods_unit_local: 'Cái', goods_unit_local2: '', hs_code: '', invoice_description: '', sale_amount: 0
            });
          } else {
            setShowAddModal(false);
          }
        } catch (err) {
          showNotification("Lỗi lưu mặt hàng: " + err.message, "error");
        }
      };

      const handleInlineAtcUpdate = async (lotNo, dateString) => {
        const lotToUpdate = lots.find(l => l.lot_no === lotNo);
        if (!lotToUpdate) return;
        
        const updatedLot = { ...lotToUpdate, atc_date: dateString };

        try {
          if (isFirebaseConfigured) {
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'lots', lotNo), updatedLot);
          } else {
            const updatedLots = lots.map(l => l.lot_no === lotNo ? updatedLot : l);
            setLots(updatedLots);
            localStorage.setItem('cy_lots', JSON.stringify(updatedLots));
          }
          showNotification(`Đã cập nhật Ngày Nhập Kho cho lô ${lotNo}!`);
          setInlineAtcLotNo(null);
          setInlineAtcDate('');
        } catch (err) {
          showNotification("Lỗi: " + err.message, "error");
        }
      };

      // --- TRÌNH XÓA DỮ LIỆU CASCADE ---
      const startEditLot = (lot, e) => {
        if (e) e.stopPropagation();
        setModalMode('edit');
        setLotForm(lot);
        setSelectedFactories(lot.factory_no ? lot.factory_no.split(',').map(s => s.trim()) : []);
        setModalTab('lot');
        setShowAddModal(true);
      };

      const startEditInvoice = (inv, e) => {
        if (e) e.stopPropagation();
        setModalMode('edit');
        setInvoiceForm(inv);
        setModalTab('invoice');
        setShowAddModal(true);
      };

      const startEditGoods = (item, e) => {
        if (e) e.stopPropagation();
        setModalMode('edit');
        setGoodsForm(item);
        setModalTab('goods');
        setShowAddModal(true);
      };

      const triggerDeleteLotConfirm = (lotNo, e) => {
        if (e) e.stopPropagation();
        const target = lotNo || selectedLotNo;
        if (!target) return;

        setConfirmState({
          isOpen: true,
          title: 'Xác Nhận Xóa Lô Hàng',
          message: `Bạn đang yêu cầu xóa Lô hàng [${target}]? Tất cả hóa đơn thương mại và danh mục hàng hóa thuộc lô này sẽ bị xóa vĩnh viễn khỏi thiết bị của bạn.`,
          onConfirm: () => executeDeleteSelectedLot(target)
        });
      };

      const executeDeleteSelectedLot = async (targetLotNo) => {
        const relatedInvoices = invoices.filter(i => i.lot_no === targetLotNo);
        const relatedInvoiceNos = relatedInvoices.map(i => i.invoice_no);

        try {
          if (isFirebaseConfigured) {
            const relatedGoods = goods.filter(g => relatedInvoiceNos.includes(g.invoice_no));
            const batch = writeBatch(db);
            relatedGoods.forEach(g => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'goods', g.id)));
            relatedInvoices.forEach(i => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', i.invoice_no)));
            batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'lots', targetLotNo));
            await batch.commit();
          } else {
            const updatedGoods = goods.filter(g => !relatedInvoiceNos.includes(g.invoice_no));
            const updatedInvoices = invoices.filter(i => i.lot_no !== targetLotNo);
            const updatedLots = lots.filter(l => l.lot_no !== targetLotNo);

            setGoods(updatedGoods);
            setInvoices(updatedInvoices);
            setLots(updatedLots);

            localStorage.setItem('cy_goods', JSON.stringify(updatedGoods));
            localStorage.setItem('cy_invoices', JSON.stringify(updatedInvoices));
            localStorage.setItem('cy_lots', JSON.stringify(updatedLots));
          }

          showNotification(`Đã xóa toàn bộ dữ liệu của Lô hàng ${targetLotNo}.`);
          setSelectedLotNo(null);
          setSelectedInvoiceNo(null);
        } catch (err) {
          showNotification("Xóa thất bại: " + err.message, "error");
        } finally {
          setConfirmState(prev => ({ ...prev, isOpen: false }));
        }
      };

      const triggerDeleteInvoiceConfirm = (invoiceNo, e) => {
        if (e) e.stopPropagation();
        setConfirmState({
          isOpen: true,
          title: 'Xác Nhận Xóa Hóa Đơn',
          message: `Bạn có chắc chắn muốn xóa Hóa đơn [${invoiceNo}]? Mọi sản phẩm thuộc hóa đơn này sẽ bị xóa theo.`,
          onConfirm: () => executeDeleteInvoice(invoiceNo)
        });
      };

      const executeDeleteInvoice = async (invoiceNo) => {
        try {
          if (isFirebaseConfigured) {
            const relatedGoods = goods.filter(g => g.invoice_no === invoiceNo);
            const batch = writeBatch(db);
            relatedGoods.forEach(g => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'goods', g.id)));
            batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'invoices', invoiceNo));
            await batch.commit();
          } else {
            const updatedGoods = goods.filter(g => g.invoice_no !== invoiceNo);
            const updatedInvoices = invoices.filter(i => i.invoice_no !== invoiceNo);

            setGoods(updatedGoods);
            setInvoices(updatedInvoices);

            localStorage.setItem('cy_goods', JSON.stringify(updatedGoods));
            localStorage.setItem('cy_invoices', JSON.stringify(updatedInvoices));
          }
          showNotification(`Đã xóa Hóa đơn ${invoiceNo} thành công.`);
          setSelectedInvoiceNo(null);
        } catch (err) {
          showNotification("Lỗi xóa: " + err.message, "error");
        } finally {
          setConfirmState(prev => ({ ...prev, isOpen: false }));
        }
      };

      const triggerDeleteGoodsConfirm = (goodsId, e) => {
        if (e) e.stopPropagation();
        setConfirmState({
          isOpen: true,
          title: 'Xác Nhận Xóa Mặt Hàng',
          message: 'Bạn có muốn xóa dòng mặt hàng này không?',
          onConfirm: () => executeDeleteGoods(goodsId)
        });
      };

      const executeDeleteGoods = async (goodsId) => {
        try {
          if (isFirebaseConfigured) {

                            <input type="text" required value={lotForm.origin_country} onChange={(e) => setLotForm({ ...lotForm, origin_country: e.target.value.toUpperCase() })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white" />
                          </div>
                        </div>

                        <div className="bg-slate-950/40 p-4 border border-slate-850 rounded-xl space-y-3">
                          <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider">Mã Xưởng Thực Tế Nhận Hàng *</label>
                          <div className="flex gap-4 flex-wrap">
                            {FACTORY_OPTIONS.map(fac => {
                              const isChecked = selectedFactories.includes(fac);
                              return (
                                <label key={fac} className="flex items-center gap-2 cursor-pointer bg-slate-900 border border-slate-800 px-3 py-2 rounded-lg hover:border-slate-700 select-none">
                                  <input type="checkbox" checked={isChecked} onChange={(e) => { if (e.target.checked) setSelectedFactories([...selectedFactories, fac]); else setSelectedFactories(selectedFactories.filter(item => item !== fac)); }} className="accent-blue-500 rounded" />
                                  <span className="text-xs font-bold text-slate-200">{fac}</span>
                                </label>
                              );
                            })}
                          </div>
                        </div>
                      </div>

                      <div className="space-y-4">
                        <h4 className="text-[11px] font-bold text-cyan-400 uppercase tracking-widest border-b border-slate-800 pb-1.5">🚢 PHÂN ĐOẠN 2: THÔNG TIN VẬN TẢI & CONTAINER</h4>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5">Số Vận Đơn (Bill No)</label>
                            <input type="text" value={lotForm.bill_no} onChange={(e) => setLotForm({ ...lotForm, bill_no: e.target.value.toUpperCase() })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white font-mono" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5">Cảng Đi (POL)</label>
                            <input type="text" list="pols" value={lotForm.pol} onChange={(e) => setLotForm({ ...lotForm, pol: e.target.value.toUpperCase() })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white" />
                            <datalist id="pols">{getUniquePols().map((p, i) => <option key={i} value={p} />)}</datalist>
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5">Cảng Đến (POD)</label>
                            <input type="text" list="pods" value={lotForm.pod} onChange={(e) => setLotForm({ ...lotForm, pod: e.target.value.toUpperCase() })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white" />
                            <datalist id="pods">{getUniquePods().map((p, i) => <option key={i} value={p} />)}</datalist>
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5">Ngày ETA Dự Kiến</label>
                            <input type="date" value={lotForm.eta} onChange={(e) => setLotForm({ ...lotForm, eta: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white font-mono" />
                          </div>
                        </div>

                        <div className="bg-slate-950/30 p-4 border border-slate-850 rounded-xl">
                          <div className="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                            <div className="flex items-center justify-between bg-slate-950/60 p-3.5 rounded-lg border border-slate-850">
                              <span className="text-[11px] text-slate-300 font-medium">Vận chuyển Container?</span>
                              <input type="checkbox" checked={lotForm.is_cont} onChange={(e) => setLotForm({ ...lotForm, is_cont: e.target.checked })} className="w-4 h-4 rounded accent-emerald-500" />
                            </div>
                            <div>
                              <label className="block text-[11px] text-slate-300 mb-1.5">Loại Container</label>
                              <select disabled={!lotForm.is_cont} value={lotForm.cont_type} onChange={(e) => setLotForm({ ...lotForm, cont_type: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white outline-none">
                                <option value="20GP">20GP</option>
                                <option value="40GP">40GP</option>
                                <option value="40HC">40HC</option>
                                <option value="LCL">LCL (Hàng lẻ)</option>
                              </select>
                            </div>
                            <div>
                              <label className="block text-[11px] text-slate-300 mb-1.5">Số Container</label>
                              <input type="text" disabled={!lotForm.is_cont} value={lotForm.cont_no} onChange={(e) => setLotForm({ ...lotForm, cont_no: e.target.value.toUpperCase() })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white font-mono" />
                            </div>
                            <div>
                              <label className="block text-[11px] text-slate-300 mb-1.5">Số Chì (Seal No)</label>
                              <input type="text" disabled={!lotForm.is_cont} value={lotForm.seal_no} onChange={(e) => setLotForm({ ...lotForm, seal_no: e.target.value.toUpperCase() })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white font-mono" />
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="pt-4 border-t border-slate-800 flex justify-end">
                        <button type="submit" className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-xs font-bold">Lưu & Tiếp tục ➔</button>
                      </div>
                    </form>
                  )}

                  {/* TAB 2: INVOICE */}
                  {modalTab === 'invoice' && (
                    <form onSubmit={handleSaveInvoice} className="space-y-6">
                      <div className="space-y-4">
                        <h4 className="text-[11px] font-bold text-indigo-400 uppercase tracking-widest border-b border-slate-800 pb-1.5">📄 PHÂN ĐOẠN 3: THƯƠNG MẠI & PHỤ PHÍ HÓA ĐƠN</h4>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5 font-bold">Lô Hàng Liên Kết *</label>
                            <input type="text" required list="modal-invoice-lots" value={invoiceForm.lot_no} onChange={(e) => {
                              const val = e.target.value;
                              const matched = lots.find(l => l.lot_no === val);
                              setInvoiceForm(prev => ({
                                ...prev, lot_no: val, bill_no: matched ? matched.bill_no : prev.bill_no,
                                loai_hinh: matched ? matched.loai_hinh : prev.loai_hinh, loai_hinh_con: matched ? matched.loai_hinh_con : prev.loai_hinh_con
                              }));
                            }} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white font-mono" />
                            <datalist id="modal-invoice-lots">{getSortedLotsForSuggestions().map((l, i) => <option key={i} value={l.lot_no} />)}</datalist>
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5">Số Vận Đơn</label>
                            <input type="text" disabled value={invoiceForm.bill_no} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5">Số Hóa Đơn *</label>
                            <input type="text" required value={invoiceForm.invoice_no} onChange={(e) => setInvoiceForm({ ...invoiceForm, invoice_no: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white font-mono" />
                          </div>
                        </div>

                        <div className="bg-slate-950/60 p-4 border border-slate-850 rounded-xl flex items-center justify-between">
                          <div>
                            <span className="block text-xs font-bold text-slate-200 uppercase tracking-wide">📦 Hàng chung một số vận đơn (Common Bill)</span>
                            <span className="block text-[10px] text-slate-500 mt-0.5 font-sans">Ứng dụng sẽ tự động tách lô và đồng bộ STT thông minh.</span>
                          </div>
                          <label className="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" checked={invoiceForm.is_hang_chung_bill} onChange={(e) => setInvoiceForm({ ...invoiceForm, is_hang_chung_bill: e.target.checked })} className="sr-only peer" />
                            <div className="w-11 h-6 bg-slate-800 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                          </label>
                        </div>

                        {invoiceForm.is_hang_chung_bill && activeBillStatus.matches && (
                          <div className="p-3 rounded-lg border text-xs bg-amber-950/30 border-amber-900/40 text-amber-400 leading-relaxed">
                            <p className="font-bold mb-1">💡 Nghiệp Vụ Tự Động Hàng Chung Bill:</p>
                            <p>{activeBillStatus.message}</p>
                          </div>
                        )}

                        <div className="bg-slate-950/20 p-5 border border-slate-855 rounded-xl space-y-4">
                          <h5 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-850 pb-1.5">💰 KHAI BÁO GIÁ TRỊ & PHỤ PHÍ</h5>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                              <label className="block text-[11px] text-slate-300 mb-1.5">Trị Giá Hàng Gốc (USD) *</label>
                              <input type="number" step="0.01" required value={invoiceForm.total_amount || ''} onChange={(e) => setInvoiceForm({ ...invoiceForm, total_amount: Number(e.target.value) })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-amber-400 font-bold font-mono" />
                            </div>
                            <div>
                              <label className="block text-[11px] text-slate-300 mb-1.5">Khấu Trừ Hàng FOC (USD)</label>
                              <input type="number" value={invoiceForm.foc_amount || ''} onChange={(e) => setInvoiceForm({ ...invoiceForm, foc_amount: Number(e.target.value) })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-rose-400 font-mono" />
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="pt-4 border-t border-slate-800 flex justify-end">
                        <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-xs font-bold">Lưu & Khai sản phẩm ➔</button>
                      </div>
                    </form>
                  )}

                  {/* TAB 3: GOODS DETAIL */}
                  {modalTab === 'goods' && (
                    <form onSubmit={handleSaveGoods} className="space-y-6">
                      <div className="space-y-4">
                        <h4 className="text-[11px] font-bold text-emerald-400 uppercase tracking-widest border-b border-slate-800 pb-1.5">📦 PHÂN ĐOẠN 4: CHI TIẾT MẶT HÀNG</h4>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5 font-bold">Hóa Đơn Liên Kết *</label>
                            <input type="text" required list="modal-invoice-suggestions" value={goodsForm.invoice_no} onChange={(e) => setGoodsForm({ ...goodsForm, invoice_no: e.target.value })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white font-mono" />
                            <datalist id="modal-invoice-suggestions">{getSortedInvoicesForSuggestions().map((i, idx) => <option key={idx} value={i.invoice_no} />)}</datalist>
                          </div>
                          <div className="grid grid-cols-3 gap-2">
                            <div>
                              <label className="block text-[11px] text-slate-300 mb-1.5">Thứ tự</label>
                              <input type="number" value={goodsForm.goods_item} onChange={(e) => setGoodsForm({ ...goodsForm, goods_item: Number(e.target.value) })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-white" />
                            </div>
                            <div className="col-span-2">
                              <label className="block text-[11px] text-slate-400 mb-1.5">Mã Sản Phẩm (Tự động)</label>
                              <input type="text" disabled value={goodsForm.goods_no} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-amber-400 font-mono font-bold" />
                            </div>
                          </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5 font-bold">Tên Tiếng Anh * (Chọn từ gợi ý để tự động khớp mã và HS code)</label>
                            <input type="text" required list="modal-dict-goods" placeholder="Bắt đầu gõ tên tiếng Anh..." value={goodsForm.goods_name_en} onChange={(e) => { const val = e.target.value; setGoodsForm(prev => ({ ...prev, goods_name_en: val })); handleEnglishNameAutoLookup(val, goodsForm.invoice_no); }} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-amber-300 font-bold" />
                            <datalist id="modal-dict-goods">
                              {(() => {
                                const currentInv = invoices.find(i => i.invoice_no === goodsForm.invoice_no);
                                const lh = currentInv?.loai_hinh || 'A12';
                                const dict = lh === 'E21' ? DICTIONARY_E21 : DICTIONARY_A12;
                                return dict.map((item, idx) => <option key={idx} value={item.goods_name_en}>{item.goods_no} - HS: {item.hs_code}</option>);
                              })()}
                            </datalist>
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-400 mb-1.5">Tên Tiếng Việt (Tự động điền)</label>
                            <textarea disabled rows="2" value={goodsForm.goods_name_local} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2.5 text-xs text-slate-400 leading-relaxed outline-none resize-none" />
                          </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                          <div>
                            <label className="block text-[11px] text-slate-400 mb-1.5">Mã HS Code</label>
                            <input type="text" disabled value={goodsForm.hs_code} className="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono" />
                          </div>
                          <div>
                            <label className="block text-[11px] text-slate-300 mb-1.5 font-bold">Trị Giá Khai Báo (USD) *</label>
                            <input type="number" required value={goodsForm.sale_amount || ''} onChange={(e) => setGoodsForm({ ...goodsForm, sale_amount: Number(e.target.value) })} className="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-amber-300 font-bold font-mono" />
                          </div>
                        </div>
                      </div>

                      <div className="pt-4 border-t border-slate-800 flex justify-end">
                        <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg text-xs font-bold">➕ Ghi Nhận Sản Phẩm</button>
                      </div>
                    </form>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* --- PRINT MASTER PREVIEW MODAL --- */}
          {showMasterInvoiceModal && selectedLotNo && (
            <div className="fixed inset-0 z-50 bg-slate-950/85 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
              <div className="bg-slate-900 border border-slate-800 rounded-xl w-full max-w-4xl overflow-hidden shadow-2xl flex flex-col my-8">
                <div className="bg-slate-950 px-6 py-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                  <h3 className="font-bold text-xs uppercase text-amber-400 tracking-widest">📋 Bản in Bảng kê hóa đơn (Mẫu 02/BKHĐ)</h3>
                  <div className="flex gap-2">
                    <button onClick={() => window.print()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg text-xs">🖨️ In Bảng Kê</button>
                    <button onClick={() => setShowMasterInvoiceModal(false)} className="bg-slate-800 text-slate-300 font-bold px-3 py-2 rounded-lg text-xs">Đóng</button>
                  </div>
                </div>

                <div className="p-8 bg-white text-slate-955 font-serif text-sm overflow-y-auto print-area max-h-[70vh]" id="printable-master-invoice">
                  <style>{`
                    @media print {
                      body * { visibility: hidden; }
                      #printable-master-invoice, #printable-master-invoice * { visibility: visible; }
                      #printable-master-invoice { position: absolute; left: 0; top: 0; width: 100%; }
                    }
                  `}</style>
                  
                  <div className="flex justify-between items-start text-xs border-b border-slate-300 pb-3 font-sans">
                    <div>
                      <h1 className="font-bold text-sm uppercase text-slate-900">CÔNG TY TNHH CHANG YANG VIỆT NAM</h1>
                      <p className="text-slate-500">Mã xưởng liên kết: {lots.find(l => l.lot_no === selectedLotNo)?.factory_no}</p>
                    </div>
                    <div className="text-right">
                      <h3 className="font-bold text-slate-900">Mẫu số 02/BKHĐ/GSQL</h3>
                      <p className="text-slate-500 text-[10px]">Kèm theo TT 39/2018/TT-BTC</p>
                    </div>
                  </div>

                  <div className="text-center my-6">
                    <h2 className="text-base font-bold uppercase tracking-wider text-slate-900">BẢNG KÊ HÓA ĐƠN THƯƠNG MẠI HÀNG HÓA NHẬP KHẨU</h2>
                    <p className="text-xs font-semibold font-sans mt-1">SỐ LÔ QUẢN LÝ: {selectedLotNo}</p>
                  </div>

                  <div className="my-6">
                    <table className="w-full text-left text-xs border-collapse border border-slate-400 font-sans">
                      <thead>
                        <tr className="bg-slate-100 text-slate-900 font-bold uppercase border-b border-slate-400">
                          <th className="p-2 border-r border-slate-400 text-center w-10">STT</th>
                          <th className="p-2 border-r border-slate-400">Số HĐ (Invoice No.)</th>
                          <th className="p-2 border-r border-slate-400">Ngày HĐ</th>
                          <th className="p-2 border-r border-slate-400">Incoterm</th>
                          <th className="p-2 text-right">Trị Giá (USD)</th>
                        </tr>
                      </thead>
                      <tbody>
                        {currentInvoices.map((inv, index) => (
                          <tr key={inv.invoice_no} className="border-b border-slate-400 text-slate-900">
                            <td className="p-2 border-r border-slate-400 text-center">{index + 1}</td>
                            <td className="p-2 border-r border-slate-400 font-mono font-bold">{inv.invoice_no}</td>
                            <td className="p-2 border-r border-slate-400">{inv.invoice_date}</td>
                            <td className="p-2 border-r border-slate-400 text-center font-bold text-pink-700">{inv.incoterm}</td>
                            <td className="p-2 text-right font-mono font-bold">${getInvoiceValueSum(inv).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                          </tr>
                        ))}
                        <tr className="bg-slate-100 font-bold border-b border-slate-400 text-xs">
                          <td colSpan="4" className="p-2.5 border-r border-slate-400 uppercase text-slate-800 text-center">TỔNG TRỊ GIÁ TRÊN BẢNG KÊ (USD)</td>
                          <td className="p-2.5 text-right text-rose-700 font-mono">${getSelectedLotTotalValue().toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  <div className="mt-12 flex justify-between items-start font-sans">
                    <div className="w-1/2 text-center text-xs text-slate-500">
                      <p className="italic">Người lập bảng kê</p>
                      <p className="mt-16 font-bold text-slate-800">Bộ phận Chứng từ Hải quan</p>
                    </div>
                    <div className="w-1/2 text-center text-xs text-slate-500">
                      <p className="font-bold text-slate-900">ĐẠI DIỆN DOANH NGHIỆP</p>
                      <p className="italic">Ký và đóng dấu</p>
                      <p className="mt-16 font-bold text-slate-800">Giám đốc - Ngô Thanh Hoàng</p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
